  "0": {
    "ref": "Introduction",
    "title": "The Acts of the Apostles",
    "overview": "<p>Acts is not primarily a history of the early church &mdash; it is the history of the risen Christ continuing his work through the Spirit he promised and poured out. Luke begins with a deliberate hinge: the &ldquo;former book&rdquo; (his Gospel) recorded all that Jesus &ldquo;began to do and to teach.&rdquo; The operative word is <em>began.</em> What follows in Acts is what Jesus <em>continued</em> &mdash; not in the flesh now, but in the power of the Spirit, through the mouths and feet and wounds of his witnesses.</p><p>Luke wrote for Theophilus (&ldquo;lover of God&rdquo;), likely a Roman official being catechised in the faith. But the scope of the narrative exceeds any single reader. Luke traces the gospel&rsquo;s movement along the spine of the Roman Empire &mdash; Jerusalem to Rome, Jewish synagogue to Gentile household, from a frightened upper room to Caesar&rsquo;s capital. This is not accident; it is Providence. The same God who told Abraham &ldquo;in you all the families of the earth shall be blessed&rdquo; is the God who compels a tentmaker from Tarsus to stand in the Areopagus and announce that the Unknown God has a name.</p><p>The Holy Spirit is the true protagonist of Acts. He falls at Pentecost like a sovereign flame. He speaks through Philip on a desert road. He stops Paul from entering Asia. He binds Paul to go to Jerusalem though chains await. He is not a vague presence but a Person with a will &mdash; the third Person of the Trinity, sent by the risen Son at the command of the Father, to accomplish the Father&rsquo;s eternal purpose: a people for his name drawn from every tongue and tribe and nation.</p><p>Reformed readers will find in Acts not an argument for the faith but something far more bracing: the sovereignty of God in mission. The gates of hell do not hold. Persecution only scatters the seed further. Imprisonment opens courts to preach. Shipwreck lands an apostle on the right island. Nothing is accidental; everything is appointed. The book ends with Paul in Rome, under house arrest, &ldquo;proclaiming the kingdom of God and teaching about the Lord Jesus Christ with all boldness and without hindrance.&rdquo; The final word is <em>unhindered.</em> The empire could chain the man but not the Word.</p><p>Read Acts with your eyes open to the God who is always working &mdash; in the upper room, in the council chambers, in the storm, in the jail at midnight. He is the same God today.</p>",
    "verseByVerse": []
  },
  "1": {
    "ref": "Chapter 1",
    "title": "The Promise and the Wait",
    "text": "<sup>1</sup>In the first book, O Theophilus, I have dealt with all that Jesus began to do and teach, <sup>2</sup>until the day when he was taken up, after he had given commands through the Holy Spirit to the apostles whom he had chosen. <sup>3</sup>He presented himself alive to them after his suffering by many proofs, appearing to them during forty days and speaking about the kingdom of God. <sup>4</sup>And while staying with them he ordered them not to depart from Jerusalem, but to wait for the promise of the Father, which, he said, &ldquo;you heard from me; <sup>5</sup>for John baptized with water, but you will be baptized with the Holy Spirit not many days from now.&rdquo; <sup>6</sup>So when they had come together, they asked him, &ldquo;Lord, will you at this time restore the kingdom to Israel?&rdquo; <sup>7</sup>He said to them, &ldquo;It is not for you to know times or seasons that the Father has fixed by his own authority. <sup>8</sup>But you will receive power when the Holy Spirit has come upon you, and you will be my witnesses in Jerusalem and in all Judea and Samaria, and to the end of the earth.&rdquo; <sup>9</sup>And when he had said these things, as they were looking on, he was lifted up, and a cloud took him out of their sight. <sup>10</sup>And while they were gazing into heaven as he went, behold, two men stood by them in white robes, <sup>11</sup>and said, &ldquo;Men of Galilee, why do you stand looking into heaven? This Jesus, who was taken up from you into heaven, will come in the same way as you saw him go into heaven.&rdquo; <sup>12</sup>Then they returned to Jerusalem from the mount called Olivet, which is near Jerusalem, a Sabbath day&rsquo;s journey away. <sup>13</sup>And when they had entered, they went up to the upper room, where they were staying, Peter and John and James and Andrew, Philip and Thomas, Bartholomew and Matthew, James the son of Alphaeus and Simon the Zealot and Judas the son of James. <sup>14</sup>All these with one accord were devoting themselves to prayer, together with the women and Mary the mother of Jesus, and his brothers. <sup>15</sup>In those days Peter stood up among the brothers (the company of persons was in all about one hundred and twenty) and said, <sup>16</sup>&ldquo;Brothers, the Scripture had to be fulfilled, which the Holy Spirit spoke beforehand by the mouth of David concerning Judas, who became a guide to those who arrested Jesus. <sup>17</sup>For he was numbered among us and was allotted his share in this ministry.&rdquo; <sup>18</sup>(Now this man acquired a field with the reward of his wickedness, and falling headlong he burst open in the middle and all his bowels gushed out. <sup>19</sup>And it became known to all the inhabitants of Jerusalem, so that the field was called in their own language Akeldama, that is, Field of Blood.) <sup>20</sup>&ldquo;For it is written in the Book of Psalms, &lsquo;May his camp become desolate, and let there be no one to dwell in it&rsquo;; and &lsquo;Let another take his office.&rsquo; <sup>21</sup>So one of the men who have accompanied us during all the time that the Lord Jesus went in and out among us, <sup>22</sup>beginning from the baptism of John until the day when he was taken up from us&mdash;one of these men must become with us a witness to his resurrection.&rdquo; <sup>23</sup>And they put forward two, Joseph called Barsabbas, who was also called Justus, and Matthias. <sup>24</sup>And they prayed and said, &ldquo;You, Lord, who know the hearts of all, show which one of these two you have chosen <sup>25</sup>to take the place in this ministry and apostleship from which Judas turned aside to go to his own place.&rdquo; <sup>26</sup>And they cast lots for them, and the lot fell on Matthias, and he was numbered with the eleven apostles.",
    "overview": "<p>After the resurrection, Jesus spent forty days with his disciples &mdash; not hiding, not ascending immediately, but teaching. Teaching about the kingdom of God. There is something deliberate about those forty days. The same God who spent forty years preparing Israel in the wilderness, forty days preparing Moses on the mountain, forty days testing his Son in the desert, now spends forty days confirming to his apostles that the one who died is the one who lives &mdash; and that the one who lives will send what the Father promised. The disciples&rsquo; question &mdash; &ldquo;will you at this time restore the kingdom to Israel?&rdquo; &mdash; is not stupid. It is premature. God&rsquo;s timetable is always larger than ours.</p><p>The ascension is not absence &mdash; it is exaltation. The cloud that receives Jesus is the cloud of divine glory, the Shekinah, the same cloud that led Israel through the wilderness and filled the tabernacle and settled on Sinai. He goes up not to disappear but to reign. And the two men in white robes say what angels always say when humans stare too long at the sky: <em>why do you stand looking into heaven?</em> There is work to do. There is a promise to wait for. There is a world to witness to. The wait in the upper room is not passivity; it is obedience &mdash; and it is prayer.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 1&ndash;3",
        "quote": "&ldquo;all that Jesus began to do and teach&rdquo;",
        "commentary": "<p>Luke&rsquo;s deliberate hinge between his two volumes. The Gospel records what Jesus <em>began</em> to do and teach. Acts records what he <em>continues</em> to do and teach, through his Spirit and his witnesses. The risen Christ is not retired. He is the same Lord who walked the roads of Galilee &mdash; only now he walks through his church into the whole world.</p><p>The forty days of resurrection appearances are &ldquo;many proofs&rdquo; &mdash; <em>tekmēriois</em>, the strongest Greek word for evidence, legal demonstration. Luke is doing history. The resurrection is not a feeling; it is a fact attested by witnesses who ate with him, touched him, heard him, and died for what they saw.</p>"
      },
      {
        "ref": "vv. 4&ndash;5",
        "quote": "&ldquo;wait for the promise of the Father&rdquo;",
        "commentary": "<p>The command to wait is itself an act of grace. The disciples are not capable of the mission in their own strength. Jesus knows this. So before sending them out, he holds them back. Obedience sometimes looks like stillness. The Spirit cannot be hurried, cannot be manufactured, cannot be strategised into existence. He comes when the Father sends him. And so they wait &mdash; and while they wait, they pray.</p>"
      },
      {
        "ref": "v. 8",
        "quote": "&ldquo;you will be my witnesses in Jerusalem and in all Judea and Samaria, and to the end of the earth&rdquo;",
        "commentary": "<p>This is not a command but a promise. Jesus does not say <em>go and be witnesses</em>; he says <em>you will be</em> witnesses. The mission flows from the Spirit&rsquo;s arrival, not from the disciples&rsquo; effort. And the geography is the architecture of the whole book of Acts: Jerusalem (chapters 1&ndash;7), Judea and Samaria (8&ndash;12), the end of the earth (13&ndash;28). The risen Christ has already mapped the route. All that remains is to walk it.</p>"
      },
      {
        "ref": "vv. 9&ndash;11",
        "quote": "&ldquo;a cloud took him out of their sight&rdquo;",
        "commentary": "<p>The cloud is not weather &mdash; it is the Shekinah, the visible glory of the living God. Jesus is received into the presence of the Father in triumph. He goes not as a refugee but as a conqueror. And the angels&rsquo; rebuke of the sky-gazers is tender: <em>why do you stand looking?</em> He will come again in the same way. Until then, there is a world to witness to. The ascension does not close the story; it opens it.</p>"
      },
      {
        "ref": "vv. 24&ndash;26",
        "quote": "&ldquo;You, Lord, who know the hearts of all&rdquo;",
        "commentary": "<p>The prayer before choosing Matthias is a window into how the early church understood decision-making. They did not vote on who seemed most qualified. They prayed to the Lord who knows hearts &mdash; the God of perfect, exhaustive knowledge &mdash; and asked him to show his choice. The lot is not superstition; it is the surrender of human preference to divine sovereignty. God knows who he has chosen. The task of the church is to ask him.</p>"

    "theology": "<p><strong>The Ascension and the Reign of Christ.</strong> The ascension is the most neglected event in the Christian calendar &mdash; and one of the most theologically freighted. It is not simply that Jesus left; it is that he was enthroned. Psalm 110:1 &mdash; &ldquo;The Lord says to my Lord: Sit at my right hand until I make your enemies your footstool&rdquo; &mdash; is the most-quoted Old Testament text in the New Testament. The early church was obsessed with it because it explained everything: Christ reigns now, at the Father&rsquo;s right hand, over all things, for his church (Ephesians 1:20&ndash;23). He is not waiting to begin his kingdom; his kingdom is already here, hidden but real, advancing through the witness of the Spirit-filled church. Every prayer prayed in his name, every sermon preached, every soul converted is an act of the reigning Christ extending his dominion.</p>",
    "examples": "<p><strong>Then:</strong> The disciples in Jerusalem, staring at the sky, confused about timing and kingdom, learning that faithfulness in the interval between the ascension and the return looks like prayer and witness. They had no map, no strategy document, no budget &mdash; only a promise and an upper room.</p><p><strong>Now:</strong> We live in the same interval &mdash; between the first coming and the second, between the already and the not-yet. The temptation is still to stand looking into heaven, obsessing over the date of the return, while the mission sits unfinished at our feet. The command is unchanged: wait in prayer, go in the Spirit, witness to the ends of the earth. He is coming. In the meantime, there is work.</p>"

  "2": {
    "ref": "Chapter 2",
    "title": "The Spirit Poured Out",
    "text": "<sup>1</sup>When the day of Pentecost arrived, they were all together in one place. <sup>2</sup>And suddenly there came from heaven a sound like a mighty rushing wind, and it filled the entire house where they were sitting. <sup>3</sup>And divided tongues as of fire appeared to them and rested on each one of them. <sup>4</sup>And they were all filled with the Holy Spirit and began to speak in other tongues as the Spirit gave them utterance. <sup>5</sup>Now there were dwelling in Jerusalem Jews, devout men from every nation under heaven. <sup>6</sup>And at this sound the multitude came together, and they were bewildered, because each one was hearing them speak in his own language. <sup>7</sup>And they were amazed and astonished, saying, &ldquo;Are not all these who are speaking Galileans? <sup>8</sup>And how is it that we hear, each of us in his own native language? <sup>9</sup>Parthians and Medes and Elamites and residents of Mesopotamia, Judea and Cappadocia, Pontus and Asia, <sup>10</sup>Phrygia and Pamphylia, Egypt and the parts of Libya belonging to Cyrene, and visitors from Rome, <sup>11</sup>both Jews and proselytes, Cretans and Arabians&mdash;we hear them telling in our own tongues the mighty works of God.&rdquo; <sup>12</sup>And all were amazed and perplexed, saying to one another, &ldquo;What does this mean?&rdquo; <sup>13</sup>But others mocking said, &ldquo;They are filled with new wine.&rdquo; <sup>14</sup>But Peter, standing with the eleven, lifted up his voice and addressed them: &ldquo;Men of Judea and all who dwell in Jerusalem, let this be known to you, and give ear to my words. <sup>15</sup>For these people are not drunk, as you suppose, since it is only the third hour of the day. <sup>16</sup>But this is what was uttered through the prophet Joel: <sup>17</sup>&lsquo;And in the last days it shall be, God declares, that I will pour out my Spirit on all flesh, and your sons and your daughters shall prophesy, and your young men shall see visions, and your old men shall dream dreams; <sup>18</sup>even on my male servants and female servants in those days I will pour out my Spirit, and they shall prophesy. <sup>19</sup>And I will show wonders in the heavens above and signs on the earth below, blood, and fire, and vapor of smoke; <sup>20</sup>the sun shall be turned to darkness and the moon to blood, before the day of the Lord comes, the great and magnificent day. <sup>21</sup>And it shall come to pass that everyone who calls upon the name of the Lord shall be saved.&rsquo; <sup>22</sup>&ldquo;Men of Israel, hear these words: Jesus of Nazareth, a man attested to you by God with mighty works and wonders and signs that God did through him in your midst, as you yourselves know&mdash; <sup>23</sup>this Jesus, delivered up according to the definite plan and foreknowledge of God, you crucified and killed by the hands of lawless men. <sup>24</sup>God raised him up, loosing the pangs of death, because it was not possible for him to be held by it. <sup>25</sup>For David says concerning him, &lsquo;I saw the Lord always before me, for he is at my right hand that I may not be shaken; <sup>26</sup>therefore my heart was glad, and my tongue rejoiced; my flesh also will dwell in hope. <sup>27</sup>For you will not abandon my soul to Hades, or let your Holy One see corruption. <sup>28</sup>You have made known to me the paths of life; you will make me full of gladness with your presence.&rsquo; <sup>29</sup>&ldquo;Brothers, I may say to you with confidence about the patriarch David that he both died and was buried, and his tomb is with us to this day. <sup>30</sup>Being therefore a prophet, and knowing that God had sworn with an oath to him that he would set one of his descendants on his throne, <sup>31</sup>he foresaw and spoke about the resurrection of the Christ, that he was not abandoned to Hades, nor did his flesh see corruption. <sup>32</sup>This Jesus God raised up, and of that we all are witnesses. <sup>33</sup>Being therefore exalted at the right hand of God, and having received from the Father the promise of the Holy Spirit, he has poured out this that you yourselves are seeing and hearing. <sup>34</sup>For David did not ascend into the heavens, but he himself says, &lsquo;The Lord said to my Lord, Sit at my right hand, <sup>35</sup>until I make your enemies your footstool.&rsquo; <sup>36</sup>Let all the house of Israel therefore know for certain that God has made him both Lord and Christ, this Jesus whom you crucified.&rdquo; <sup>37</sup>Now when they heard this they were cut to the heart, and said to Peter and the rest of the apostles, &ldquo;Brothers, what shall we do?&rdquo; <sup>38</sup>And Peter said to them, &ldquo;Repent and be baptized every one of you in the name of Jesus Christ for the forgiveness of your sins, and you will receive the gift of the Holy Spirit. <sup>39</sup>For the promise is for you and for your children and for all who are far off, everyone whom the Lord our God calls to himself.&rdquo; <sup>40</sup>And with many other words he bore witness and continued to exhort them, saying, &ldquo;Save yourselves from this crooked generation.&rdquo; <sup>41</sup>So those who received his word were baptized, and there were added that day about three thousand souls. <sup>42</sup>And they devoted themselves to the apostles&rsquo; teaching and the fellowship, to the breaking of bread and the prayers. <sup>43</sup>And awe came upon every soul, and many wonders and signs were being done through the apostles. <sup>44</sup>And all who believed were together and had all things in common. <sup>45</sup>And they were selling their possessions and belongings and distributing the proceeds to all, as any had need. <sup>46</sup>And day by day, attending the temple together and breaking bread in their homes, they received their food with glad and generous hearts, <sup>47</sup>praising God and having favor with all the people. And the Lord added to their number day by day those who were being saved.",
    "overview": "<p>Everything changes on the day of Pentecost. The sound of a rushing wind fills the house &mdash; not a gentle breeze but a roar, a theophany, the breath of God filling the room as he once breathed life into Adam&rsquo;s nostrils. Tongues of fire rest on each one of them &mdash; not one tongue over Peter, not one flame above the leaders, but one for each. The Spirit is poured out, as Joel said, on all flesh. This is not an upgrade of the old covenant. This is the new creation beginning.</p><p>Peter stands up. This is the same Peter who three times denied knowing Jesus by a charcoal fire. Now he stands before thousands and opens his mouth and the Scripture pours out &mdash; Joel, David, the resurrection, the exaltation, the gift of the Spirit. The sermon does not argue for the resurrection; it announces it. And the announcement lands with the force of a hammer: &ldquo;they were cut to the heart.&rdquo; Three thousand baptized in one day. The church is born not by strategy but by proclamation.</p><p>And then the four marks of the early church appear, simple and complete: the apostles&rsquo; teaching, the fellowship, the breaking of bread, and the prayers. Everything the church needs to be the church was given on that day and has never been taken back.</p>",

        "commentary": "<p>The Spirit&rsquo;s arrival is unmistakable. Sound, wind, fire, tongues &mdash; the vocabulary of theophany, of God drawing near in power. This is not a quiet spiritual experience; it is an invasion. The God who spoke at Sinai in thunder and fire now pours himself out on a gathered people of prayer. And the tongues are not glossolalia but known human languages &mdash; the list in vv. 9&ndash;11 is a tour of the known world. Babel is being reversed. The scattering of Genesis 11 is beginning to be undone.</p>"

        "commentary": "<p>The sermon ends not with an invitation but with a declaration. Peter does not ask the crowd to consider making Jesus their Lord. He announces what God has already done: he has made Jesus <em>Lord</em> &mdash; <em>Kyrios</em>, the title of YHWH in the Greek Old Testament &mdash; and Christ, the promised anointed King. The one they crucified is the one who reigns. The only question left is what to do with that fact.</p>"

        "commentary": "<p>This is the Holy Spirit&rsquo;s work, not Peter&rsquo;s rhetoric. The Word proclaimed in the power of the Spirit pierces where no argument can reach &mdash; to the conscience, to the heart&rsquo;s deepest recognition of its own guilt before God. And the answer to &ldquo;what shall we do?&rdquo; is always the same: repent. Turn. Be baptized in the name of Jesus. Receive the gift of the Spirit. The gospel is not complicated; it is costly &mdash; it requires the death of the self that clings to its own righteousness.</p>"

    "theology": "<p><strong>The Sovereignty of God at the Cross.</strong> Acts 2:23 is the Reformed doctrine of divine sovereignty distilled to a sentence. The cross happened &ldquo;according to the definite plan and foreknowledge of God.&rdquo; The Greek word translated &ldquo;definite plan&rdquo; is <em>boul&#275;</em> &mdash; God&rsquo;s eternal counsel, his settled, unalterable purpose. This is not foreknowledge in the Arminian sense of God merely looking ahead and seeing what humans would choose. This is foreordination: God planned the cross before the world began (1 Peter 1:20, Revelation 13:8). Total depravity and sovereign grace appear in one verse: the guilt is wholly human, the purpose is wholly divine. The cross is the intersection of man&rsquo;s worst deed and God&rsquo;s greatest gift.</p>",

  "3": {
    "ref": "Chapter 3",
    "title": "The Lame Man and the Living Lord",
    "text": "<sup>1</sup>Now Peter and John were going up to the temple at the hour of prayer, the ninth hour. <sup>2</sup>And a man lame from birth was being carried, whom they laid daily at the gate of the temple that is called the Beautiful Gate to ask alms of those entering the temple. <sup>3</sup>Seeing Peter and John about to go into the temple, he asked to receive alms. <sup>4</sup>And Peter directed his gaze at him, as did John, and said, &ldquo;Look at us.&rdquo; <sup>5</sup>And he fixed his attention on them, expecting to receive something from them. <sup>6</sup>But Peter said, &ldquo;I have no silver and gold, but what I do have I give to you. In the name of Jesus Christ of Nazareth, rise up and walk!&rdquo; <sup>7</sup>And he took him by the right hand and raised him up, and immediately his feet and ankles were made strong. <sup>8</sup>And leaping up, he stood and began to walk, and entered the temple with them, walking and leaping and praising God. <sup>9</sup>And all the people saw him walking and praising God, <sup>10</sup>and recognized him as the one who sat at the Beautiful Gate of the temple, asking for alms. And they were filled with wonder and amazement at what had happened to him. <sup>11</sup>While he clung to Peter and John, all the people, utterly astounded, ran together to them in the portico called Solomon&rsquo;s Portico. <sup>12</sup>And when Peter saw it he addressed the people: &ldquo;Men of Israel, why do you wonder at this, or why do you stare at us, as though by our own power or piety we had made him walk? <sup>13</sup>The God of Abraham, the God of Isaac, and the God of Jacob, the God of our fathers, glorified his servant Jesus, whom you delivered over and denied in the presence of Pilate, when he had decided to release him. <sup>14</sup>But you denied the Holy and Righteous One, and asked for a murderer to be granted to you, <sup>15</sup>and you killed the Author of life, whom God raised from the dead. To this we are witnesses. <sup>16</sup>And his name&mdash;by faith in his name&mdash;has made this man strong whom you see and know, and the faith that is through Jesus has given the man this perfect health in the presence of you all. <sup>17</sup>&ldquo;And now, brothers, I know that you acted in ignorance, as did also your rulers. <sup>18</sup>But what God foretold by the mouth of all the prophets, that his Christ would suffer, he thus fulfilled. <sup>19</sup>Repent therefore, and turn back, that your sins may be blotted out, <sup>20</sup>that times of refreshing may come from the presence of the Lord, and that he may send the Christ appointed for you, Jesus, <sup>21</sup>whom heaven must receive until the time for restoring all the things about which God spoke by the mouth of his holy prophets long ago. <sup>22</sup>Moses said, &lsquo;The Lord God will raise up for you a prophet like me from your brothers. You shall listen to him in whatever he tells you. <sup>23</sup>And it shall be that every soul who does not listen to that prophet shall be destroyed from the people.&rsquo; <sup>24</sup>And all the prophets who have spoken, from Samuel and those who came after him, also proclaimed these days. <sup>25</sup>You are the sons of the prophets and of the covenant that God made with your fathers, saying to Abraham, &lsquo;And in your offspring shall all the families of the earth be blessed.&rsquo; <sup>26</sup>God, having raised up his servant, sent him to you first, to bless you by turning every one of you from your wickedness.&rdquo;",
    "overview": "<p>Silver and gold has Peter none. This is not a confession of poverty but a declaration of what he does have: &ldquo;In the name of Jesus Christ of Nazareth, rise up and walk.&rdquo; The man at the Beautiful Gate has been lame from birth &mdash; forty years of sitting, of watching others enter the temple he could not enter, of reaching out his hand to receive what others chose to give. In one moment, at the word of Peter and the power of the risen Christ, his ankles are strengthened, and he goes in walking and leaping and praising God. He who could not enter the temple now cannot stop praising the God of the temple.</p><p>But Luke wants us to see more than a healing. The sermon that follows is the point. Peter will not let the crowd look at him; he points them past himself to the God of Abraham, Isaac, and Jacob who has glorified his servant Jesus. The healing is a sign &mdash; what God has done in this man&rsquo;s body is a picture of what God is doing in the world: the lame are walking, the guilty are forgiven, the dead are raised. All of it through the name that is above every name.</p>",
    "verseByVerse": [
      {

        "quote": "&ldquo;the ninth hour&rdquo;",
        "commentary": "<p>Peter and John are going to prayer. The healing happens in the rhythms of ordinary faithfulness. The man at the gate is there every day; Peter and John are at the temple every day for prayer. Divine appointments do not usually arrive by interrupting extraordinary schedules; they arrive in the middle of ordinary ones. The God who governs all things arranges this intersection: a man who needs what only Christ can give, and two men who carry his name.</p>"
      },
      {
        "ref": "v. 6",
        "quote": "&ldquo;what I do have I give to you. In the name of Jesus Christ of Nazareth, rise up and walk&rdquo;",
        "commentary": "<p>The church&rsquo;s true wealth is not silver and gold but the name &mdash; the living, risen, reigning name of Jesus Christ. Peter is not performing a ritual or using a formula; he is speaking to a man in the authority of the one he knows to be alive. The gift he gives costs him nothing and gives the man everything. This is always how the gospel works: given freely, received by faith, transforming completely.</p>"
      },
      {
        "ref": "vv. 13&ndash;15",
        "quote": "&ldquo;you killed the Author of life, whom God raised from the dead&rdquo;",
        "commentary": "<p>Peter&rsquo;s indictment is precise and devastating. The crowd handed over the one Pilate wanted to release. They denied the Holy and Righteous One &mdash; the very one their covenant and their temple pointed to. They asked for a murderer and killed the Author of life. The irony is total: they chose death over Life himself. But then comes the hinge: <em>whom God raised from the dead</em>. Their worst deed could not defeat the one they killed. The Author of life cannot be permanently authored out of existence.</p>"
      },
      {
        "ref": "v. 16",
        "quote": "&ldquo;his name &mdash; by faith in his name &mdash; has made this man strong&rdquo;",
        "commentary": "<p>Peter is careful about the mechanism. The name of Jesus, received through faith &mdash; this is the double cord. The name is not a magical incantation; it is the person of the risen Christ, appropriated by trust. The healing is a window onto what faith in the living Christ always produces: strength where there was weakness, wholeness where there was brokenness, praise where there was silence.</p>"
      },
      {
        "ref": "vv. 19&ndash;21",
        "quote": "&ldquo;Repent therefore, and turn back, that your sins may be blotted out&rdquo;",
        "commentary": "<p>The offer of mercy is immediate and total. <em>Blotted out</em> &mdash; erased, cancelled, wiped from the record. The same people who called for the crucifixion are being offered full pardon. This is the scandalous generosity of the gospel: the sin that killed the Saviour is the sin the Saviour forgives. And there is more: times of refreshing from the presence of the Lord, and the return of the Christ appointed for them. The gospel is not just forensic acquittal; it is the opening of a future.</p>"

    "theology": "<p><strong>The Name of Jesus.</strong> &ldquo;His name &mdash; by faith in his name &mdash; has made this man strong&rdquo; (v. 16). This verse is not about a formula but about a person. The name in the ancient world carried the authority and presence of the one who bore it. When Peter speaks the name of Jesus, he is not invoking magic; he is acting in the delegated authority of the reigning Christ. The healing is an act of the risen Lord performed through his servant. Faith is the hand that reaches for what the name offers. And what the name offers is the full power of the one who conquered death &mdash; resurrection life, flowing through a living faith, into a broken body and a guilty conscience alike.</p>",
    "examples": "<p><strong>Then:</strong> A man lame from birth, set daily at the gate of the temple he could not enter, excluded by his condition from the presence he longed for. His whole life had been one long reaching-out of an empty hand. And then, in the name of Jesus, he entered the temple walking.</p><p><strong>Now:</strong> The church still carries what the world cannot give. No program, no therapy, no government initiative can do what the name of Jesus does &mdash; not because those things are worthless, but because they cannot raise the dead. The church&rsquo;s temptation in every generation is to be embarrassed by its true wealth and to offer silver and gold instead. The world has plenty of silver and gold. It has only one name by which it can be saved.</p>"

  "4": {
    "ref": "Chapter 4",
    "title": "Boldness Before the Council",
    "text": "<sup>1</sup>And as they were speaking to the people, the priests and the captain of the temple and the Sadducees came upon them, <sup>2</sup>greatly annoyed because they were teaching the people and proclaiming in Jesus the resurrection from the dead. <sup>3</sup>And they arrested them and put them in custody until the next day, for it was already evening. <sup>4</sup>But many of those who had heard the word believed, and the number of the men came to about five thousand. <sup>5</sup>On the next day their rulers and elders and scribes gathered together in Jerusalem, <sup>6</sup>with Annas the high priest and Caiaphas and John and Alexander, and all who were of the high-priestly family. <sup>7</sup>And when they had set them in the midst, they inquired, &ldquo;By what power or by what name did you do this?&rdquo; <sup>8</sup>Then Peter, filled with the Holy Spirit, said to them, &ldquo;Rulers of the people and elders, <sup>9</sup>if we are being examined today concerning a good deed done to a crippled man, by what means this man has been healed, <sup>10</sup>let it be known to all of you and to all the people of Israel that by the name of Jesus Christ of Nazareth, whom you crucified, whom God raised from the dead&mdash;by him this man is standing before you well. <sup>11</sup>This Jesus is the stone that was rejected by you, the builders, which has become the cornerstone. <sup>12</sup>And there is salvation in no one else, for there is no other name under heaven given among men by which we must be saved.&rdquo; <sup>13</sup>Now when they saw the boldness of Peter and John, and perceived that they were uneducated, common men, they were astonished. And they recognized that they had been with Jesus. <sup>14</sup>But seeing the man who was healed standing beside them, they had nothing to say in opposition. <sup>15</sup>But when they had commanded them to leave the council, they conferred with one another, <sup>16</sup>saying, &ldquo;What shall we do with these men? For that a notable sign has been performed through them is evident to all the inhabitants of Jerusalem, and we cannot deny it. <sup>17</sup>But in order that it may spread no further among the people, let us warn them to speak no more to anyone in this name.&rdquo; <sup>18</sup>So they called them and charged them not to speak or teach at all in the name of Jesus. <sup>19</sup>But Peter and John answered them, &ldquo;Whether it is right in the sight of God to listen to you rather than to God, you judge, <sup>20</sup>for we cannot but speak of what we have seen and heard.&rdquo; <sup>21</sup>And when they had further threatened them, they let them go, finding no way to punish them, because of the people, for all were glorifying God for what had happened. <sup>22</sup>For the man on whom this sign of healing was performed was more than forty years old. <sup>23</sup>When they were released, they went to their friends and reported what the chief priests and the elders had said to them. <sup>24</sup>And when they heard it, they lifted their voices together to God and said, &ldquo;Sovereign Lord, who made the heaven and the earth and the sea and everything in them, <sup>25</sup>who through the mouth of our father David, your servant, said by the Holy Spirit, &lsquo;Why did the Gentiles rage, and the peoples plot in vain? <sup>26</sup>The kings of the earth set themselves, and the rulers were gathered together, against the Lord and against his Anointed&rsquo;&mdash; <sup>27</sup>for truly in this city there were gathered together against your holy servant Jesus, whom you anointed, both Herod and Pontius Pilate, along with the Gentiles and the peoples of Israel, <sup>28</sup>to do whatever your hand and your plan had predestined to take place. <sup>29</sup>And now, Lord, look upon their threats and grant to your servants to continue to speak your word with all boldness, <sup>30</sup>while you stretch out your hand to heal, and signs and wonders are performed through the name of your holy servant Jesus.&rdquo; <sup>31</sup>And when they had prayed, the place in which they were gathered together was shaken, and they were all filled with the Holy Spirit and continued to speak the word of God with boldness. <sup>32</sup>Now the full number of those who believed were of one heart and soul, and no one said that any of the things that belonged to him was his own, but they had everything in common. <sup>33</sup>And with great power the apostles were giving their testimony to the resurrection of the Lord Jesus, and great grace was upon them all. <sup>34</sup>There was not a needy person among them, for as many as were owners of lands or houses sold them and brought the proceeds of what was sold <sup>35</sup>and laid it at the apostles&rsquo; feet, and it was distributed to each as any had need. <sup>36</sup>Thus Joseph, who was also called by the apostles Barnabas (which means son of encouragement), a Levite, a native of Cyprus, <sup>37</sup>sold a field that belonged to him and brought the money and laid it at the apostles&rsquo; feet.",
    "overview": "<p>The Sadducees are annoyed. They have tolerated a great deal, but the resurrection &mdash; they cannot have the resurrection preached in the temple courts. For the Sadducees, resurrection is not just wrong theology; it is a direct challenge to their authority. So they arrest Peter and John. But it is too late: five thousand have believed. The arrest comes after the harvest. This is the pattern in Acts: the Word goes out, the kingdom grows, the opposition rises &mdash; and the opposition never wins.</p><p>The next morning Peter stands before the same council that tried Jesus. He is not the same Peter. Filled with the Holy Spirit, he does not hedge, does not soften, does not negotiate. He gives them the name: Jesus Christ of Nazareth, whom you crucified, whom God raised from the dead. And then the sentence that has stopped every comfortable ecumenism in its tracks: &ldquo;there is no other name under heaven given among men by which we must be saved.&rdquo; The council marvels. They cannot deny the miracle &mdash; the healed man is standing right there. They can only warn. And Peter and John go back to the church and they pray.</p><p>The prayer is worth lingering over. They do not pray for safety. They do not pray for the opposition to relent. They pray for boldness. And the place is shaken.</p>",

        "commentary": "<p>Luke&rsquo;s note is deliberate: filled with the Holy Spirit <em>in that moment</em>, before that council. This is not the residual boldness of a man who had prayed and built up his courage. This is fresh supply, given in the moment of need. Jesus promised this: &ldquo;when they bring you before the synagogues and the rulers and the authorities, do not be anxious about how you should defend yourself or what you should say, for the Holy Spirit will teach you in that very hour what you ought to say&rdquo; (Luke 12:11&ndash;12). The promise was not theoretical. It was kept.</p>"

        "commentary": "<p>Peter quotes Psalm 118:22 &mdash; the stone the builders rejected has become the cornerstone &mdash; and then draws the implication without apology. The exclusivity of Christ is not arrogance; it is announcement. Peter is not claiming that Christians are better than anyone else; he is declaring that God has appointed one name and one way by which guilty human beings may be rescued from judgment. The word <em>must</em> carries the weight of divine necessity: there is no alternative because God has provided none. This is either the most loving thing ever said, or the most offensive &mdash; depending entirely on whether it is true.</p>"

        "commentary": "<p>The prayer is astonishing in its theology. The church has just been threatened by the most powerful religious authority in the land &mdash; and they begin their prayer by worshipping the Creator of everything. They quote Psalm 2 and apply it to the crucifixion: Herod, Pilate, the Gentiles, the people of Israel &mdash; all of them gathered against Jesus, and all of them doing exactly what God&rsquo;s hand and plan had predestined. Sovereign over the worst the world could do. If God was sovereign over the cross, he is sovereign over the threats of a local council.</p>"

      {

        "commentary": "<p>They do not pray for safety. They do not pray for the council to become nicer. They pray for boldness &mdash; that they might keep speaking in the very face of what threatens them. And the answer is immediate and physical: the place is shaken, they are filled with the Spirit, and they speak with boldness. God does not always remove the threat; he always equips his servants to stand in it.</p>"

    "theology": "<p><strong>The Sovereignty of God and Mission.</strong> The prayer of Acts 4:24&ndash;30 is a theology lecture compressed into seven verses. God is addressed as <em>despotēs</em> &mdash; Sovereign Lord, absolute Master &mdash; who made heaven and earth and everything in them. Herod and Pilate and the nations, in their opposition to Christ, did &ldquo;whatever your hand and your plan had predestined to take place.&rdquo; This is not fatalism; it is the Reformed doctrine of providence applied to history&rsquo;s darkest moment. And the implication for mission is not paralysis but boldness: if God was sovereign over the crucifixion, he is sovereign over every threat to the gospel. The church does not need favourable conditions to advance the kingdom. It needs the Spirit and the Word. God provides both.</p>",
    "examples": "<p><strong>Then:</strong> A church five weeks old, under arrest, before the same council that crucified their Lord, with no legal protection, no political allies, no plan B &mdash; and they prayed for boldness and were given it. The shaking of the place was God&rsquo;s receipt: prayer received, boldness granted.</p><p><strong>Now:</strong> The church in every hostile culture faces the same fork: silence or speech, safety or boldness. The prayer of Acts 4 is still available. The God who shook that room has not grown quiet. He is still the Sovereign Lord who made heaven and earth. And he still grants boldness to those who ask for it &mdash; not because they deserve it, but because his Word must go out.</p>"

  "5": {
    "ref": "Chapter 5",
    "title": "The Fear of the Lord",
    "text": "<sup>1</sup>But a man named Ananias, with his wife Sapphira, sold a piece of property, <sup>2</sup>and with his wife&rsquo;s knowledge he kept back for himself some of the proceeds and brought only a part of it and laid it at the apostles&rsquo; feet. <sup>3</sup>But Peter said, &ldquo;Ananias, why has Satan filled your heart to lie to the Holy Spirit and to keep back for yourself part of the proceeds of the land? <sup>4</sup>While it remained unsold, did it not remain your own? And after it was sold, was it not at your disposal? Why is it that you have contrived this deed in your heart? You have not lied to man but to God.&rdquo; <sup>5</sup>When Ananias heard these words, he fell down and breathed his last. And great fear came upon all who heard of it. <sup>6</sup>The young men rose and wrapped him up and carried him out and buried him. <sup>7</sup>After an interval of about three hours his wife came in, not knowing what had happened. <sup>8</sup>And Peter said to her, &ldquo;Tell me whether you sold the land for so much.&rdquo; And she said, &ldquo;Yes, for so much.&rdquo; <sup>9</sup>But Peter said to her, &ldquo;How is it that you have agreed together to test the Spirit of the Lord? Behold, the feet of those who have buried your husband are at the door, and they will carry you out.&rdquo; <sup>10</sup>Immediately she fell down at his feet and breathed her last. When the young men came in they found her dead, and they carried her out and buried her beside her husband. <sup>11</sup>And great fear came upon the whole church and upon all who heard of these things. <sup>12</sup>Now many signs and wonders were regularly done among the people by the hands of the apostles. And they were all together in Solomon&rsquo;s Portico. <sup>13</sup>None of the rest dared join them, but the people held them in high esteem. <sup>14</sup>And more than ever believers were added to the Lord, multitudes of both men and women, <sup>15</sup>so that they even carried out the sick into the streets and laid them on cots and mats, that as Peter passed his shadow might fall on some of them. <sup>16</sup>The people also gathered from the towns around Jerusalem, bringing the sick and those afflicted with unclean spirits, and they were all healed. <sup>17</sup>But the high priest rose up, and all who were with him (that is, the party of the Sadducees), and filled with jealousy <sup>18</sup>they arrested the apostles and put them in the public prison. <sup>19</sup>But during the night an angel of the Lord opened the prison doors and brought them out, and said, <sup>20</sup>&ldquo;Go and stand in the temple and speak to the people all the words of this Life.&rdquo; <sup>21</sup>And when they heard this, they entered the temple at daybreak and began to teach. Now when the high priest came, and those who were with him, they called together the council and all the senate of Israel and sent to the prison to have them brought. <sup>22</sup>But when the officers came, they did not find them in the prison, and they returned and reported, <sup>23</sup>&ldquo;We found the prison securely locked and the guards standing at the doors, but when we opened them we did not find anyone inside.&rdquo; <sup>24</sup>Now when the captain of the temple and the chief priests heard these words, they were greatly perplexed about them, wondering what this would come to. <sup>25</sup>And someone came and told them, &ldquo;Look! The men whom you put in prison are standing in the temple and teaching the people.&rdquo; <sup>26</sup>Then the captain with the officers went and brought them, but not by force, for they were afraid of being stoned by the people. <sup>27</sup>And when they had brought them, they set them before the council. And the high priest questioned them, <sup>28</sup>saying, &ldquo;We strictly charged you not to teach in this name, yet here you have filled Jerusalem with your teaching, and you intend to bring this man&rsquo;s blood upon us.&rdquo; <sup>29</sup>But Peter and the apostles answered, &ldquo;We must obey God rather than men. <sup>30</sup>The God of our fathers raised Jesus, whom you killed by hanging him on a tree. <sup>31</sup>God exalted him at his right hand as Leader and Savior, to give repentance to Israel and forgiveness of sins. <sup>32</sup>And we are witnesses to these things, and so is the Holy Spirit, whom God has given to those who obey him.&rdquo; <sup>33</sup>When they heard this, they were enraged and wanted to kill them. <sup>34</sup>But a Pharisee in the council named Gamaliel, a teacher of the law held in honor by all the people, stood up and gave orders to put the men outside for a little while. <sup>35</sup>And he said to them, &ldquo;Men of Israel, take care what you are about to do with these men. <sup>36</sup>For before these days Theudas rose up, claiming to be somebody, and a number of men, about four hundred, joined him. He was killed, and all who followed him were dispersed and came to nothing. <sup>37</sup>After him Judas the Galilean rose up in the days of the census and drew away some of the people after him. He too perished, and all who followed him were scattered. <sup>38</sup>So in the present case I tell you, keep away from these men and let them alone, for if this plan or this undertaking is of man, it will fail; <sup>39</sup>but if it is of God, you will not be able to overthrow them. You might even be found opposing God!&rdquo; So they took his advice, <sup>40</sup>and when they had called in the apostles, they beat them and charged them not to speak in the name of Jesus, and let them go. <sup>41</sup>Then they left the presence of the council, rejoicing that they were counted worthy to suffer dishonor for the name. <sup>42</sup>And every day, in the temple and from house to house, they did not cease teaching and preaching that the Christ is Jesus.",
    "overview": "<p>Two things happen in Acts 5 that seem to pull in opposite directions &mdash; and both are necessary. Ananias and Sapphira fall dead for lying to the Holy Spirit. And the apostles are beaten and leave the council rejoicing. The fear of God and the joy of the Lord are not opposites; they are the two poles of a life lived before the face of the Holy One. A church that has lost one will eventually lose both.</p><p>The sin of Ananias and Sapphira is not that they kept some of the money. Peter makes this explicit: the money was theirs to keep. The sin is the performance &mdash; the pretence of complete consecration while secretly holding back. They lied to the Holy Spirit. The God who fills his church with his presence will not be managed or deceived within his own house. The result: great fear came upon the whole church. This is the fear that is the beginning of wisdom. The church needed it then. The church always needs it.</p><p>Then the apostles are beaten. And they leave rejoicing that they were counted worthy to suffer dishonour for the name. This is not stoicism; this is the freedom of those who have been so captured by the worth of Christ that physical suffering has become, in the light of his glory, a privilege they are grateful to share.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 3&ndash;4",

        "commentary": "<p>Peter&rsquo;s diagnosis is the most important moment in the chapter. Ananias thought he was deceiving the apostles. He was deceiving God. The Holy Spirit who dwells in the church is God himself &mdash; the third Person of the Trinity &mdash; and the church&rsquo;s internal life is conducted before him. There are no private corners in the house of God, no performances he does not see through. The purity of the new covenant community is a matter of divine concern, not merely ecclesial management.</p>"

    "theology": "<p><strong>The Holiness of God in the New Covenant Community.</strong> The deaths of Ananias and Sapphira are not anomalies &mdash; they have a precise parallel in Leviticus 10, where Nadab and Abihu are struck dead at the founding of the tabernacle worship. At every founding moment of a new covenant expression, God makes his holiness unmistakable. He did it at Sinai. He did it in the wilderness. He does it here, at the birth of the church. The message is the same: I am holy. You are dwelling in the presence of the Holy One. This is not a place for pretence. It is not that God is more severe in the new covenant than the old; it is that the new covenant community lives in an even closer proximity to the Holy Spirit than any previous generation, and proximity to holiness demands purity.</p>",
    "examples": "<p><strong>Then:</strong> A Jerusalem church five weeks old, discovering that the Spirit who fills them also searches them &mdash; and that the God of grace is also the God of holiness. The fear that fell on the church was not paralyzing; the next verse tells us that believers were added to the Lord in multitudes. Healthy fear of God does not drive people away from him; it drives away the casual, and draws in the sincere.</p><p><strong>Now:</strong> The contemporary church has largely lost the category of the fear of God. We speak of grace, love, and welcome &mdash; and rightly so. But a church that never trembles before the holiness of God has not understood grace; it has domesticated it. Ananias and Sapphira remind every generation that the Spirit cannot be fooled, that the church is not a social club, and that God&rsquo;s presence is still a consuming fire.</p>"
