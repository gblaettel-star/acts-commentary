  "12": {
    "ref": "Chapter 12",
    "title": "The Prison and the Providence",
    "text": "<sup>1</sup>About that time Herod the king laid violent hands on some who belonged to the church. <sup>2</sup>He killed James the brother of John with the sword. <sup>3</sup>And when he saw that it pleased the Jews, he proceeded to arrest Peter also. This was during the days of Unleavened Bread. <sup>4</sup>And when he had seized him, he put him in prison, delivering him over to four squads of soldiers to guard him, intending after the Passover to bring him out to the people. <sup>5</sup>So Peter was kept in prison, but earnest prayer for him was made to God by the church. <sup>6</sup>Now when Herod was about to bring him out, on that very night, Peter was sleeping between two soldiers, bound with two chains, and sentinels before the door were guarding the prison. <sup>7</sup>And behold, an angel of the Lord stood next to him, and a light shone in the cell. He struck Peter on the side and woke him, saying, &ldquo;Get up quickly.&rdquo; And the chains fell off his hands. <sup>8</sup>And the angel said to him, &ldquo;Dress yourself and put on your sandals.&rdquo; And he did so. And he said to him, &ldquo;Wrap your cloak around you and follow me.&rdquo; <sup>9</sup>And he went out and followed him. He did not know that what was being done by the angel was real, but thought he was seeing a vision. <sup>10</sup>When they had passed the first and the second guard, they came to the iron gate leading into the city. It opened for them of its own accord, and they went out and went along one street, and immediately the angel left him. <sup>11</sup>When Peter came to himself, he said, &ldquo;Now I am sure that the Lord has sent his angel and rescued me from the hand of Herod and from all that the Jewish people were expecting.&rdquo; <sup>12</sup>When he realized this, he went to the house of Mary, the mother of John whose other name was Mark, where many were gathered together and were praying. <sup>13</sup>And when he knocked at the door of the gateway, a servant girl named Rhoda came to answer. <sup>14</sup>Recognizing Peter&rsquo;s voice, in her joy she did not open the gate but ran in and reported that Peter was standing at the gate. <sup>15</sup>They said to her, &ldquo;You are out of your mind.&rdquo; But she kept insisting that it was so, and they kept saying, &ldquo;It is his angel!&rdquo; <sup>16</sup>But Peter continued knocking, and when they opened, they saw him and were amazed. <sup>17</sup>But motioning to them with his hand to be silent, he described to them how the Lord had brought him out of the prison. And he said, &ldquo;Tell these things to James and to the brothers.&rdquo; Then he departed and went to another place. <sup>18</sup>Now when day came, there was no little disturbance among the soldiers over what had become of Peter. <sup>19</sup>And after Herod searched for him and did not find him, he examined the sentinels and ordered that they should be put to death. Then he went down from Judea to Caesarea and spent time there. <sup>20</sup>Now Herod was angry with the people of Tyre and Sidon, and they came to him with one accord, and having persuaded Blastus, the king&rsquo;s chamberlain, they asked for peace, because their country depended on the king&rsquo;s country for food. <sup>21</sup>On an appointed day Herod put on his royal robes, took his seat upon the throne, and delivered an oration to them. <sup>22</sup>And the people were shouting, &ldquo;The voice of a god, and not of a man!&rdquo; <sup>23</sup>Immediately an angel of the Lord struck him down, because he did not give God the glory, and he was eaten by worms and breathed his last. <sup>24</sup>But the word of God increased and multiplied. <sup>25</sup>And Barnabas and Saul returned from Jerusalem when they had completed their service, bringing with them John, whose other name was Mark.",
    "overview": "<p>Herod Agrippa is playing to the crowd. He has killed James the son of Zebedee with the sword &mdash; the first of the twelve to be martyred &mdash; and it pleased the Jews, so he arrests Peter. The calculation is purely political. Herod is not a theological opponent; he is a man who will do whatever secures his power. And in the background, the church is praying.</p><p>The contrast Luke draws in this chapter is stark and deliberate: Herod&rsquo;s power on one side, God&rsquo;s providence on the other. Sixteen soldiers, chains, iron gates, maximum security &mdash; and Peter sleeping so peacefully that the angel has to strike him on the side to wake him. The man who is about to be executed is asleep. This is the peace that passes understanding &mdash; the peace of a man who knows that his life is in hands that Herod cannot reach.</p><p>The liberation is almost comic in its details: Peter thinks he is dreaming, Rhoda is too astonished to open the gate, the praying church refuses to believe their prayers are answered. But the most important moment in the chapter may be the shortest sentence: &ldquo;But the word of God increased and multiplied.&rdquo; Herod is dead, eaten by worms, and the Word is alive and growing. This is the verdict of history on every power that has set itself against the gospel.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 1&ndash;2",
        "quote": "&ldquo;He killed James the brother of John with the sword&rdquo;",
        "commentary": "<p>James dies, Peter is released. Both outcomes are equally within God&rsquo;s providence. This is the part of Reformed theology that is hardest to sit with: God governs all things, and sometimes his governance includes the martyrdom of his servants. James is not less loved or less elect than Peter. His death is not a failure of God&rsquo;s care; it is the completion of his appointed course. Jesus told James and John they would drink his cup (Mark 10:39). James drinks it here. The God who holds every life in his hands sometimes holds them all the way to death &mdash; and then beyond it.</p>"
      },
      {
        "ref": "v. 5",
        "quote": "&ldquo;but earnest prayer for him was made to God by the church&rdquo;",
        "commentary": "<p>The church&rsquo;s response to Herod&rsquo;s power is prayer. Not petition, not protest, not political strategy &mdash; prayer. <em>Ektenōs</em> &mdash; earnestly, stretched-out prayer, the kind that does not stop. The church cannot open the prison; God can. And so the church does what the church does when it is most itself: it brings the impossible to the God for whom nothing is impossible. The release of Peter is the answer to this prayer &mdash; which makes it all the more remarkable that the praying church cannot quite believe the answer when it knocks on their door.</p>"
      },
      {
        "ref": "vv. 6&ndash;7",
        "quote": "&ldquo;Peter was sleeping between two soldiers&rdquo;",
        "commentary": "<p>Peter is asleep the night before his scheduled execution. This is either remarkable faith or the peace of a man who has surrendered his life so completely to Christ that death has lost its terror. Jesus slept in a storm-tossed boat (Mark 4:38). Peter sleeps in a condemned cell. The God who gives his beloved sleep (Psalm 127:2) gives it in the most unlikely places. The chains, the soldiers, the iron gate &mdash; none of it can disturb the rest of a man who is held by God.</p>"
      },
      {
        "ref": "vv. 14&ndash;16",
        "quote": "&ldquo;They said to her, &lsquo;You are out of your mind.&rsquo;&rdquo;",
        "commentary": "<p>The praying church does not believe their prayers have been answered. Rhoda&rsquo;s testimony is dismissed as madness, and then they theorize that it must be Peter&rsquo;s angel. Meanwhile, Peter keeps knocking. Luke tells this story with gentle humour, but the point is serious: we so often pray for what we do not truly expect. The gap between our theology and our faith is embarrassingly wide. The miracle happened while they were praying, and they were the last to believe it.</p>"
      },
      {
        "ref": "v. 23&ndash;24",
        "quote": "&ldquo;because he did not give God the glory&rdquo;&hellip; &ldquo;But the word of God increased and multiplied&rdquo;",
        "commentary": "<p>Two sentences in sequence that contain the whole verdict of history. The man who accepted worship due to God alone is struck down and dies in ignominy. And the Word he tried to suppress &mdash; by killing James, by imprisoning Peter &mdash; increased and multiplied. Herod is a footnote. The Word is the main character. Every Caesar, every Herod, every power that has set itself against the gospel has discovered the same thing: you cannot chain what God has set loose.</p>"
      }
    ],
    "theology": "<p><strong>Providence, Prayer, and the Sovereignty of God over Kings.</strong> Acts 12 is a meditation on what it means to live under the providence of a God who governs kings and councils, who opens prison gates and strikes down tyrants, and who is not moved by the calculations of the powerful. James dies; Peter lives &mdash; both by divine appointment. The church prays; the answer comes &mdash; and still takes them by surprise. Herod grasps at divine honour; he is given worms and silence. This is the world the New Testament describes: not a world where God occasionally intervenes, but a world where God is always governing &mdash; every chain, every gate, every angel, every worm. The appropriate response is not to explain his ways, but to pray, to trust, and to keep speaking the Word that outlasts every king.</p>",
    "examples": "<p><strong>Then:</strong> A church under a murderous king, with no political recourse, no legal protection, and no army &mdash; meeting in a house and praying with everything they had. Their prayers opened a prison door thirty miles from where they sat. They did not know it would happen that way. They prayed because there was nothing else to do, and because the God they prayed to had not changed.</p><p><strong>Now:</strong> The church in every hostile political environment must learn the same calculus: Herod has soldiers; God has angels. Herod has chains; God has the Word. The appropriate response to power arrayed against the gospel is not despair and not political calculation &mdash; it is earnest, persistent, expectant prayer to the Sovereign Lord who made heaven and earth. And then, when the knock comes at the door, to open it.</p>"
  },
  "13": {
    "ref": "Chapter 13",
    "title": "The First Missionary Journey Begins",
    "text": "<sup>1</sup>Now there were in the church at Antioch prophets and teachers, Barnabas, Simeon who was called Niger, Lucius of Cyrene, Manaen a lifelong friend of Herod the tetrarch, and Saul. <sup>2</sup>While they were worshiping the Lord and fasting, the Holy Spirit said, &ldquo;Set apart for me Barnabas and Saul for the work to which I have called them.&rdquo; <sup>3</sup>Then after fasting and praying they laid their hands on them and sent them off. <sup>4</sup>So, being sent out by the Holy Spirit, they went down to Seleucia, and from there they sailed to Cyprus. <sup>5</sup>When they arrived at Salamis, they proclaimed the word of God in the synagogues of the Jews. And they had John to assist them. <sup>6</sup>When they had gone through the whole island as far as Paphos, they came upon a certain magician, a Jewish false prophet named Bar-Jesus. <sup>7</sup>He was with the proconsul, Sergius Paulus, a man of intelligence, who summoned Barnabas and Saul and sought to hear the word of God. <sup>8</sup>But Elymas the magician (for that is the meaning of his name) opposed them, seeking to turn the proconsul away from the faith. <sup>9</sup>But Saul, who was also called Paul, filled with the Holy Spirit, looked intently at him <sup>10</sup>and said, &ldquo;You son of the devil, you enemy of all righteousness, full of all deceit and villainy, will you not stop making crooked the straight paths of the Lord? <sup>11</sup>And now, behold, the hand of the Lord is upon you, and you will be blind and unable to see the sun for a time.&rdquo; Immediately mist and darkness fell upon him, and he went about seeking people to lead him by the hand. <sup>12</sup>Then the proconsul believed, when he saw what had occurred, for he was astonished at the teaching of the Lord. <sup>13</sup>Now Paul and his companions set sail from Paphos and came to Perga in Pamphylia. And John left them and returned to Jerusalem, <sup>14</sup>but they went on from Perga and came to Antioch in Pisidia. And on the Sabbath day they went into the synagogue and sat down. <sup>15</sup>After the reading of the Law and the Prophets, the rulers of the synagogue sent a message to them, saying, &ldquo;Brothers, if you have any word of encouragement for the people, say it.&rdquo; <sup>16</sup>So Paul stood up, and motioning with his hand said: &ldquo;Men of Israel and you who fear God, listen. <sup>17</sup>The God of this people Israel chose our fathers and made the people great during their stay in the land of Egypt, and with uplifted arm he led them out of it. <sup>22</sup>And when he had removed him, he raised up David to be their king, of whom he testified and said, &lsquo;I have found in David the son of Jesse a man after my heart, who will do all my will.&rsquo; <sup>23</sup>Of this man&rsquo;s offspring God has brought to Israel a Savior, Jesus, as he promised. <sup>26</sup>Brothers, sons of the family of Abraham, and those among you who fear God, to us has been sent the message of this salvation. <sup>27</sup>For those who live in Jerusalem and their rulers, because they did not recognize him nor understand the utterances of the prophets, which are read every Sabbath, fulfilled them by condemning him. <sup>28</sup>And though they found in him no guilt worthy of death, they asked Pilate to have him executed. <sup>29</sup>And when they had carried out all that was written of him, they took him down from the tree and laid him in a tomb. <sup>30</sup>But God raised him from the dead, <sup>31</sup>and for many days he appeared to those who had come up with him from Galilee to Jerusalem, who are now his witnesses to the people. <sup>32</sup>And we bring you the good news that what God promised to the fathers, <sup>33</sup>this he has fulfilled to us their children by raising Jesus, as also it is written in the second Psalm, &lsquo;You are my Son, today I have begotten you.&rsquo; <sup>38</sup>Let it be known to you therefore, brothers, that through this man forgiveness of sins is proclaimed to you, <sup>39</sup>and by him everyone who believes is freed from everything from which you could not be freed by the law of Moses. <sup>40</sup>Beware, therefore, lest what is said in the Prophets should come about: <sup>41</sup>&lsquo;Look, you scoffers, be astounded and perish; for I am doing a work in your days, a work that you will not believe, even if one tells it to you.&rsquo;&rdquo; <sup>42</sup>As they went out, the people begged that these things might be told them the next Sabbath. <sup>43</sup>And after the meeting of the synagogue broke up, many Jews and devout proselytes followed Paul and Barnabas, who, as they spoke with them, urged them to continue in the grace of God. <sup>44</sup>The next Sabbath almost the whole city came together to hear the word of the Lord. <sup>45</sup>But when the Jews saw the crowds, they were filled with jealousy and began to contradict what was spoken by Paul, reviling him. <sup>46</sup>And Paul and Barnabas spoke out boldly, saying, &ldquo;It was necessary that the word of God be spoken first to you. Since you thrust it aside and judge yourselves unworthy of eternal life, behold, we are turning to the Gentiles. <sup>47</sup>For so the Lord has commanded us, saying, &lsquo;I have made you a light for the Gentiles, that you may bring salvation to the ends of the earth.&rsquo;&rdquo; <sup>48</sup>And when the Gentiles heard this, they began rejoicing and glorifying the word of the Lord, and as many as were appointed to eternal life believed. <sup>49</sup>And the word of the Lord was spreading throughout the whole region. <sup>50</sup>But the Jews incited the devout women of high standing and the leading men of the city, stirred up persecution against Paul and Barnabas, and drove them out of their district. <sup>51</sup>But they shook off the dust from their feet against them and went to Iconium. <sup>52</sup>And the disciples were filled with joy and with the Holy Spirit.",
    "overview": "<p>The first missionary journey begins not with a committee decision but with the Holy Spirit speaking in a worship service: &ldquo;Set apart for me Barnabas and Saul for the work to which I have called them.&rdquo; The church at Antioch is worshipping and fasting &mdash; attending to God &mdash; and God speaks. This is always the order: first the consecration, then the commission. The church that is too busy to fast and pray will miss what God is saying. The church that waits on him will find that he is the one who sends.</p><p>Paul&rsquo;s sermon at Pisidian Antioch is his great synagogue address &mdash; the same structure as Peter&rsquo;s sermon at Pentecost: the sweep of Israel&rsquo;s history, the fulfilment in Jesus, the resurrection, the call to repentance. But Paul adds something Peter did not stress: &ldquo;by him everyone who believes is freed from everything from which you could not be freed by the law of Moses.&rdquo; The law cannot save. The law could never save. It was never designed to save. Only Christ can do what the law could only demand.</p><p>Then verse 48, which has caused theologians to argue for twenty centuries and which the text itself presents without apology: &ldquo;as many as were appointed to eternal life believed.&rdquo; Election precedes faith. The believing is real; the appointment is prior. Both are true. Luke sees no contradiction.</p>",

        "commentary": "<p>The Gentile mission is initiated by the Holy Spirit, not by human strategy. The Antioch church did not convene a mission committee; they were worshipping and fasting and the Spirit spoke. And the two men the Spirit calls are the church&rsquo;s best &mdash; its most gifted teacher and its newly commissioned apostle. A church willing to send its best is a church that trusts the God who sends to provide what remains. The Spirit sends; the church confirms and commissions. The mission belongs to him.</p>"

        "commentary": "<p>This is the Reformation in a sentence, centuries before Luther. The law of Moses &mdash; with all its sacrifices, its rituals, its demands &mdash; could not justify. It could diagnose, it could demand, it could condemn &mdash; but it could not free. Only Christ can free. And the liberation he offers is total: freed from <em>everything</em> &mdash; every charge, every condemnation, every debt. The one who is in Christ stands before God as if he had never sinned &mdash; not because his record is cleaned up, but because his record has been imputed to Christ and Christ&rsquo;s record has been imputed to him.</p>"

        "commentary": "<p>The Jewish opposition to the gospel in the synagogue becomes, paradoxically, the occasion for the explicit turn to the Gentiles. Paul and Barnabas cite Isaiah 49:6 &mdash; the servant of the Lord appointed as &ldquo;a light for the Gentiles, that you may bring salvation to the ends of the earth.&rdquo; This is not plan B; it is the fulfilment of Isaiah. The rejection by some in Israel accelerates the mission to the nations. God is working through the opposition, not despite it.</p>"

        "commentary": "<p>Luke does not say &ldquo;as many as chose eternal life&rdquo; or &ldquo;as many as were open to eternal life.&rdquo; He says: as many as were <em>appointed</em> to eternal life believed. The Greek <em>tetagmenoi</em> is the perfect passive participle of <em>tassō</em> &mdash; to arrange, to appoint, to ordain. The appointment is prior to the believing. This is divine election, stated plainly, without embarrassment, in the middle of a mission narrative. Election is not the enemy of evangelism; it is its foundation. The preacher can stand before any crowd and know that God&rsquo;s appointed ones will believe.</p>"

    "theology": "<p><strong>Election and Evangelism.</strong> Acts 13:48 is the Reformed doctrine of election stated with apostolic directness: the believing of the Gentiles in Pisidian Antioch is grounded in their prior appointment to eternal life. This is not fatalism &mdash; it does not prevent preaching; it undergirds it. Paul and Barnabas preach with everything they have, to everyone who will listen, in the synagogue and in the streets. They do not know who is appointed; they preach to all. And God, through the preaching, brings to faith those he has appointed. Election is the guarantee that the mission will not ultimately fail: there are sheep in every flock that God is calling, and the voice of the gospel will reach them. This is the ground of missionary confidence in every hostile city.</p>",
    "examples": "<p><strong>Then:</strong> Barnabas and Saul, sent out from a worshipping, fasting, praying church, arriving in city after city with nothing but the word and the Spirit &mdash; and the word going out, and the appointed ones believing, and the disciples filled with joy even when expelled. The first missionary journey is a portrait of how the kingdom advances: through weakness and proclamation and sovereign grace.</p><p><strong>Now:</strong> The church sends when it worships. Mission flows from the presence of God, not from strategic planning. The Antioch church was not looking for a missionary project; they were seeking God &mdash; and God spoke. The question for every congregation is not &ldquo;what is our mission strategy?&rdquo; but &ldquo;are we in the kind of sustained, attentive, fasting prayer in which the Spirit can speak?&rdquo; When he speaks, we must be ready to send our best.</p>"

  "14": {
    "ref": "Chapter 14",
    "title": "Suffering and Strengthening",
    "text": "<sup>1</sup>Now at Iconium they entered together into the Jewish synagogue and spoke in such a way that a great number of both Jews and Greeks believed. <sup>2</sup>But the unbelieving Jews stirred up the Gentiles and poisoned their minds against the brothers. <sup>3</sup>So they remained for a long time, speaking boldly for the Lord, who bore witness to the word of his grace by granting signs and wonders to be done by their hands. <sup>4</sup>But the people of the city were divided; some sided with the Jews and some with the apostles. <sup>5</sup>When an attempt was made by both Gentiles and Jews, with their rulers, to mistreat and to stone them, <sup>6</sup>they learned of it and fled to Lystra and Derbe, cities of Lycaonia, and to the surrounding country, <sup>7</sup>and there they continued to preach the gospel. <sup>8</sup>Now at Lystra there was a man sitting who could not use his feet. He was crippled from birth and had never walked. <sup>9</sup>He listened to Paul speaking. And Paul, looking intently at him and seeing that he had faith to be made well, <sup>10</sup>said in a loud voice, &ldquo;Stand upright on your feet.&rdquo; And he sprang up and began walking. <sup>11</sup>And when the crowds saw what Paul had done, they lifted up their voices, saying in Lycaonian, &ldquo;The gods have come down to us in the likeness of men!&rdquo; <sup>12</sup>Barnabas they called Zeus, and Paul, Hermes, because he was the chief speaker. <sup>13</sup>And the priest of Zeus, whose temple was at the entrance to the city, brought oxen and garlands to the gates and wanted to offer sacrifice with the crowds. <sup>14</sup>But when the apostles Barnabas and Paul heard of it, they tore their garments and rushed out into the crowd, crying out, <sup>15</sup>&ldquo;Men, why are you doing these things? We also are men, of like nature with you, and we bring you good news, that you should turn from these vain things to a living God, who made the heaven and the earth and the sea and all that is in them. <sup>16</sup>In past generations he allowed all the nations to walk in their own ways. <sup>17</sup>Yet he did not leave himself without witness, for he did good by giving you rains from heaven and fruitful seasons, satisfying your hearts with food and gladness.&rdquo; <sup>18</sup>Even with these words they scarcely restrained the people from offering sacrifice to them. <sup>19</sup>But Jews came from Antioch and Iconium, and having persuaded the crowds, they stoned Paul and dragged him out of the city, supposing that he was dead. <sup>20</sup>But when the disciples gathered about him, he rose up and entered the city, and on the next day he went on with Barnabas to Derbe. <sup>21</sup>When they had preached the gospel to that city and had made many disciples, they returned to Lystra and to Iconium and to Antioch, <sup>22</sup>strengthening the souls of the disciples, encouraging them to continue in the faith, and saying that through many tribulations we must enter the kingdom of God. <sup>23</sup>And when they had appointed elders for them in every church, with prayer and fasting they committed them to the Lord in whom they had believed. <sup>24</sup>Then they passed through Pisidia and came to Pamphylia. <sup>25</sup>And when they had spoken the word in Perga, they went down to Attalia, <sup>26</sup>and from there they sailed to Antioch, where they had been commended to the grace of God for the work that they had fulfilled. <sup>27</sup>And when they arrived and gathered the church together, they declared all that God had done with them, and how he had opened a door of faith to the Gentiles. <sup>28</sup>And they remained no little time with the disciples.",
    "overview": "<p>The pattern of the first missionary journey is by now familiar: the Word is proclaimed, some believe, others oppose, the apostles are driven out, and they preach in the next city. At Lystra, the pattern intensifies. Paul heals a lame man and the crowd, speaking in Lycaonian, decides that the gods have come down. They want to sacrifice oxen to Barnabas and Paul. The apostles tear their garments &mdash; the Jewish gesture of horror at blasphemy &mdash; and push back into the crowd to preach the living God who made heaven and earth. They scarcely hold back the sacrifice.</p><p>And then the same crowd stones Paul. The speed of the reversal is breathtaking: one moment they are bringing garlands and oxen; the next, stones. The crowd that wanted to worship Paul drags his body out of the city, supposing him dead. And Paul gets up and walks back into the city. He does not leave the region; he does not change his message; he goes on to Derbe and comes back through Lystra and Iconium and Antioch, strengthening the disciples.</p><p>What he tells them on the return journey is the sentence that threads through the whole of Acts: &ldquo;through many tribulations we must enter the kingdom of God.&rdquo; Not <em>may</em> &mdash; <em>must.</em> Suffering is not the exception for the follower of Jesus; it is the road. The kingdom does not come without the cross &mdash; not for the King, and not for those who follow him.</p>",

        "commentary": "<p>The opposition does not send them away immediately. They stay &mdash; a long time &mdash; speaking boldly. Boldness is not the absence of fear; it is the decision to speak anyway. And the Lord confirms the Word with signs and wonders: not as a performance, but as a witness to the grace of the gospel. The Word and the Spirit work together. God does not abandon his servants to face opposition alone; he bears witness alongside them.</p>"

        "commentary": "<p>The apostles&rsquo; horror at the worship offered to them is total and immediate. Torn garments, rushing into the crowd, the forceful declaration: we are men. This is not false modesty; it is theological precision. The creature must not receive what belongs to the Creator. Every form of human celebrity culture, every personality cult, every church built around a man rather than around Christ &mdash; this passage stands against all of it. The messenger is not the message. The servant is not the Lord.</p>"

      {
        "ref": "vv. 19&ndash;20",

        "commentary": "<p>Whether Paul died and was raised, or was left for dead and recovered, Luke does not specify. What he does record is the next morning: Paul goes on to Derbe. Not home. Not to Antioch to recover. To Derbe. The man who was stoned by a mob is preaching in the next city the next day. This is not heroism; it is the outworking of a settled conviction: &ldquo;to live is Christ, and to die is gain&rdquo; (Philippians 1:21). If death could not hold his Lord, it cannot hold him either. He is only done when his Lord says he is done.</p>"

      {

        "commentary": "<p>The mission report to Antioch is doxological, not statistical. They do not lead with numbers of converts or churches planted or miles covered. They declare &ldquo;all that God had done with them.&rdquo; The mission belongs to God; the missionaries are his instruments. And the summary of what God has done is this: he has opened a door. Not the apostles &mdash; God. The door of faith to the Gentiles was God&rsquo;s to open, and he opened it. The task of the church is to walk through the doors God opens, boldly and without hesitation.</p>"

    "theology": "<p><strong>Suffering as the Path of the Kingdom.</strong> Acts 14:22 is the New Testament&rsquo;s clearest statement that suffering is the appointed means by which the people of God enter the kingdom. This is not peripheral; it is structural. The cross was not a detour on the way to the resurrection; it was the way. And the church that follows a crucified Lord is called to the same road. Paul writes later that he fills up in his flesh &ldquo;what is lacking in Christ&rsquo;s afflictions for the sake of his body&rdquo; (Colossians 1:24) &mdash; not that Christ&rsquo;s atoning work was incomplete, but that the suffering of Christ is reproduced in his body, the church, as the gospel goes forth into the world. The church that suffers for the name is the church that looks most like its Lord. And it is the church that the watching world cannot ultimately explain away.</p>",
    "examples": "<p><strong>Then:</strong> Paul, stoned and left for dead outside Lystra, rising and walking back into the city, going on to Derbe the next morning. Returning through Lystra and Iconium and Antioch &mdash; the cities that had tried to kill him &mdash; to strengthen the believers he left behind. Appointing elders, committing them to God with prayer and fasting, and sailing home to report everything God had done. This is what faithful looks like.</p><p><strong>Now:</strong> The Western church has largely lost the theology of suffering. We expect the Christian life to be comfortable, and when it is not, we assume something has gone wrong. Acts 14 says the opposite: tribulation is the appointed road, and the God who walked it first walks it with his people. The suffering church is not the failing church; it is often the most faithful church &mdash; and, in God&rsquo;s strange economy, the most fruitful.</p>"

  "15": {
    "ref": "Chapter 15",
    "title": "The Jerusalem Council",
    "text": "<sup>1</sup>But some men came down from Judea and were teaching the brothers, &ldquo;Unless you are circumcised according to the custom of Moses, you cannot be saved.&rdquo; <sup>2</sup>And after Paul and Barnabas had no small dissension and debate with them, Paul and Barnabas and some of the others were appointed to go up to Jerusalem to the apostles and the elders about this question. <sup>5</sup>But some believers who belonged to the party of the Pharisees rose up and said, &ldquo;It is necessary to circumcise them and to order them to keep the law of Moses.&rdquo; <sup>6</sup>The apostles and the elders were gathered together to consider this matter. <sup>7</sup>And after there had been much debate, Peter stood up and said to them, &ldquo;Brothers, you know that in the early days God made a choice among you, that by my mouth the Gentiles should hear the word of the gospel and believe. <sup>8</sup>And God, who knows the heart, bore witness to them, by giving them the Holy Spirit just as he did to us, <sup>9</sup>and he made no distinction between us and them, having cleansed their hearts by faith. <sup>10</sup>Now, therefore, why are you putting God to the test by placing a yoke on the neck of the disciples that neither our fathers nor we have been able to bear? <sup>11</sup>But we believe that we will be saved through the grace of the Lord Jesus, just as they will.&rdquo; <sup>12</sup>And all the assembly fell silent, and they listened to Barnabas and Paul as they related what signs and wonders God had done through them among the Gentiles. <sup>13</sup>After they finished speaking, James replied, &ldquo;Brothers, listen to me. <sup>14</sup>Simeon has related how God first visited the Gentiles, to take from them a people for his name. <sup>15</sup>And with this the words of the prophets agree, just as it is written, <sup>16</sup>&lsquo;After this I will return, and I will rebuild the tent of David that has fallen; I will rebuild its ruins, and I will     "overview": "<p>The first great theological crisis of the church comes from within. Men from Judea arrive in Antioch teaching that Gentile believers must be circumcised to be saved. This is not a secondary issue &mdash; it is the gospel itself at stake. If Gentiles must be circumcised and keep the law of Moses in order to be saved, then Christ alone is not enough. The cross is not sufficient. Grace is not free. Paul and Barnabas see this immediately and oppose it with everything they have.</p><p>The Jerusalem Council is the church&rsquo;s first great doctrinal assembly &mdash; and what it produces is not a compromise but a clarification. Peter says it most plainly: neither we nor our fathers have been able to bear the yoke of the law. Why lay it on the Gentiles? We believe we will be saved through the grace of the Lord Jesus &mdash; <em>just as they will.</em> The playing field is level at the foot of the cross. There is one way of salvation for Jew and Gentile alike: grace through faith in the Lord Jesus.</p><p>James confirms with Amos: God always intended to take a people for his name from the Gentiles. This is not deviation from the old covenant; it is its fulfilment. The letter goes out. The Gentile churches are freed from the burden of circumcision. The gospel is clarified, codified, and sent. And then, quietly, Paul and Barnabas fall out over John Mark, and the mission continues in two streams &mdash; which means God uses even the sharp disagreements of his servants to multiply the advance of his kingdom.</p>",

        "commentary": "<p>Peter&rsquo;s sentence is the Reformation in miniature &mdash; fifteen hundred years before Luther nailed his theses to the door. Jews are not saved by circumcision and the law; they are saved through the grace of the Lord Jesus. And Gentiles are saved the same way. There is one gospel, one Saviour, one basis of acceptance before God: the grace of the Lord Jesus Christ alone. To add anything to this &mdash; circumcision, law-keeping, church membership, sacramental participation &mdash; is to undermine it. Grace plus anything is not grace.</p>"

        "ref": "vv. 39&ndash;40",
        "quote": "&ldquo;there arose a sharp disagreement, so that they separated from each other&rdquo;",
        "commentary": "<p>The sharpness of the disagreement between Paul and Barnabas is not softened by Luke. These are two Spirit-filled, Christ-devoted, mission-proven men &mdash; and they cannot agree on John Mark. Paul&rsquo;s concern is the mission: Mark abandoned them in Pamphylia. Barnabas&rsquo;s concern is the man: Mark needs another chance. Both positions have integrity. And the outcome is that two mission teams go out instead of one. God has a habit of using the failures and disputes of his people to advance his purposes &mdash; not despite them, but through them. Mark, for his part, will be vindicated: Paul will one day write, &ldquo;Get Mark and bring him with you, for he is very useful to me for ministry&rdquo; (2 Timothy 4:11).</p>"
      },
      {
        "ref": "vv. 1&ndash;2",
        "quote": "&ldquo;Paul and Barnabas had no small dissension and debate with them&rdquo;",
        "commentary": "<p>There is a place for sharp, sustained disagreement in the church &mdash; when the gospel is at stake. Paul and Barnabas do not smooth over the Judaizer controversy for the sake of unity. They debate it. They take it to Jerusalem. They will not let it pass. The peace that requires the abandonment of the gospel is not peace; it is surrender. There is a kind of gentleness that is actually cowardice, and a kind of confrontation that is genuine love &mdash; the love that refuses to let people believe a false gospel when the true one is available.</p>"
      }
    ],
    "theology": "<p><strong>Justification by Grace Alone through Faith Alone.</strong> Acts 15 is the original council on justification. Peter&rsquo;s summary &mdash; &ldquo;we will be saved through the grace of the Lord Jesus, just as they will&rdquo; &mdash; is the thesis of the Reformation stated by an apostle. The Judaizers were not wicked men; they were sincere believers who thought obedience to the law was necessary for salvation. But sincerity does not make a false gospel true. The council&rsquo;s verdict is decisive and irreversible: the Gentiles are saved through grace, and so are the Jews. The law cannot save. It never could. The law was given to demonstrate the need for grace, not to provide an alternative to it. The cross of Christ is sufficient, complete, and alone &mdash; and any addition to it, however well-intentioned, is a subtraction from it.</p>",
    "examples": "<p><strong>Then:</strong> A church divided over the most fundamental question imaginable: what must a person do to be saved? The answer came not from compromise but from clarity, grounded in Scripture (James&rsquo;s citation of Amos) and confirmed by experience (Peter&rsquo;s witness to Cornelius, Barnabas and Paul&rsquo;s report from the Gentile mission). The church that settles this question rightly can face every other challenge. The church that gets it wrong has nothing left to offer.</p><p><strong>Now:</strong> The Judaizer error never stays buried. It reappears in every generation dressed in different clothes: the idea that grace plus something &mdash; baptism, church membership, moral effort, liturgical compliance &mdash; constitutes salvation. The Jerusalem Council&rsquo;s answer is permanent and non-negotiable: the grace of the Lord Jesus alone. The church&rsquo;s task in every generation is to say it clearly, defend it stubbornly, and live it joyfully.</p>"
  },
  "16": {
    "ref": "Chapter 16",
    "title": "Into Macedonia",
    "text": "<sup>1</sup>Paul came also to Derbe and to Lystra. A disciple was there, named Timothy, the son of a Jewish woman who was a believer, but his father was a Greek. <sup>2</sup>He was well spoken of by the brothers at Lystra and Iconium. <sup>3</sup>Paul wanted Timothy to accompany him, and he took him and circumcised him because of the Jews who were in those places, for they all knew that his father was a Greek. <sup>6</sup>And they went through the region of Phrygia and Galatia, having been forbidden by the Holy Spirit to speak the word in Asia. <sup>7</sup>And when they had come up to Mysia, they attempted to go into Bithynia, but the Spirit of Jesus did not allow them. <sup>8</sup>So, passing by Mysia, they went down to Troas. <sup>9</sup>And a vision appeared to Paul in the night: a man of Macedonia was standing there, urging him and saying, &ldquo;Come over to Macedonia and help us.&rdquo; <sup>10</sup>And when Paul had seen the vision, immediately we sought to go on into Macedonia, concluding that God had called us to preach the gospel to them. <sup>11</sup>So, setting sail from Troas, we made a direct voyage to Samothrace, and the following day to Neapolis, <sup>12</sup>and from there to Philippi, which is a leading city of the district of Macedonia and a Roman colony. We remained in this city some days. <sup>13</sup>And on the Sabbath day we went outside the gate to the riverside, where we supposed there was a place of prayer, and we sat down and spoke to the women who had come together. <sup>14</sup>One who heard us was a woman named Lydia, from the city of Thyatira, a seller of purple goods, who was a worshiper of God. The Lord opened her heart to pay attention to what was said by Paul. <sup>15</sup>And after she was baptized, and her household as well, she urged us, saying, &ldquo;If you have judged me to be faithful to the Lord, come to my house and stay.&rdquo; And she prevailed upon us. <sup>16</sup>As we were going to the place of prayer, we were met by a slave girl who had a spirit of divination and brought her owners much gain by fortune-telling. <sup>17</sup>She followed Paul and us, crying out, &ldquo;These men are servants of the Most High God, who proclaim to you the way of salvation.&rdquo; <sup>18</sup>And this she kept doing for many days. Paul, having become greatly annoyed, turned and said to the spirit, &ldquo;I command you in the name of Jesus Christ to come out of her.&rdquo; And it came out that very hour. <sup>19</sup>But when her owners saw that their hope of gain was gone, they seized Paul and Silas and dragged them into the marketplace before the rulers. <sup>20</sup>And when they had brought them to the magistrates, they said, &ldquo;These men are Jews, and they are disturbing our city. <sup>21</sup>They advocate customs that are not lawful for us as Romans to accept or practice.&rdquo; <sup>22</sup>The crowd joined in attacking them, and the magistrates tore the garments off them and gave orders to beat them with rods. <sup>23</sup>And when they had inflicted many blows upon them, they threw them into prison, ordering the jailer to keep them safely. <sup>24</sup>Having received this order, he put them into the inner prison and fastened their feet in the stocks. <sup>25</sup>About midnight Paul and Silas were praying and singing hymns to God, and the prisoners were listening to them, <sup>26</sup>and suddenly there was a great earthquake, so that the foundations of the prison were shaken. And immediately all the doors were opened, and everyone&rsquo;s bonds were unfastened. <sup>27</sup>When the jailer woke and saw that the prison doors were open, he drew his sword and was about to kill himself, supposing that the prisoners had escaped. <sup>28</sup>But Paul cried out with a loud voice, &ldquo;Do not harm yourself, for we are all here.&rdquo; <sup>29</sup>And the jailer called for lights and rushed in, and trembling with fear he fell down before Paul and Silas. <sup>30</sup>Then he brought them out and said, &ldquo;Sirs, what must I do to be saved?&rdquo; <sup>31</sup>And they said, &ldquo;Believe in the Lord Jesus, and you will be saved, you and your household.&rdquo; <sup>32</sup>And they spoke the word of the Lord to him and to all who were in his house. <sup>33</sup>And he took them the same hour of the night and washed their wounds, and he was baptized at once, he and all his family. <sup>34</sup>Then he brought them up into his house and set food before them. And he rejoiced along with his entire household that he had believed in God.",
    "overview": "<p>Europe receives the gospel through a series of divine redirections. Paul plans to go east; the Spirit says no. He plans to go north; the Spirit of Jesus does not allow it. He arrives at the edge of the continent &mdash; Troas, on the Aegean shore &mdash; with every plan closed, and there in the night a Macedonian man appears: &ldquo;Come over and help us.&rdquo; The call to Europe is not strategic analysis; it is a vision in the night and obedience the next morning.</p><p>What awaits in Philippi is three conversions that could not be more different from one another: a wealthy businesswoman, a demonised slave girl, and a Roman jailer on the verge of suicide. Lydia&rsquo;s conversion is quiet &mdash; the Lord opens her heart, she attends to Paul&rsquo;s words, she is baptised. The slave girl&rsquo;s deliverance is dramatic &mdash; a command in the name of Jesus, and the spirit leaves. The jailer&rsquo;s conversion is desperate &mdash; a man in the ruins of his career, trembling, asking the question that matters most: what must I do to be saved?</p><p>The answer to the jailer is the simplest and most complete in the New Testament: &ldquo;Believe in the Lord Jesus, and you will be saved, you and your household.&rdquo; Not believe and do. Not believe and perform. Not believe and be circumcised. Believe. The gospel is that simple, and that enough.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 6&ndash;10",
        "quote": "&ldquo;having been forbidden by the Holy Spirit to speak the word in Asia&hellip; Come over to Macedonia and help us&rdquo;",
        "commentary": "<p>The Spirit closes two doors before he opens one. Asia &mdash; no. Bithynia &mdash; no. Troas &mdash; then a vision and the call west. This is the sovereignty of the Spirit over mission: he directs not only what is done but where, and the closed doors are as much his guidance as the open ones. The missionary who cannot read &ldquo;no&rdquo; will miss the &ldquo;yes&rdquo; that follows it. Paul&rsquo;s obedience to the Spirit&rsquo;s redirections puts the gospel on European soil &mdash; and changes the history of the world.</p>"

      {

        "quote": "&ldquo;The Lord opened her heart to pay attention to what was said by Paul&rdquo;",
        "commentary": "<p>Lydia is already a worshipper of God &mdash; a Gentile who has come to faith in the God of Israel. She is devout, attentive, present at prayer. And yet saving faith does not come from devotion or attentiveness; it comes from the Lord opening the heart. Paul speaks; God opens. The Word is the instrument; the Spirit is the cause. This is the grammar of every genuine conversion: human proclamation, divine illumination. Without the opened heart, the word remains external. When the heart is opened, the word enters and the life is changed.</p>"

        "ref": "vv. 25&ndash;26",

        "commentary": "<p>They have been beaten with rods, thrown into the inner prison, feet in the stocks. And at midnight they are praying and singing. Not whispering &mdash; singing, loud enough for the other prisoners to hear. This is the theology of Philippians 4 lived before Philippians was written: &ldquo;in whatever state I am, to be content&rdquo; (4:11). The peace of God that passes understanding keeps the heart that trusts him &mdash; even when the heart is in the stocks. The midnight song is the most powerful sermon Paul preaches in Philippi, and it converts a jailer.</p>"
      },
      {
        "ref": "vv. 30&ndash;31",
        "quote": "&ldquo;what must I do to be saved?&hellip; Believe in the Lord Jesus&rdquo;",
        "commentary": "<p>The jailer&rsquo;s question is the most important question any human being can ask, and the answer is the most important sentence in the New Testament. <em>Believe in the Lord Jesus.</em> Not believe and work. Not believe and achieve. Not believe and become worthy. Believe &mdash; trust, receive, rest on &mdash; the Lord Jesus. And the promise extends to his household, not by proxy faith, but because the same gospel will be proclaimed to them (v. 32) and they too will believe. The earthquake shook the foundations of the prison. The gospel shook the foundations of the jailer&rsquo;s life.</p>"

      {
        "ref": "v. 34",
        "quote": "&ldquo;he rejoiced along with his entire household that he had believed in God&rdquo;",
        "commentary": "<p>Three hours earlier this man had a sword at his own throat. Now he is feeding the men he had put in stocks, his wounds washed, his household baptised, his table spread, and his heart full of joy. This is what the gospel does: it reaches a man at the edge of despair and gives him a reason to live that death itself cannot take away. The jailer&rsquo;s joy is the joy of one who has been found when he thought himself lost, received when he expected judgment, welcomed when he deserved nothing.</p>"
      }
    ],
    "theology": "<p><strong>Effectual Calling and the Opened Heart.</strong> Acts 16:14 is one of the clearest statements in Scripture of what the Reformed tradition calls effectual calling: &ldquo;The Lord opened her heart to pay attention to what was said by Paul.&rdquo; The Word is preached by Paul; the heart is opened by the Lord. Both acts are real and necessary. Without Paul&rsquo;s preaching, Lydia has no content to respond to. Without the Lord&rsquo;s opening of her heart, Paul&rsquo;s words remain external noise. The Spirit works through the Word, but the Spirit&rsquo;s work is the decisive one &mdash; the inward illumination that turns external proclamation into saving faith. This is why prayer for the lost must accompany every act of evangelism: we can preach; only God can open hearts.</p>",
    "examples": "<p><strong>Then:</strong> A purple-goods merchant, a slave girl, a Roman jailer &mdash; three people who could not have been more different in status, ethnicity, or circumstance &mdash; all brought to faith in one day in one city by one gospel. The Philippian church is born from this unlikely trio, and Paul will write his most joyful letter to it from a prison cell twenty years later.</p><p><strong>Now:</strong> The Lord who opened Lydia&rsquo;s heart still opens hearts today. The Spirit who directed Paul away from Asia and toward Macedonia still directs his church. The closed doors are guidance; the midnight songs are witness; the simplest answer is still the truest: believe in the Lord Jesus. The gospel has not grown more complicated. We have.</p>"

  "17": {
    "ref": "Chapter 17",
    "title": "Athens and the Unknown God",
    "text": "<sup>1</sup>Now when they had passed through Amphipolis and Apollonia, they came to Thessalonica, where there was a synagogue of the Jews. <sup>2</sup>And Paul went in, as was his custom, and on three Sabbath days he reasoned with them from the Scriptures, <sup>3</sup>explaining and proving that it was necessary for the Christ to suffer and to rise from the dead, and saying, &ldquo;This Jesus, whom I proclaim to you, is the Christ.&rdquo; <sup>4</sup>And some of them were persuaded and joined Paul and Silas, as did a great many of the devout Greeks and not a few of the leading women. <sup>6</sup>And when they could not find them, they dragged Jason and some of the brothers before the city authorities, shouting, &ldquo;These men who have turned the world upside down have come here also.&rdquo; <sup>10</sup>The brothers immediately sent Paul and Silas away by night to Berea, and when they arrived they went into the Jewish synagogue. <sup>11</sup>Now these Jews were more noble than those in Thessalonica; they received the word with all eagerness, examining the Scriptures daily to see if these things were so. <sup>12</sup>Many of them therefore believed, with not a few Greek women of high standing and men. <sup>16</sup>Now while Paul was waiting for them at Athens, his spirit was provoked within him as he saw that the city was full of idols. <sup>17</sup>So he reasoned in the synagogue with the Jews and the devout persons, and in the marketplace every day with those who happened to be there. <sup>18</sup>Some of the Epicurean and Stoic philosophers also conversed with him. And some said, &ldquo;What does this babbler wish to say?&rdquo; Others said, &ldquo;He seems to be a preacher of foreign divinities&rdquo;&mdash;because he was preaching Jesus and the resurrection. <sup>19</sup>And they took him and brought him to the Areopagus, saying, &ldquo;May we know what this new teaching is that you are presenting? <sup>20</sup>For you bring some strange things to our ears. We wish to know therefore what these things mean.&rdquo; <sup>22</sup>So Paul stood in the midst of the Areopagus and said: &ldquo;Men of Athens, I perceive that in every way you are very religious. <sup>23</sup>For as I passed along and observed the objects of your worship, I found also an altar with this inscription: &lsquo;To the unknown god.&rsquo; What therefore you worship as unknown, this I proclaim to you. <sup>24</sup>The God who made the world and everything in it, being Lord of heaven and earth, does not live in temples made by man, <sup>25</sup>nor is he served by human hands, as though he needed anything, since he himself gives to all mankind life and breath and everything. <sup>26</sup>And he made from one man every nation of mankind to live on all the face of the earth, having determined allotted periods and the boundaries of their dwelling place, <sup>27</sup>that they should seek God, and perhaps feel their way toward him and find him. Yet he is actually not far from each one of us, <sup>28</sup>for &lsquo;In him we live and move and have our being&rsquo;; as even some of your own poets have said, &lsquo;For we are indeed his offspring.&rsquo; <sup>29</sup>Being then God&rsquo;s offspring, we ought not to think that the divine being is like gold or silver or stone, an image formed by the art and imagination of man. <sup>30</sup>The times of ignorance God overlooked, but now he commands all people everywhere to repent, <sup>31</sup>because he has fixed a day on which he will judge the world in righteousness by a man whom he has appointed; and of this he has given assurance to all by raising him from the dead.&rdquo; <sup>32</sup>Now when they heard of the resurrection of the dead, some mocked. But others said, &ldquo;We will hear you again about this.&rdquo; <sup>33</sup>So Paul went away from among them. <sup>34</sup>But some men joined him and believed, among whom also were Dionysius the Areopagite and a woman named Damaris and others with them.",
    "overview": "<p>Athens is the intellectual capital of the ancient world &mdash; full of philosophers, full of altars, full of the cleverest people alive and the most comprehensively wrong ideas about God. Paul&rsquo;s spirit is provoked by the idolatry; he cannot stay quiet. He reasons in the synagogue, he argues in the marketplace, and then he is brought to the Areopagus &mdash; the great court of Athenian intellectual life &mdash; to explain himself.</p><p>The sermon Paul preaches is unlike any other in Acts. He does not begin with the Hebrew Scriptures &mdash; his audience does not know them. He begins where they are: the altar to the Unknown God. He finds in their own religious instinct the reaching-out for the God they do not know, and he announces that God: the Creator of all things, Lord of heaven and earth, Giver of life and breath, the one in whom they live and move and have their being &mdash; and the one who has set a day of judgment and given proof of it by raising a man from the dead.</p><p>The resurrection stops the sermon. Some mock. Some defer. Some believe. The response to the gospel in Athens is the same as in every other city &mdash; except that here, uniquely, the mockers get the last word in the chapter. Athens is not a triumph. It is a faithful proclamation in hard soil, with a handful of converts, and Paul moves on to Corinth. The gospel is not always received well. It is always to be proclaimed truly.</p>",
    "verseByVerse": [
      {
        "ref": "v. 6",
        "quote": "&ldquo;These men who have turned the world upside down have come here also&rdquo;",
        "commentary": "<p>The Thessalonian mob&rsquo;s complaint is the greatest unintentional compliment in the New Testament. They mean it as an accusation; Luke records it as a summary of the mission. The gospel does turn the world upside down &mdash; or rather, it turns right-side up what sin has inverted. Every power structure, every status hierarchy, every pretension of human self-sufficiency is overturned by the proclamation that a crucified Jew is Lord of all. The world that crucified Christ cannot be comfortable with the preaching of his resurrection.</p>"
      },
      {
        "ref": "v. 11",
        "quote": "&ldquo;they received the word with all eagerness, examining the Scriptures daily to see if these things were so&rdquo;",
        "commentary": "<p>The Bereans are commended not for blind acceptance but for rigorous examination. They receive the word eagerly &mdash; with open hands &mdash; and then they test it against Scripture daily. This is the model of Christian discipleship: neither cynical rejection nor uncritical reception, but eager, Scripture-saturated examination. Faith is not opposed to investigation; it is its proper outcome. The Bereans investigate and many believe. The eagerness and the examination belong together.</p>"
      },
      {
        "ref": "vv. 24&ndash;27",
        "quote": "&ldquo;he made from one man every nation of mankind&hellip; that they should seek God&rdquo;",
        "commentary": "<p>Paul&rsquo;s Areopagus theology begins with creation and providence. The God he proclaims is not one deity among many; he is the Creator of all things, who has determined the times and boundaries of every nation &mdash; and who has done all of this with a purpose: that human beings would seek him, feel their way toward him, find him. Human restlessness, the religious impulse that fills Athens with altars, is not an embarrassment &mdash; it is a God-given homing instinct, a reaching toward the one who made us for himself. Paul meets the Athenians&rsquo; search with the announcement that the one they seek has revealed himself.</p>"
      },
      {
        "ref": "vv. 30&ndash;31",
        "quote": "&ldquo;he commands all people everywhere to repent, because he has fixed a day on which he will judge the world&rdquo;",
        "commentary": "<p>The sermon ends not with an invitation but with a command and a warning. God does not suggest repentance; he commands it. And the ground of the command is the judgment &mdash; a fixed day, a righteous Judge already appointed, his identity confirmed by the resurrection. This is the part of the gospel that Athens finds hardest: not the Creator God (the Stoics would agree), not the Providence of God (also acceptable), but the bodily resurrection and the coming judgment. These are the scandal. They remain so. The gospel that does not include the judgment has edited out the urgency.</p>"
      },
      {
        "ref": "v. 32&ndash;34",
        "quote": "&ldquo;some mocked&hellip; some men joined him and believed&rdquo;",
        "commentary": "<p>The division at the Areopagus is the division the gospel always produces. The resurrection is either the most glorious truth in the universe or an absurdity &mdash; there is no comfortable middle ground. Those who mock are not stupid; they are consistent. Those who believe are not credulous; they are responding to the evidence Paul has laid before them. Dionysius the Areopagite &mdash; a member of the very court that summoned Paul &mdash; and Damaris, a woman, are named. God saves in Athens. The harvest is smaller than in Thessalonica, but it is real, and it is his.</p>"
      }
    ],
    "theology": "<p><strong>General Revelation and the Necessity of the Gospel.</strong> Acts 17 contains the New Testament&rsquo;s most developed account of what theologians call general revelation: the knowledge of God available to all humanity through creation and conscience (Romans 1:18&ndash;20). Paul acknowledges the Athenians&rsquo; religious instinct as genuine &mdash; they are groping toward God. But groping is not finding. General revelation creates the question; the gospel alone provides the answer. The God who made all nations from one man, who determined their times and boundaries, who is not far from any of us &mdash; this God has now spoken definitively in a man he raised from the dead. The times of ignorance are over. The command is universal: all people everywhere must repent. General revelation without the gospel leaves no one saved; it only leaves everyone without excuse.</p>",
    "examples": "<p><strong>Then:</strong> Paul in Athens, spirit provoked, standing before the intellectual elite of the ancient world with nothing but the story of a crucified and risen Jew. Some mock. Some believe. He moves on. The church in Athens is small, but Dionysius and Damaris are there &mdash; and the gospel is in Europe to stay.</p><p><strong>Now:</strong> The contemporary West is increasingly like Athens: intellectually sophisticated, spiritually restless, full of altars to unnamed gods, suspicious of exclusive truth claims. The Areopagus sermon is the model for engagement: begin where people are, affirm what is true in their searching, and then announce the resurrection without apology. The resurrection is still the scandal. It is also still the only answer to the altar inscribed &ldquo;To the unknown god.&rdquo;</p>"
  },
  "18": {
    "ref": "Chapter 18",
    "title": "Corinth",
    "text": "<sup>1</sup>After this Paul left Athens and went to Corinth. <sup>2</sup>And he found a Jew named Aquila, a native of Pontus, recently come from Italy with his wife Priscilla, because Claudius had commanded all the Jews to leave Rome. And he went to see them, <sup>3</sup>and because he was of the same trade he stayed with them and worked, for they were tentmakers by trade. <sup>4</sup>And he reasoned in the synagogue every Sabbath, and tried to persuade Jews and Greeks. <sup>5</sup>When Silas and Timothy arrived from Macedonia, Paul was occupied with the word, testifying to the Jews that the Christ was Jesus. <sup>6</sup>And when they opposed and reviled him, he shook out his garments and said to them, &ldquo;Your blood be on your own heads! I am innocent. From now on I will go to the Gentiles.&rdquo; <sup>7</sup>And he left there and went to the house of a man named Titius Justus, a worshiper of God. His house was next door to the synagogue. <sup>8</sup>Crispus, the ruler of the synagogue, believed in the Lord, together with his entire household. And many of the Corinthians hearing Paul believed and were baptized. <sup>9</sup>And the Lord said to Paul one night in a vision, &ldquo;Do not be afraid, but go on speaking and do not be silent, <sup>10</sup>for I am with you, and no one will attack you to harm you, for I have many in this city who are my people.&rdquo; <sup>11</sup>And he stayed a year and six months, teaching the word of God among them. <sup>12</sup>But when Gallio was proconsul of Achaia, the Jews made a united attack on Paul and brought him before the tribunal, <sup>13</sup>saying, &ldquo;This man is persuading people to worship God contrary to the law.&rdquo; <sup>14</sup>But when Paul was about to open his mouth, Gallio said to the Jews, &ldquo;If it were a matter of wrongdoing or vicious crime, O Jews, I would have reason to accept your complaint. <sup>15</sup>But since it is a matter of questions about words and names and your own law, see to it yourselves. I refuse to be a judge of these things.&rdquo; <sup>16</sup>And he drove them from the tribunal. <sup>18</sup>After this, Paul stayed many days longer and then took leave of the brothers and set sail for Syria, and with him Priscilla and Aquila. <sup>24</sup>Now a Jew named Apollos, a native of Alexandria, came to Ephesus. He was an eloquent man, competent in the Scriptures. <sup>25</sup>He had been instructed in the way of the Lord. And being fervent in spirit, he spoke and taught accurately the things concerning Jesus, though he knew only the baptism of John. <sup>26</sup>He began to speak boldly in the synagogue, but when Priscilla and Aquila heard him, they took him aside and explained to him the way of God more accurately. <sup>27</sup>And when he wished to cross to Achaia, the brothers encouraged him and wrote to the disciples to welcome him. When he arrived, he greatly helped those who through grace had believed, <sup>28</sup>for he powerfully refuted the Jews in public, showing by the Scriptures that the Christ was Jesus.",
    "overview": "<p>Corinth is the last place a fastidious missionary would choose. It is the Las Vegas of the ancient world &mdash; a great port city famous for commerce, vice, and the worship of Aphrodite. Paul arrives from Athens, where the reception was mixed, and he comes, as he later writes, &ldquo;in weakness and in fear and much trembling&rdquo; (1 Corinthians 2:3). He finds Aquila and Priscilla, works with them at their trade, preaches every Sabbath, and waits.</p><p>Then the Lord speaks in the night: &ldquo;Do not be afraid, but go on speaking and do not be silent, for I am with you&hellip; I have many in this city who are my people.&rdquo; This is the doctrine of election turned into pastoral comfort. God already has people in Corinth &mdash; people who are his, who will be gathered by the proclamation of the gospel. Paul does not need to manufacture a harvest; he needs to be faithful, and God will bring in what is his. He stays a year and a half. The church at Corinth &mdash; with all its chaos, all its gifts, all its problems &mdash; is born.</p><p>The chapter closes with Apollos &mdash; eloquent, fervent, scripturally competent, but knowing only the baptism of John. Priscilla and Aquila take him aside privately and explain the way of God more accurately. They do not embarrass him publicly; they instruct him privately. And Apollos, genuinely humble, receives the teaching and goes on to powerfully confute the opponents of the gospel. The church grows not only by addition but by the deepening of those already in it.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 9&ndash;10",
        "quote": "&ldquo;I have many in this city who are my people&rdquo;",
        "commentary": "<p>This is one of the most comforting sentences in Acts, and one of the most theologically loaded. God says of people who are not yet converted that they are already his people. The future believers in Corinth are spoken of as already belonging to God &mdash; because election precedes faith, and the electing God knows his sheep before they know him (John 10:14). For the preacher standing in a hostile city, this is the ground of courage: you are not trying to create something from nothing. You are gathering what God has already claimed. Preach. His people will hear his voice and come.</p>"
      },
      {

    "theology": "<p><strong>Election as the Ground of Courage in Mission.</strong> &ldquo;I have many in this city who are my people&rdquo; (v. 10) is the doctrine of election functioning as a promise to a frightened missionary. Paul is afraid &mdash; he says so later. And God&rsquo;s answer to his fear is not &ldquo;it will go well&rdquo; or &ldquo;people will respond positively&rdquo; &mdash; it is &ldquo;I have my people here.&rdquo; The ground of missionary perseverance is not optimism about human receptivity; it is confidence in divine election. God has sheep in every city, in every culture, in every hostile context &mdash; sheep who will hear the shepherd&rsquo;s voice when it is proclaimed through his servants. This is not a reason for laziness; it is a reason for courage. Preach. His people will come.</p>",

    "text": "<sup>1</sup>And it happened that while Apollos was at Corinth, Paul passed through the inland country and came to Ephesus. There he found some disciples. <sup>2</sup>And he said to them, &ldquo;Did you receive the Holy Spirit when you believed?&rdquo; And they said, &ldquo;No, we have not even heard that there is a Holy Spirit.&rdquo; <sup>3</sup>And he said, &ldquo;Into what then were you baptized?&rdquo; They said, &ldquo;Into John&rsquo;s baptism.&rdquo; <sup>4</sup>And Paul said, &ldquo;John baptized with the baptism of repentance, telling the people to believe in the one who was to come after him, that is, Jesus.&rdquo; <sup>5</sup>On hearing this, they were baptized in the name of the Lord Jesus. <sup>6</sup>And when Paul had laid his hands on them, the Holy Spirit came on them, and they began speaking in tongues and prophesying. <sup>7</sup>There were about twelve men in all. <sup>8</sup>And he entered the synagogue and for three months spoke boldly, reasoning and persuading them about the kingdom of God. <sup>9</sup>But when some became stubborn and continued in unbelief, speaking evil of the Way before the congregation, he withdrew from them and took the disciples with him, reasoning daily in the hall of Tyrannus. <sup>10</sup>This continued for two years, so that all the residents of Asia heard the word of the Lord, both Jews and Greeks. <sup>11</sup>And God was doing extraordinary miracles by the hands of Paul, <sup>12</sup>so that even handkerchiefs or aprons that had touched his skin were carried away to the sick, and their diseases left them and the evil spirits came out of them. <sup>13</sup>Then some of the itinerant Jewish exorcists undertook to invoke the name of the Lord Jesus over those who had evil spirits, saying, &ldquo;I adjure you by the Jesus whom Paul proclaims.&rdquo; <sup>14</sup>Seven sons of a Jewish high priest named Sceva were doing this. <sup>15</sup>But the evil spirit answered them, &ldquo;Jesus I know, and Paul I recognize, but who are you?&rdquo; <sup>16</sup>And the man in whom was the evil spirit leaped on them, mastered all of them and overpowered them, so that they fled out of that house naked and wounded. <sup>17</sup>And this became known to all the residents of Ephesus, both Jews and Greeks. And fear fell upon them all, and the name of the Lord Jesus was extolled. <sup>18</sup>Also many of those who were now believers came, confessing and divulging their practices. <sup>19</sup>And a number of those who had practiced magic arts brought their books together and burned them in the sight of all. And they counted the value of them and found it came to fifty thousand pieces of silver. <sup>20</sup>So the word of the Lord continued to increase and prevail mightily. <sup>21</sup>Now after these events Paul resolved in the Spirit to pass through Macedonia and Achaia and go to Jerusalem, saying, &ldquo;After I have been there, I must also see Rome.&rdquo; <sup>23</sup>About that time there arose no little disturbance concerning the Way. <sup>24</sup>For a man named Demetrius, a silversmith, who made silver shrines of Artemis, brought no little business to the craftsmen. <sup>25</sup>These he gathered together, with the workmen in similar trades, and said, &ldquo;Men, you know that from this business we have our wealth. <sup>26</sup>And you see and hear that not only in Ephesus but in almost all of Asia this Paul has persuaded and turned away a great many people, saying that gods made with hands are not gods. <sup>27</sup>And there is danger not only that this trade of ours may come into disrepute but also that the temple of the great goddess Artemis may be counted as nothing, and that she may even be deposed from her magnificence, she whom all Asia and the world worship.&rdquo; <sup>28</sup>When they heard this they were enraged and were crying out, &ldquo;Great is Artemis of the Ephesians!&rdquo; <sup>34</sup>But when they recognized that he was a Jew, for about two hours they all cried out with one voice, &ldquo;Great is Artemis of the Ephesians!&rdquo; <sup>41</sup>And when he had said these things, he dismissed the assembly.",
    "overview": "<p>Ephesus is Paul&rsquo;s most sustained ministry in any single city: three months in the synagogue, then two years in the hall of Tyrannus &mdash; reasoning daily, so that all the residents of Asia, both Jews and Greeks, heard the word of the Lord. Not all of Ephesus came to hear Paul; the word went out through those who heard and carried it. Two years. Daily. All of Asia. This is what sustained, patient, Word-centred ministry produces.</p><p>The power of the word in Ephesus is confirmed by two vivid episodes. The sons of Sceva attempt to use the name of Jesus as a formula &mdash; and the evil spirit recognises the difference between the name wielded by authority and the name borrowed without relationship: &ldquo;Jesus I know, and Paul I recognise, but who are you?&rdquo; The name of Jesus is not magic; it is the delegated authority of the living Lord, available only to those who are his. And the new believers burn their magic books &mdash; fifty thousand pieces of silver worth &mdash; in a public bonfire of repentance that is one of the most vivid pictures of genuine conversion in the New Testament.</p><p>Then the riot. Demetrius the silversmith has done the economic analysis: if people stop worshipping Artemis, the shrine-making trade is finished. His complaint is one of the most honest in Acts: it is not primarily about theology but about money. The Word of God is economically disruptive. When people stop giving themselves to idols, the industries built on those idols suffer. The gospel always costs someone something.</p>",

    "theology": "<p><strong>The Word of God as the Power of Mission.</strong> Ephesus is Luke&rsquo;s great exhibit of what the Word of God, given time and sustained proclamation, can do. Two years in a lecture hall, and all of Asia hears. The mechanism is not apostolic travel or institutional strategy &mdash; it is daily teaching, received by hearers who carry it wherever they go. The Reformation insight that the Word creates the church (&ldquo;verbum Dei creat ecclesiam&rdquo;) is visible in Ephesus: the Word goes out, conversions happen, the old life is burned, fear of God falls on the city, new communities form. The Word is not one tool among many; it is the engine of the whole enterprise. This is why Paul will later write to Timothy: &ldquo;preach the word; be ready in season and out of season&rdquo; (2 Timothy 4:2). There is no substitute.</p>",
    "examples": "<p><strong>Then:</strong> All of Asia hears the word from a lecture hall in Ephesus. A bonfire worth a hundred and forty years&rsquo; wages lights the night. A silversmith&rsquo;s trade is threatened by a theological truth. The word of the Lord prevails mightily &mdash; not with weapons, not with political power, not with cultural cachet, but with the truth about the living God and the risen Christ.</p><p><strong>Now:</strong> The church in every generation must resist the temptation to replace sustained Word-ministry with more immediately impressive alternatives &mdash; spectacle, experience, technique, programme. Ephesus was not won by any of these. It was won by a man who reasoned daily from the Scriptures for two years. The Word still has this power. It has not diminished. The question is whether we are willing to give it the time and the centrality it requires.</p>"

  "20": {
    "ref": "Chapter 20",
    "title": "Farewell to Ephesus",
    "text": "<sup>7</sup>On the first day of the week, when we were gathered together to break bread, Paul talked with them, intending to depart on the next day, and he prolonged his speech until midnight. <sup>8</sup>There were many lamps in the upper room where we were gathered. <sup>9</sup>And a young man named Eutychus, sitting at the window, sank into a deep sleep as Paul talked still longer. And being overcome by sleep, he fell down from the third story and was taken up dead. <sup>10</sup>But Paul went down and bent over him, and taking him in his arms, said, &ldquo;Do not be alarmed, for his life is in him.&rdquo; <sup>11</sup>And when Paul had gone up and had broken bread and eaten, he conversed with them a long while, until daybreak, and so departed. <sup>12</sup>And they took the youth away alive, and were not a little comforted. <sup>17</sup>Now from Miletus he sent to Ephesus and called the elders of the church to come to him. <sup>18</sup>And when they came to him, he said to them: &ldquo;You yourselves know how I lived among you the whole time from the first day that I set foot in Asia, <sup>19</sup>serving the Lord with all humility and with tears and with trials that happened to me through the plots of the Jews; <sup>20</sup>how I did not shrink from declaring to you anything that was profitable, and teaching you in public and from house to house, <sup>21</sup>testifying both to Jews and to Greeks of repentance toward God and faith in our Lord Jesus Christ. <sup>22</sup>And now, behold, I am going to Jerusalem, constrained by the Spirit, not knowing what will happen to me there, <sup>23</sup>except that the Holy Spirit testifies to me in every city that imprisonment and afflictions await me. <sup>24</sup>But I do not account my life of any value nor as precious to myself, if only I may finish my course and the ministry that I received from the Lord Jesus, to testify to the gospel of the grace of God. <sup>25</sup>And now, behold, I know that none of you among whom I have gone about proclaiming the kingdom will see my face again. <sup>26</sup>Therefore I testify to you this day that I am innocent of the blood of all, <sup>27</sup>for I did not shrink from declaring to you the whole counsel of God. <sup>28</sup>Pay careful attention to yourselves and to all the flock, in which the Holy Spirit has made you overseers, to care for the church of God, which he obtained with his own blood. <sup>29</sup>I know that after my departure fierce wolves will come in among you, not sparing the flock; <sup>30</sup>and from among your own selves will arise men speaking twisted things, to draw away the disciples after them. <sup>31</sup>Therefore be alert, remembering that for three years I did not cease night or day to admonish everyone with tears. <sup>32</sup>And now I commend you to God and to the word of his grace, which is able to build you up and to give you the inheritance among all those who are sanctified. <sup>36</sup>And when he had said these things, he knelt down and prayed with them all. <sup>37</sup>And there was much weeping on the part of all; they embraced Paul and kissed him, <sup>38</sup>being sorrowful most of all because of the word he had spoken, that they would not see his face again. And they accompanied him to the ship.",
    "overview": "<p>The farewell at Miletus is one of the most moving passages in Acts, and the only speech Paul addresses to Christians. It is a pastor&rsquo;s testament &mdash; the account of a ministry offered to its people before the man who gave it disappears from their sight. Paul did not shrink. He did not select the comfortable texts and leave the hard ones. He declared the whole counsel of God &mdash; repentance and faith, warning and promise, the cross and the coming judgment &mdash; to Jews and Greeks, in public and house to house, with tears, for three years. This is the standard.</p><p>And now he commends them to two things: God, and the word of his grace. Not to his successors. Not to an institution. Not to a programme. To God and his Word &mdash; the two sources of power that will outlast every pastor and sustain every flock. The Word that built them up will continue to build them up. The God who saved them will continue to keep them. Paul is going to Jerusalem with chains waiting; the Ephesian elders are going home to fierce wolves. Both are in the same hands.</p><p>They kneel on the beach and pray together, and then they weep &mdash; sorrowing most of all because they will not see his face again. The affection between shepherd and flock is total and mutual. This is what three years of tears and teaching and house-to-house ministry produces: a bond that no departure can finally break, because it is a bond forged in the gospel and sealed in the Spirit.</p>",
