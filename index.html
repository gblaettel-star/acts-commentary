  "6": {
    "ref": "Chapter 6",
    "title": "The Choosing of the Seven",
    "text": "<sup>1</sup>Now in these days when the disciples were increasing in number, a complaint by the Hellenists arose against the Hebrews because their widows were being neglected in the daily distribution. <sup>2</sup>And the twelve summoned the full number of the disciples and said, &ldquo;It is not right that we should give up preaching the word of God to serve tables. <sup>3</sup>Therefore, brothers, pick out from among you seven men of good repute, full of the Spirit and of wisdom, whom we will appoint to this duty. <sup>4</sup>But we will devote ourselves to prayer and to the ministry of the word.&rdquo; <sup>5</sup>And what they said pleased the whole gathering, and they chose Stephen, a man full of faith and of the Holy Spirit, and Philip, and Prochorus, and Nicanor, and Timon, and Parmenas, and Nicolaus, a proselyte of Antioch. <sup>6</sup>These they set before the apostles, and they prayed and laid their hands on them. <sup>7</sup>And the word of God continued to increase, and the number of the disciples multiplied greatly in Jerusalem, and a great many of the priests became obedient to the faith. <sup>8</sup>And Stephen, full of grace and power, was doing great wonders and signs among the people. <sup>9</sup>Then some of those who belonged to the synagogue of the Freedmen (as it was called), and of the Cyrenians, and of the Alexandrians, and of those from Cilicia and Asia, rose up and disputed with Stephen. <sup>10</sup>But they could not withstand the wisdom and the Spirit with which he was speaking. <sup>11</sup>Then they secretly instigated men who said, &ldquo;We have heard him speak blasphemous words against Moses and God.&rdquo; <sup>12</sup>And they stirred up the people and the elders and the scribes, and they came upon him and seized him and brought him before the council, <sup>13</sup>and they set up false witnesses who said, &ldquo;This man never ceases to speak words against this holy place and the law, <sup>14</sup>for we have heard him say that this Jesus of Nazareth will destroy this place and will change the customs that Moses delivered to us.&rdquo; <sup>15</sup>And gazing at him, all who sat in the council saw that his face was like the face of an angel.",
    "overview": "<p>The church is growing &mdash; and growth creates problems. The Hellenist widows are being neglected in the daily distribution. This is not a scandal; it is what happens when an organism grows faster than its structures can accommodate. The twelve could try to do everything. Instead they do something remarkable: they name the problem plainly, they define their own calling with precision (&ldquo;we will devote ourselves to prayer and to the ministry of the Word&rdquo;), and they delegate to men of character and Spirit.</p><p>The result is instructive: &ldquo;the word of God continued to increase, and the number of the disciples multiplied greatly in Jerusalem.&rdquo; When the church&rsquo;s structures serve the Word rather than compete with it, the Word runs. Ministry organisation is not bureaucracy &mdash; it is stewardship of the mission.</p><p>But Luke also introduces Stephen, and with Stephen the chapter darkens. He is full of faith and of the Holy Spirit, full of grace and power. He does wonders no one can deny. He speaks with a wisdom the opposition cannot withstand. So they do what those who cannot win an argument always do: they lie. And Stephen, standing before the council with false witnesses arrayed against him, has a face like the face of an angel.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 2&ndash;4",
        "quote": "&ldquo;we will devote ourselves to prayer and to the ministry of the word&rdquo;",
        "commentary": "<p>This is not a demotion of service &mdash; the seven are appointed for honourable, essential work. It is a clarity about calling. The twelve know what they have been called to. Prayer first, then the Word. Not the Word at the expense of prayer, or prayer at the expense of proclamation &mdash; both together, in that order. Every ministry that has lost its power has usually been traced, in the end, to the slow erosion of this double devotion. The Word without prayer becomes technique. Prayer without the Word becomes mysticism. Together they are the engine of apostolic ministry.</p>"
      },
      {
        "ref": "v. 5",
        "quote": "&ldquo;Stephen, a man full of faith and of the Holy Spirit&rdquo;",
        "commentary": "<p>Notice what qualifies a man for the ministry of tables: faith and the Holy Spirit. Not administrative competence first, not a proven track record in logistics first &mdash; but a man full of the Spirit. The New Testament does not operate with a secular/sacred divide in which spiritual qualities matter for preaching and practical qualities matter for service. All ministry flows from the same source. A deacon who is full of the Spirit will serve tables in a way that itself glorifies God.</p>"
      },
      {
        "ref": "v. 7",
        "quote": "&ldquo;the word of God continued to increase&rdquo;",
        "commentary": "<p>Luke speaks of the Word as if it is a living thing &mdash; which it is (Hebrews 4:12). When the structures of the church are rightly ordered so that the Word is primary, the Word grows. It is not the apostles who grow; it is the Word itself that has power and momentum. And then: &ldquo;a great many of the priests became obedient to the faith.&rdquo; The very officials who weeks earlier were trying to suppress the gospel are now bowing to it. The Word conquers where argument cannot.</p>"
      },
      {
        "ref": "v. 10",
        "quote": "&ldquo;they could not withstand the wisdom and the Spirit with which he was speaking&rdquo;",
        "commentary": "<p>Truth, spoken in the power of the Spirit, cannot ultimately be refuted. It can be rejected; it can be suppressed by violence; but it cannot be answered. The members of the Freedmen&rsquo;s synagogue &mdash; presumably educated men, defenders of the law &mdash; have no answer for Stephen. So the argument moves from words to weapons: false witnesses, mob pressure, the council. This is the logic of every persecution in every age: when you cannot answer the truth, you silence the truth-teller.</p>"
      },
      {
        "ref": "v. 15",
        "quote": "&ldquo;his face was like the face of an angel&rdquo;",
        "commentary": "<p>Moses&rsquo; face shone after he had been in the presence of God (Exodus 34:29). Stephen&rsquo;s face shines before the council, before the false witnesses, before his death. This is the face of a man who is not afraid &mdash; not because he underestimates what is coming, but because he is already somewhere else in his spirit. He is standing before men; he is already looking toward heaven. The council sees something they cannot explain, and it does not soften them.</p>"
      }
    ],
    "theology": "<p><strong>Word and Deed, Order and Spirit.</strong> Acts 6 is the New Testament&rsquo;s foundational text on church structure. It establishes that the body has different members with different callings; that no one person can or should do everything; that the criterion for all ministry, however practical, is character shaped by the Spirit; and that when ministry is rightly ordered, the Word &mdash; not the institution, not the ministers &mdash; is what grows. This is not a management manual; it is a theology of the church as the body of Christ, each member functioning according to its calling, all of it in service of the one mission: that the Word of God would run and be glorified.</p>",
    "examples": "<p><strong>Then:</strong> A rapidly growing Jerusalem church discovering that love without structure produces injustice &mdash; the widows being neglected are real women with real needs &mdash; and that structure without love produces dead religion. The seven are the church&rsquo;s solution: Spirit-filled servants who bring both.</p><p><strong>Now:</strong> Every growing church faces the tension of Acts 6: how do we care well for people without the leaders becoming so consumed with management that the Word is starved? The answer is not to choose between pastoral care and proclamation; it is to raise up men and women of Spirit and wisdom to share the load &mdash; and then to watch what God does with a church that is both devoted to the Word and devoted to its neighbours.</p>"
  },
  "7": {
    "ref": "Chapter 7",
    "title": "The Speech of Stephen",
    "text": "<sup>1</sup>And the high priest said, &ldquo;Are these things so?&rdquo; <sup>2</sup>And Stephen said: &ldquo;Brothers and fathers, hear me. The God of glory appeared to our father Abraham when he was in Mesopotamia, before he lived in Haran, <sup>3</sup>and said to him, &lsquo;Go out from your land and from your kindred and go into the land that I will show you.&rsquo; <sup>4</sup>Then he went out from the land of the Chaldeans and lived in Haran. And after his father died, God removed him from there into this land in which you are now living. <sup>5</sup>Yet he gave him no inheritance in it, not even a foot&rsquo;s length, but promised to give it to him as a possession and to his offspring after him, though he had no child. <sup>6</sup>And God spoke to this effect&mdash;that his offspring would be sojourners in a land belonging to others, who would enslave them and afflict them four hundred years. <sup>7</sup>But I will judge the nation that they serve, said God, and after that they shall come out and worship me in this place.&rsquo; <sup>8</sup>And he gave him the covenant of circumcision. And so Abraham became the father of Isaac, and circumcised him on the eighth day, and Isaac became the father of Jacob, and Jacob of the twelve patriarchs. <sup>9</sup>&ldquo;And the patriarchs, jealous of Joseph, sold him into Egypt; but God was with him <sup>10</sup>and rescued him out of all his afflictions and gave him favor and wisdom before Pharaoh, king of Egypt, who made him ruler over Egypt and over all his household. <sup>11</sup>Now there came a famine throughout all Egypt and Canaan, and great affliction, and our fathers could find no food. <sup>12</sup>But when Jacob heard that there was grain in Egypt, he sent out our fathers on their first visit. <sup>13</sup>And on the second visit Joseph made himself known to his brothers, and Joseph&rsquo;s family became known to Pharaoh. <sup>14</sup>And Joseph sent and summoned Jacob his father and all his kindred, seventy-five persons in all. <sup>15</sup>And Jacob went down into Egypt, and he died, he and our fathers, <sup>16</sup>and they were carried back to Shechem and laid in the tomb that Abraham had bought for a sum of silver from the sons of Hamor in Shechem. <sup>17</sup>&ldquo;But as the time of the promise drew near, which God had granted to Abraham, the people increased and multiplied in Egypt <sup>18</sup>until there arose over Egypt another king who did not know Joseph. <sup>19</sup>He dealt shrewdly with our race and forced our fathers to expose their infants, so that they would not be kept alive. <sup>20</sup>At this time Moses was born; and he was beautiful in God&rsquo;s sight. And he was brought up for three months in his father&rsquo;s house, <sup>21</sup>and when he was exposed, Pharaoh&rsquo;s daughter adopted him and brought him up as her own son. <sup>22</sup>And Moses was instructed in all the wisdom of the Egyptians, and he was mighty in his words and deeds. <sup>23</sup>&ldquo;When he was forty years old, it came into his heart to visit his brothers, the children of Israel. <sup>24</sup>And seeing one of them being wronged, he defended the oppressed man and avenged him by striking down the Egyptian. <sup>25</sup>He supposed that his brothers would understand that God was giving them salvation by his hand, but they did not understand. <sup>26</sup>And on the following day he appeared to them as they were quarreling and tried to reconcile them, saying, &lsquo;Men, you are brothers. Why do you wrong each other?&rsquo; <sup>27</sup>But the man who was wronging his neighbor thrust him aside, saying, &lsquo;Who made you a ruler and a judge over us? <sup>28</sup>Do you want to kill me as you killed the Egyptian yesterday?&rsquo; <sup>29</sup>At this retort Moses fled and became an exile in the land of Midian, where he became the father of two sons. <sup>30</sup>&ldquo;Now when forty years had passed, an angel appeared to him in the wilderness of Mount Sinai, in a flame of fire in a bush. <sup>31</sup>When Moses saw it, he was amazed at the sight, and as he drew near to look, there came the voice of the Lord: <sup>32</sup>&lsquo;I am the God of your fathers, the God of Abraham and of Isaac and of Jacob.&rsquo; And Moses trembled and did not dare to look. <sup>33</sup>Then the Lord said to him, &lsquo;Take off the sandals from your feet, for the place where you are standing is holy ground. <sup>34</sup>I have surely seen the affliction of my people who are in Egypt, and I have heard their groaning, and I have come down to deliver them. And now come, I will send you to Egypt.&rsquo; <sup>35</sup>&ldquo;This Moses, whom they rejected, saying, &lsquo;Who made you a ruler and a judge?&rsquo;&mdash;this man God sent as both ruler and redeemer, by the hand of the angel who appeared to him in the bush. <sup>36</sup>This man led them out, performing wonders and signs in Egypt and at the Red Sea and in the wilderness for forty years. <sup>37</sup>This is the Moses who said to the Israelites, &lsquo;God will raise up for you a prophet like me from your brothers.&rsquo; <sup>38</sup>This is the one who was in the congregation in the wilderness with the angel who spoke to him at Mount Sinai, and with our fathers. He received living oracles to give to us. <sup>39</sup>Our fathers refused to obey him, but thrust him aside, and in their hearts they turned to Egypt, <sup>40</sup>saying to Aaron, &lsquo;Make for us gods who will go before us. As for this Moses who led us out from the land of Egypt, we do not know what has become of him.&rsquo; <sup>41</sup>And they made a calf in those days, and offered a sacrifice to the idol and were rejoicing in the works of their hands. <sup>42</sup>But God turned away and gave them over to worship the host of heaven, as it is written in the book of the prophets: &lsquo;Did you bring to me slaughtered beasts and sacrifices, during the forty years in the wilderness, O house of Israel? <sup>43</sup>You took up the tent of Moloch and the star of your god Rephan, the images that you made to worship; and I will send you into exile beyond Babylon.&rsquo; <sup>44</sup>&ldquo;Our fathers had the tent of witness in the wilderness, just as he who spoke to Moses directed him to make it, according to the pattern that he had seen. <sup>45</sup>Our fathers in turn brought it in with Joshua when they dispossessed the nations that God drove out before our fathers. So it was until the days of David, <sup>46</sup>who found favor in the sight of God and asked to find a dwelling place for the God of Jacob. <sup>47</sup>But it was Solomon who built him a house. <sup>48</sup>Yet the Most High does not dwell in houses made by hands, as the prophet says, <sup>49</sup>&lsquo;Heaven is my throne, and earth is my footstool. What kind of house will you build for me, says the Lord, or what is the place of my rest? <sup>50</sup>Did not my hand make all these things?&rsquo; <sup>51</sup>&ldquo;You stiff-necked people, uncircumcised in heart and ears, you always resist the Holy Spirit. As your fathers did, so do you. <sup>52</sup>Which of the prophets did your fathers not persecute? And they killed those who announced beforehand the coming of the Righteous One, whom you have now betrayed and murdered, <sup>53</sup>you who received the law as delivered by angels and did not keep it.&rdquo; <sup>54</sup>Now when they heard these things they were enraged, and they ground their teeth at him. <sup>55</sup>But he, full of the Holy Spirit, gazed into heaven and saw the glory of God, and Jesus standing at the right hand of God. <sup>56</sup>And he said, &ldquo;Behold, I see the heavens opened, and the Son of Man standing at the right hand of God.&rdquo; <sup>57</sup>But they cried out with a loud voice and stopped their ears and ran together at him. <sup>58</sup>Then they cast him out of the city and stoned him. And the witnesses laid down their garments at the feet of a young man named Saul. <sup>59</sup>And as they were stoning Stephen, he called out, &ldquo;Lord Jesus, receive my spirit.&rdquo; <sup>60</sup>And falling to his knees he cried out with a loud voice, &ldquo;Lord, do not hold this sin against them.&rdquo; And when he had said this, he fell asleep.",
    "overview": "<p>Stephen&rsquo;s speech is the longest in Acts and one of the most daring pieces of rhetoric in the New Testament. He does not defend himself. He puts Israel on trial. From Abraham to Solomon to the council before him, he traces a single thread through the whole of salvation history: God always moves forward, and Israel always resists. The patriarchs sold Joseph into Egypt &mdash; but God was with him. Israel rejected Moses &mdash; twice &mdash; but God used him to redeem them. Israel turned to idols in the wilderness. Israel refused to keep the law they received. And now the same pattern reaches its fullest expression: they have betrayed and murdered the Righteous One himself.</p><p>The speech dismantles the two pillars of Jewish security: the temple and the law. The Most High does not dwell in houses made by hands &mdash; he never did. And the law you received from angels, you never kept. Strip away the temple and the law as sources of security, and what remains? Only the God who appeared to Abraham in Mesopotamia, before there was any temple, before there was any law &mdash; the God who has been moving toward his people and through his people and despite his people, from the beginning.</p><p>Then Stephen looks up and sees what the council cannot see: the glory of God, and Jesus standing at the right hand of God. Standing &mdash; not seated. As if the Son of Man rose to his feet to receive his first martyr home. They stop their ears and rush at him. He dies praying his Lord&rsquo;s own prayer for his killers. And at the edge of the scene, holding the coats, is a young man named Saul.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 9&ndash;10",
        "quote": "&ldquo;the patriarchs, jealous of Joseph, sold him into Egypt; but God was with him&rdquo;",
        "commentary": "<p>The pattern of rejection and vindication appears first in Joseph. His brothers &mdash; the very sons of the covenant &mdash; sold him out of jealousy. But the comma after &ldquo;sold him into Egypt&rdquo; is the most important punctuation in Stephen&rsquo;s sermon: <em>but God was with him.</em> Human treachery, divine sovereignty, redemptive outcome. This is the grammar of all of redemptive history, and Stephen will apply it, unflinching, to the crucifixion of the Righteous One.</p>"
      },
      {
        "ref": "vv. 35&ndash;37",
        "quote": "&ldquo;This Moses, whom they rejected&mdash;this man God sent as both ruler and redeemer&rdquo;",
        "commentary": "<p>Stephen says &ldquo;this Moses&rdquo; three times in vv. 35&ndash;38, each time building the identification. The very man they rejected became the one God used to save them. And then the prophetic pointer: &ldquo;God will raise up for you a prophet like me from your brothers.&rdquo; Moses knew he was a type. He pointed beyond himself to the one the council has just killed. The irony is total: they cite Moses as authority for condemning Stephen, while Stephen shows that Moses himself testified against them.</p>"
      },
      {
        "ref": "vv. 48&ndash;50",
        "quote": "&ldquo;the Most High does not dwell in houses made by hands&rdquo;",
        "commentary": "<p>This is the theological heart of the defence. The charge against Stephen was that he spoke against &ldquo;this holy place.&rdquo; Stephen&rsquo;s response is not to deny the charge but to show that the charge misunderstands God. The God who appeared to Abraham in Mesopotamia &mdash; before any temple existed &mdash; the God who spoke from a burning bush, who led Israel in a portable tent, who fills heaven and earth (Isaiah 66:1&ndash;2) &mdash; this God cannot be confined to a building. The temple was always a sign pointing to a presence, not a container for it.</p>"
      },
      {
        "ref": "vv. 51&ndash;53",
        "quote": "&ldquo;you always resist the Holy Spirit. As your fathers did, so do you&rdquo;",
        "commentary": "<p>The indictment. Stiff-necked is the language God used of Israel in the wilderness (Exodus 33:5). Uncircumcised in heart and ears is the language of Jeremiah (9:26). Stephen is not inventing an accusation; he is showing the council their own portrait in the mirror of their own Scriptures. The resistance to the Holy Spirit is not new; it is the defining characteristic of the generation that rejected every prophet and, finally, the Prophet himself. The present council is not an aberration; it is a continuation.</p>"
      },
      {
        "ref": "vv. 55&ndash;56",
        "quote": "&ldquo;Jesus standing at the right hand of God&rdquo;",
        "commentary": "<p>Christ is always pictured as seated at the Father&rsquo;s right hand &mdash; enthroned, reigning, at rest (Hebrews 1:3, 10:12). Here he is standing. The commentators have puzzled over this. The most compelling reading is the simplest: the Son of Man rose to receive his first martyr. The judge who will vindicate all his suffering people rises at the moment of their death to welcome them home. Stephen sees this and announces it, and the council stops their ears and rushes him &mdash; because if it is true, they are lost.</p>"
      },
      {
        "ref": "vv. 59&ndash;60",
        "quote": "&ldquo;Lord, do not hold this sin against them&rdquo;",
        "commentary": "<p>Stephen dies praying the prayer of his Lord: &ldquo;Lord Jesus, receive my spirit&rdquo; echoes &ldquo;Father, into your hands I commit my spirit&rdquo; (Luke 23:46). &ldquo;Lord, do not hold this sin against them&rdquo; echoes &ldquo;Father, forgive them, for they know not what they do&rdquo; (Luke 23:34). The disciple dies as the Master died &mdash; forgiving, trusting, surrendering his spirit to the one who will receive it. And among those who hear the prayer for forgiveness, holding the coats, is the man who will one day be its answer.</p>"
      }
    ],
    "theology": "<p><strong>The Pattern of Rejection and Vindication.</strong> Stephen&rsquo;s survey of Israel&rsquo;s history reveals God&rsquo;s way in the world: the one God sends is always rejected first. Joseph, Moses, the prophets, the Righteous One himself. And in each case, God vindicates the rejected one and uses that rejection as the means of redemption. This is not historical accident; it is divine pattern &mdash; the pattern of the cross. The grain of wheat must fall into the ground and die (John 12:24). The stone the builders reject becomes the cornerstone. And the martyr who follows the rejected-and-vindicated Lord shares the same arc: killed by men, received by God, his prayer answered in the conversion of his chief persecutor. Saul of Tarsus is Stephen&rsquo;s greatest vindication.</p>",
    "examples": "<p><strong>Then:</strong> Stephen stands before the Sanhedrin in Jerusalem, the city that kills the prophets, and preaches them their own history. He is the first Christian martyr, and he dies as he lived &mdash; full of the Holy Spirit, full of faith, his face like an angel&rsquo;s. His death scatters the seed further than his life could have planted it.</p><p><strong>Now:</strong> The church in every hostile culture faces Stephen&rsquo;s question: what do you do when you cannot be silenced by argument and so are silenced by violence? Stephen shows us: you look up, you see the glory of God, you commend your spirit to Christ, and you pray for those who kill you. This is not heroism; it is the overflow of a life lived so close to Christ that even death cannot separate you from him &mdash; and cannot stop the gospel.</p>"
  },
  "8": {
    "ref": "Chapter 8",
    "title": "The Scattered Gospel",
    "text": "<sup>1</sup>And Saul approved of his execution. And there arose on that day a great persecution against the church in Jerusalem, and they were all scattered throughout the regions of Judea and Samaria, except the apostles. <sup>2</sup>Devout men buried Stephen and made great lamentation over him. <sup>3</sup>But Saul was ravaging the church, and entering house after house, he dragged off men and women and committed them to prison. <sup>4</sup>Now those who were scattered went about preaching the word. <sup>5</sup>Philip went down to the city of Samaria and proclaimed to them the Christ. <sup>6</sup>And the crowds with one accord paid attention to what was being said by Philip, when they heard him and saw the signs that he did. <sup>7</sup>For unclean spirits, crying out with a loud voice, came out of many who had them, and many who were paralyzed or lame were healed. <sup>8</sup>So there was much joy in that city. <sup>9</sup>But there was a man named Simon, who had previously practiced magic in the city and amazed the people of Samaria, saying that he himself was somebody great. <sup>10</sup>They all paid attention to him, from the least to the greatest, saying, &ldquo;This man is the power of God that is called Great.&rdquo; <sup>11</sup>And they paid attention to him because for a long time he had amazed them with his magic. <sup>12</sup>But when they believed Philip as he preached good news about the kingdom of God and the name of Jesus Christ, they were baptized, both men and women. <sup>13</sup>Even Simon himself believed, and after being baptized he continued with Philip. And seeing signs and great miracles performed, he was amazed. <sup>14</sup>Now when the apostles at Jerusalem heard that Samaria had received the word of God, they sent to them Peter and John, <sup>15</sup>who came down and prayed for them that they might receive the Holy Spirit, <sup>16</sup>for he had not yet fallen on any of them, but they had only been baptized in the name of the Lord Jesus. <sup>17</sup>Then they laid their hands on them and they received the Holy Spirit. <sup>18</sup>Now when Simon saw that the Spirit was given through the laying on of the apostles&rsquo; hands, he offered them money, <sup>19</sup>saying, &ldquo;Give me this power also, so that anyone on whom I lay my hands may receive the Holy Spirit.&rdquo; <sup>20</sup>But Peter said to him, &ldquo;May your money perish with you, because you thought you could obtain the gift of God with money! <sup>21</sup>You have neither part nor lot in this matter, for your heart is not right before God. <sup>22</sup>Repent, therefore, of this wickedness of yours, and pray to the Lord that, if possible, the intent of your heart may be forgiven you. <sup>23</sup>For I see that you are in the gall of bitterness and in the bond of iniquity.&rdquo; <sup>24</sup>And Simon answered, &ldquo;Pray for me to the Lord, that nothing of what you have said may come upon me.&rdquo; <sup>25</sup>Now when they had testified and spoken the word of the Lord, they returned to Jerusalem, preaching the gospel to many villages of the Samaritans. <sup>26</sup>Now an angel of the Lord said to Philip, &ldquo;Rise and go toward the south to the road that goes down from Jerusalem to Gaza.&rdquo; This is a desert place. <sup>27</sup>And he rose and went. And there was an Ethiopian, a eunuch, a court official of Candace, queen of the Ethiopians, who was in charge of all her treasure and had come to Jerusalem to worship <sup>28</sup>and was returning, seated in his chariot, and he was reading the prophet Isaiah. <sup>29</sup>And the Spirit said to Philip, &ldquo;Go over and join this chariot.&rdquo; <sup>30</sup>So Philip ran to him and heard him reading Isaiah the prophet and asked, &ldquo;Do you understand what you are reading?&rdquo; <sup>31</sup>And he said, &ldquo;How can I, unless someone guides me?&rdquo; And he invited Philip to come up and sit with him. <sup>32</sup>Now the passage of the Scripture that he was reading was this: &ldquo;Like a sheep he was led to the slaughter and like a lamb before its shearer is silent, so he opens not his mouth. <sup>33</sup>In his humiliation justice was denied him. Who can describe his generation? For his life is taken away from the earth.&rdquo; <sup>34</sup>And the eunuch said to Philip, &ldquo;About whom, I ask you, does the prophet say this, about himself or about someone else?&rdquo; <sup>35</sup>Then Philip opened his mouth, and beginning with this Scripture he told him the good news about Jesus. <sup>36</sup>And as they were going along the road they came to some water, and the eunuch said, &ldquo;See, here is water! What prevents me from being baptized?&rdquo; <sup>38</sup>And he commanded the chariot to stop, and they both went down into the water, Philip and the eunuch, and he baptized him. <sup>39</sup>And when they came up out of the water, the Spirit of the Lord carried Philip away, and the eunuch saw him no more, and went on his way rejoicing. <sup>40</sup>But Philip found himself at Azotus, and as he passed through he preached the gospel to all the towns until he came to Caesarea.",
    "overview": "<p>Persecution was meant to silence the gospel. Instead it scattered it. The death of Stephen, the ravaging of the church by Saul, the flight of believers from Jerusalem &mdash; all of this was intended to put out the fire. But you do not put out a fire by scattering the embers. You only spread it further. Those who were scattered went about preaching the Word. Not the apostles, who remained &mdash; the ordinary believers, the unnamed men and women who had heard Peter preach and Stephen argue, and who could not stop telling the story wherever their flight took them.</p><p>Philip goes to Samaria &mdash; enemy territory by centuries of Jewish reckoning &mdash; and the crowds pay attention, and there is much joy in that city. Then the Spirit pulls him away from the revival to a desert road, to one man in a chariot reading Isaiah 53. The divine calculus is instructive: the sovereign God who fills a city with the gospel also directs one evangelist to one seeker on one road. Every soul matters to him.</p><p>The Ethiopian eunuch was an outsider twice over: a foreigner, and a eunuch, barred from the assembly of Israel (Deuteronomy 23:1). He had come to Jerusalem to worship the God of Israel and had found, in a sense, no entry. Now, on a desert road, he encounters the one who tears down every dividing wall &mdash; and he goes on his way rejoicing.</p>",

        "commentary": "<p>The most important verse in the chapter may be v. 4. Saul&rsquo;s persecution intended to destroy the church; instead it became the mechanism of its expansion. Acts 1:8 said the witnesses would go to Judea and Samaria &mdash; persecution is the instrument God uses to make that happen. This is the sovereignty of God over suffering: what the enemy intends for destruction, God uses for the advance of his kingdom. The scattered ones did not wait to be commissioned; they preached as they went, because the Word was in them and could not stay in.</p>"

    "theology": "<p><strong>The Gospel Breaks Every Barrier.</strong> Acts 8 is the chapter in which the gospel crosses its first major boundary &mdash; from Jews to Samaritans, and then from Israel to Africa. This is not accidental; it is the working out of Acts 1:8: Jerusalem, Judea, Samaria, ends of the earth. The Ethiopian eunuch is the first representative of the &ldquo;ends of the earth&rdquo; in the book &mdash; geographically distant, ethnically foreign, ritually excluded. And the gospel reaches him on a desert road through a text he happened to be reading. This is the Reformed doctrine of effectual calling in action: the Spirit directs the preacher, opens the Scriptures, and draws the seeker. Nothing is left to chance. The God who elects a people from every tongue and tribe and nation uses the ordinary means &mdash; a man, a chariot, a scroll &mdash; to accomplish his extraordinary purposes.</p>",
    "examples": "<p><strong>Then:</strong> Scattered believers, fleeing for their lives, who could not stop preaching. A deacon pulled off a city-wide revival and then redirected to one man on a road. An African official who came to Jerusalem seeking God and left having found him in the most unexpected way. The gospel in chapter 8 is gloriously uncontrollable.</p><p><strong>Now:</strong> The church tends to think of mission in terms of programs and strategies. Acts 8 shows God doing his best work through disruption &mdash; persecution that scatters, divine direction that redirects, a Scripture passage that raises exactly the right question. The lesson is not that we should abandon planning, but that we must hold our plans loosely enough that we can hear &ldquo;go over and join this chariot&rdquo; when the Spirit speaks it.</p>"

  "9": {
    "ref": "Chapter 9",
    "title": "The Road to Damascus",
    "text": "<sup>1</sup>But Saul, still breathing threats and murder against the disciples of the Lord, went to the high priest <sup>2</sup>and asked him for letters to the synagogues at Damascus, so that if he found any belonging to the Way, men or women, he might bring them bound to Jerusalem. <sup>3</sup>Now as he went on his way, he approached Damascus, and suddenly a light from heaven shone around him. <sup>4</sup>And falling to the ground, he heard a voice saying to him, &ldquo;Saul, Saul, why are you persecuting me?&rdquo; <sup>5</sup>And he said, &ldquo;Who are you, Lord?&rdquo; And he said, &ldquo;I am Jesus, whom you are persecuting. <sup>6</sup>But rise and enter the city, and you will be told what you are to do.&rdquo; <sup>7</sup>The men who were traveling with him stood speechless, hearing the voice but seeing no one. <sup>8</sup>Saul rose from the ground, and although his eyes were opened, he saw nothing. So they led him by the hand and brought him into Damascus. <sup>9</sup>And for three days he was without sight, and neither ate nor drank. <sup>10</sup>Now there was a disciple at Damascus named Ananias. The Lord said to him in a vision, &ldquo;Ananias.&rdquo; And he said, &ldquo;Here I am, Lord.&rdquo; <sup>11</sup>And the Lord said to him, &ldquo;Rise and go to the street called Straight, and at the house of Judas look for a man of Tarsus named Saul, for behold, he is praying, <sup>12</sup>and he has seen in a vision a man named Ananias come in and lay his hands on him so that he might regain his sight.&rdquo; <sup>13</sup>But Ananias answered, &ldquo;Lord, I have heard from many about this man, how much evil he has done to your saints at Jerusalem. <sup>14</sup>And here he has authority from the chief priests to bind all who call on your name.&rdquo; <sup>15</sup>But the Lord said to him, &ldquo;Go, for he is a chosen instrument of mine to carry my name before the Gentiles and kings and the children of Israel. <sup>16</sup>For I will show him how much he must suffer for the sake of my name.&rdquo; <sup>17</sup>So Ananias departed and entered the house. And laying his hands on him he said, &ldquo;Brother Saul, the Lord Jesus who appeared to you on the road by which you came has sent me so that you may regain your sight and be filled with the Holy Spirit.&rdquo; <sup>18</sup>And immediately something like scales fell from his eyes, and he regained his sight. Then he rose and was baptized; <sup>19</sup>and taking food, he was strengthened. For some days he was with the disciples at Damascus. <sup>20</sup>And immediately he proclaimed Jesus in the synagogues, saying, &ldquo;He is the Son of God.&rdquo; <sup>21</sup>And all who heard him were amazed and said, &ldquo;Is not this the man who made havoc in Jerusalem of those who called upon this name? And has he not come here for this purpose, to bring them bound before the chief priests?&rdquo; <sup>22</sup>But Saul increased all the more in strength, and confounded the Jews who lived in Damascus by proving that Jesus was the Christ. <sup>23</sup>When many days had passed, the Jews plotted to kill him, <sup>24</sup>but their plot became known to Saul. They were watching the gates day and night in order to kill him, <sup>25</sup>but his disciples took him by night and let him down through an opening in the wall, lowering him in a basket. <sup>26</sup>And when he had come to Jerusalem, he attempted to join the disciples. And they were all afraid of him, for they did not believe that he was a disciple. <sup>27</sup>But Barnabas took him and brought him to the apostles and declared to them how on the road he had seen the Lord, who spoke to him, and how at Damascus he had preached boldly in the name of Jesus. <sup>28</sup>So he went in and out among them at Jerusalem, preaching boldly in the name of the Lord. <sup>29</sup>And he spoke and disputed against the Hellenists. But they were seeking to kill him. <sup>30</sup>And when the brothers learned this, they brought him down to Caesarea and sent him off to Tarsus. <sup>31</sup>So the church throughout all Judea and Galilee and Samaria had peace and was being built up. And walking in the fear of the Lord and in the comfort of the Holy Spirit, it multiplied. <sup>32</sup>Now as Peter went here and there among them all, he came down also to the saints who lived at Lydda. <sup>33</sup>There he found a man named Aeneas, bedridden for eight years, who was paralyzed. <sup>34</sup>And Peter said to him, &ldquo;Aeneas, Jesus Christ heals you; rise and make your bed.&rdquo; And immediately he rose. <sup>35</sup>And all the residents of Lydda and Sharon saw him, and they turned to the Lord. <sup>36</sup>Now there was in Joppa a disciple named Tabitha, which, translated, means Dorcas. She was full of good works and acts of charity. <sup>37</sup>In those days she became ill and died, and when they had washed her, they laid her in an upper room. <sup>38</sup>Since Lydda was near Joppa, the disciples, hearing that Peter was there, sent two men to him, urging him, &ldquo;Please come to us without delay.&rdquo; <sup>39</sup>So Peter rose and went with them. And when he arrived, they took him to the upper room. All the widows stood beside him weeping and showing tunics and other garments that Dorcas made while she was with them. <sup>40</sup>But Peter put them all outside, and knelt down and prayed; and turning to the body he said, &ldquo;Tabitha, arise.&rdquo; And she opened her eyes, and when she saw Peter she sat up. <sup>41</sup>And he gave her his hand and raised her up. Then, calling the saints and widows, he presented her alive. <sup>42</sup>And it became known throughout all Joppa, and many believed in the Lord. <sup>43</sup>And he stayed in Joppa for many days with one Simon, a tanner.",
    "overview": "<p>No conversion in history has been more dramatic, more sovereign, or more consequential. Saul of Tarsus is not seeking God. He is hunting God&rsquo;s people &mdash; breathing threats and murder, armed with letters of arrest, heading to Damascus to drag more believers to prison. And the risen Christ stops him on the road. A light from heaven. A voice. &ldquo;Saul, Saul, why are you persecuting me?&rdquo; Not <em>them</em> &mdash; <em>me.</em> To touch the church is to touch Christ. The head and the body are one.</p><p>What happens to Saul on the Damascus road is not the result of prior openness, spiritual preparation, or moral readiness. It is pure, sovereign, unilateral grace &mdash; the kind that stops a man in the middle of his worst act and makes him a new creature. Saul does not choose Christ; Christ chooses Saul. &ldquo;He is a chosen instrument of mine.&rdquo; The word is <em>skeuos eklogēs</em> &mdash; vessel of election &mdash; and it is the language of sovereign divine appointment. The most violent persecutor of the church becomes its most prolific apostle. Only God could write that story.</p><p>And then there is Ananias &mdash; a small man in a small house on a street called Straight, who hears the Lord say &ldquo;go to Saul of Tarsus&rdquo; and who goes, against every instinct of self-preservation, and calls the man who had come to arrest him &ldquo;Brother Saul.&rdquo; Two words that cost everything and mean everything. Grace in the mouth of a frightened disciple.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 4&ndash;5",
        "quote": "&ldquo;Saul, Saul, why are you persecuting me?&rdquo;",
        "commentary": "<p>The risen Christ does not say &ldquo;why are you persecuting <em>them</em>?&rdquo; He says &ldquo;why are you persecuting <em>me</em>?&rdquo; The union of Christ and his people is so complete that what is done to the least of them is done to him. Saul thought he was persecuting a sect; he discovers he has been waging war on the Son of God. The question contains no anger &mdash; only a gentle &ldquo;why?&rdquo;, as if Christ is inviting Saul to consider the magnitude of what he has been doing. The answer, of course, is that Saul did not know. And not knowing does not remove guilt; it only shows how complete the blindness was.</p>"

      {

        "quote": "&ldquo;he is a chosen instrument of mine&hellip; I will show him how much he must suffer&rdquo;",
        "commentary": "<p>The call of Paul comes with its cost already declared. He is chosen &mdash; <em>eklogēs</em>, the language of election &mdash; to carry the name before Gentiles and kings and Israel. And he will suffer for it. The two cannot be separated: the calling and the cross that comes with it. Paul will spend the rest of his life discovering how many ways there are to suffer for the name. But the call is not revoked by the suffering; it is confirmed by it. The chosen instrument is refined, not broken, by what he must bear.</p>"

        "quote": "&ldquo;Brother Saul&rdquo;",
        "commentary": "<p>These two words from Ananias are among the most costly and beautiful in Acts. Saul had come to Damascus to arrest and imprison men and women like Ananias. And Ananias, sent by the Lord, walks into the house and calls him &ldquo;brother.&rdquo; Not &ldquo;Mr Saul.&rdquo; Not &ldquo;former persecutor.&rdquo; Brother. The church&rsquo;s embrace of its greatest persecutor, modelled in miniature by one frightened disciple who obeyed. This is grace with a face and a voice and a pair of hands laid on blind eyes.</p>"

      {
        "ref": "vv. 40&ndash;41",
        "quote": "&ldquo;Tabitha, arise&rdquo;",
        "commentary": "<p>Peter kneels and prays before he speaks. He does not perform; he intercedes. And then the word &mdash; the same kind of word Jesus spoke over Jairus&rsquo;s daughter (Luke 8:54). Tabitha opens her eyes and sits up, and Peter presents her alive to the saints and widows who loved her. The resurrection of Jesus is not only a past event; it is a present power, the firstfruits of a new creation that has already begun to break into the old. Every healing, every raising, every restoration is a sign pointing forward to the day when the last enemy is abolished.</p>"

    "theology": "<p><strong>Sovereign Grace in Conversion.</strong> The conversion of Saul is the New Testament&rsquo;s clearest portrait of unconditional election and effectual calling. There is nothing in Saul that would attract God&rsquo;s grace &mdash; he is actively persecuting the church, violently opposed to Christ, supremely confident in his own righteousness (Philippians 3:4&ndash;6). God chose him anyway. Not because of anything foreseen in him, but according to his own sovereign purpose &mdash; to display the fullness of his grace in the most unlikely vessel imaginable. Paul himself will later write that his conversion was designed to be a pattern, &ldquo;an example to those who were to believe in him for eternal life&rdquo; (1 Timothy 1:16). If God can save Saul of Tarsus, he can save anyone. That is the point. The doctrine of election is not a closed door; it is the foundation of missionary confidence.</p>",
    "examples": "<p><strong>Then:</strong> A church that had watched Saul drag their brothers and sisters to prison now had to welcome him as a brother. Understandably, they were afraid. It took Barnabas &mdash; son of encouragement &mdash; to stand between the suspicious church and the new apostle and vouch for the reality of his conversion. The church that had prayed for boldness now needed faith to receive the answer.</p><p><strong>Now:</strong> No one is beyond the reach of sovereign grace. The person who seems most violently opposed to the gospel may be the one God is about to apprehend. This is not a reason for naivety; it is a reason for prayer &mdash; the kind of prayer that believes God can stop any Saul on any road at any time. The church&rsquo;s task is to be ready, like Ananias, to say &ldquo;brother&rdquo; when the moment comes.</p>"

    "text": "<sup>1</sup>At Caesarea there was a man named Cornelius, a centurion of what was known as the Italian Cohort, <sup>2</sup>a devout man who feared God with all his household, gave alms generously to the people, and prayed continually to God. <sup>3</sup>About the ninth hour of the day he saw clearly in a vision an angel of God come in and say to him, &ldquo;Cornelius.&rdquo; <sup>4</sup>And he stared at him in terror and said, &ldquo;What is it, Lord?&rdquo; And he said to him, &ldquo;Your prayers and your alms have ascended as a memorial before God. <sup>5</sup>And now send men to Joppa and bring one Simon who is called Peter. <sup>6</sup>He is lodging with one Simon, a tanner, whose house is by the sea.&rdquo; <sup>9</sup>The next day, as they were on their journey and approaching the city, Peter went up on the housetop about the sixth hour to pray. <sup>10</sup>And he became hungry and wanted something to eat, but while they were preparing it, he fell into a trance <sup>11</sup>and saw the heavens opened and something like a great sheet descending, being let down by its four corners upon the earth. <sup>12</sup>In it were all kinds of animals and reptiles and birds of the air. <sup>13</sup>And there came a voice to him: &ldquo;Rise, Peter; kill and eat.&rdquo; <sup>14</sup>But Peter said, &ldquo;By no means, Lord; for I have never eaten anything that is common or unclean.&rdquo; <sup>15</sup>And the voice came to him again a second time, &ldquo;What God has made clean, do not call common.&rdquo; <sup>16</sup>This happened three times, and the thing was taken up at once to heaven. <sup>17</sup>Now while Peter was inwardly perplexed as to what the vision that he had seen might mean, behold, the men who were sent by Cornelius, having made inquiry for Simon&rsquo;s house, stood at the gate <sup>18</sup>and called out to ask whether Simon who was called Peter was lodging there. <sup>19</sup>And while Peter was pondering the vision, the Spirit said to him, &ldquo;Behold, three men are looking for you. <sup>20</sup>Rise and go down and accompany them without hesitation, for I have sent them.&rdquo; <sup>23</sup>So he invited them in to be his guests. The next day he rose and went away with them, and some of the brothers from Joppa accompanied him. <sup>24</sup>And on the following day they entered Caesarea. Cornelius was expecting them and had called together his relatives and close friends. <sup>25</sup>When Peter entered, Cornelius met him and fell down at his feet and worshiped him. <sup>26</sup>But Peter lifted him up, saying, &ldquo;Stand up; I too am a man.&rdquo; <sup>27</sup>And as he talked with him, he went in and found many persons gathered. <sup>28</sup>And he said to them, &ldquo;You yourselves know how unlawful it is for a Jew to associate with or to visit anyone of another nation, but God has shown me that I should not call any person common or unclean. <sup>29</sup>So when I was sent for, I came without objection. I ask then why you sent for me.&rdquo; <sup>34</sup>So Peter opened his mouth and said: &ldquo;Truly I understand that God shows no partiality, <sup>35</sup>but in every nation anyone who fears him and does what is right is acceptable to him. <sup>36</sup>As for the word that he sent to Israel, preaching good news of peace through Jesus Christ (he is Lord of all), <sup>37</sup>you yourselves know what happened throughout all Judea, beginning from Galilee after the baptism that John proclaimed: <sup>38</sup>how God anointed Jesus of Nazareth with the Holy Spirit and with power. He went about doing good and healing all who were oppressed by the devil, for God was with him. <sup>39</sup>And we are witnesses of all that he did both in the country of the Jews and in Jerusalem. They put him to death by hanging him on a tree, <sup>40</sup>but God raised him on the third day and made him to appear, <sup>41</sup>not to all the people but to us who had been chosen by God as witnesses, who ate and drank with him after he rose from the dead. <sup>42</sup>And he commanded us to preach to the people and to testify that he is the one appointed by God to be judge of the living and the dead. <sup>43</sup>To him all the prophets bear witness that everyone who believes in him receives forgiveness of sins through his name.&rdquo; <sup>44</sup>While Peter was still saying these things, the Holy Spirit fell on all who heard the word. <sup>45</sup>And the believers from among the circumcised who had come with Peter were amazed, because the gift of the Holy Spirit was poured out even on the Gentiles. <sup>46</sup>For they were hearing them speaking in tongues and extolling God. Then Peter declared, <sup>47</sup>&ldquo;Can anyone withhold water for baptizing these people, who have received the Holy Spirit just as we have?&rdquo; <sup>48</sup>And he commanded them to be baptized in the name of Jesus Christ. Then they asked him to remain for some days.",
    "overview": "<p>The tenth chapter of Acts is one of the pivotal moments in the history of redemption. God has been preparing two men simultaneously: a Roman centurion who prays and gives alms and fears the God of Israel, and a Jewish apostle on a rooftop in Joppa having a vision that overturns a lifetime of religious instinct. The God who governs all things is coordinating these two lives across thirty miles &mdash; because the gospel is about to cross the border that mattered most.</p><p>Peter&rsquo;s vision is not primarily about food. It is about people. &ldquo;What God has made clean, do not call common.&rdquo; The dietary laws that had kept Israel separate from the nations were always pointing toward something &mdash; a people set apart for God. Now that people is being redefined around the Messiah, and the old boundary markers are being transformed. God is not lowering his standards; he is declaring that Gentiles, received through faith in Christ, are clean. They always could be. The wall between Jew and Gentile was never in God&rsquo;s ultimate plan; it was a temporary steward until the seed came (Galatians 3:24).</p><p>The Spirit falls while Peter is still preaching. Not after an altar call. Not after theological instruction is complete. The sovereign Spirit comes when and where he wills, and what he produces in the house of Cornelius is praise. The Jewish believers who came with Peter are amazed. God is not. He planned this before the foundation of the world.</p>",
    "verseByVerse": [
      {
        "ref": "v. 15",
        "quote": "&ldquo;What God has made clean, do not call common&rdquo;",
        "commentary": "<p>This sentence, repeated three times, is the hinge of the chapter and one of the most important sentences in Acts. Peter has spent his whole life drawing the line that God is now erasing. The line was real &mdash; God drew it himself in the Torah &mdash; but its purpose was always provisional, always pointing forward. Now that Christ has come, the wall that separated Jew from Gentile in the old covenant economy is being dismantled. Not because God changed his mind, but because the type has given way to the reality it always pointed to.</p>"
      },
      {
        "ref": "vv. 34&ndash;35",
        "quote": "&ldquo;Truly I understand that God shows no partiality&rdquo;",
        "commentary": "<p>Peter&rsquo;s opening line is his own conversion, in miniature. He had known this truth in the abstract &mdash; it was there in the Psalms, in the prophets, in the Abrahamic covenant. But the vision and the three men at the door and the house full of Gentiles on their knees have made it concrete. God shows no partiality. The Greek is <em>prosōpolēmpsia</em> &mdash; God does not receive faces, does not grant access based on ethnicity or lineage or the right bloodline. He receives those who fear him and do what is right &mdash; and in context, that means those who hear the word and believe.</p>"
      },
      {
        "ref": "v. 43",
        "quote": "&ldquo;everyone who believes in him receives forgiveness of sins through his name&rdquo;",
        "commentary": "<p><em>Everyone.</em> This is the word that Cornelius&rsquo;s household has been waiting their whole lives to hear. Not &ldquo;every Jew,&rdquo; not &ldquo;every circumcised person,&rdquo; not &ldquo;every person who has kept the dietary laws&rdquo; &mdash; everyone who believes. Faith is the boundary of the covenant community now. And the prophets, Peter says, all bore witness to this &mdash; which means the inclusion of the Gentiles is not a new plan. It is the fulfilment of the ancient one.</p>"
      },
      {
        "ref": "v. 44",
        "quote": "&ldquo;the Holy Spirit fell on all who heard the word&rdquo;",
        "commentary": "<p>The Spirit does not wait for Peter to finish. He does not wait for a response, a raised hand, a walk to the front. He falls &mdash; sovereign, sudden, unmistakable &mdash; while the word is still being proclaimed. This is the Gentile Pentecost: the same Spirit, the same tongues, the same praise. God is making an argument with an event: these people are mine. The Jewish believers are amazed. The Spirit is not.</p>"
      },
      {
        "ref": "v. 47",
        "quote": "&ldquo;Can anyone withhold water for baptizing these people, who have received the Holy Spirit just as we have?&rdquo;",
        "commentary": "<p>Peter&rsquo;s rhetorical question closes the argument. The Spirit has been given; baptism must follow. The sign must accompany the reality. And the phrase &ldquo;just as we have&rdquo; is the bridge &mdash; the same Spirit who fell at Pentecost has fallen here. There is one Spirit, one Lord, one baptism. The church of Jews and Gentiles is not two communities; it is one new humanity in Christ.</p>"
      }

    "theology": "<p><strong>Election and the Nations.</strong> Acts 10 is the fulfilment of the promise to Abraham: &ldquo;in your offspring all the nations of the earth shall be blessed&rdquo; (Genesis 22:18). The blessing always intended to reach the Gentiles; what Acts 10 shows is the mechanism &mdash; the proclamation of Jesus Christ, Lord of all, and the sovereign gift of the Holy Spirit to all who believe. The Gentile mission is not an emergency plan devised when Israel rejected the Messiah. It is the ancient plan of the God who chose Abraham in order to bless the world through him. Peter&rsquo;s visit to Cornelius is, in the deepest sense, the arrival of what Genesis 12 promised. The God who shows no partiality has always intended a people from every nation. Acts 10 is that intention breaking into history.</p>",
    "examples": "<p><strong>Then:</strong> A Roman soldier who prayed toward Jerusalem and a Jewish fisherman who would never have entered a Gentile home &mdash; brought together by two visions, thirty miles apart, orchestrated by the God who wastes nothing and plans everything. The Spirit fell. The barriers fell. The church was never the same.</p><p><strong>Now:</strong> The church in every generation must resist the temptation to build walls that God has torn down. The divisions that seem most natural &mdash; racial, cultural, economic, denominational &mdash; are the ones most likely to be the new versions of the Jewish-Gentile divide. What God has made clean, do not call common. The community of the Spirit is wider than our instincts, and deeper than our categories.</p>"
  },
  "11": {
    "ref": "Chapter 11",
    "title": "The Church at Antioch",
    "text": "<sup>1</sup>Now the apostles and the brothers who were throughout Judea heard that the Gentiles also had received the word of God. <sup>2</sup>So when Peter went up to Jerusalem, the circumcision party criticized him, saying, <sup>3</sup>&ldquo;You went to uncircumcised men and ate with them.&rdquo; <sup>4</sup>But Peter began and explained it to them in order: <sup>5</sup>&ldquo;I was in the city of Joppa praying, and in a trance I saw a vision, something like a great sheet descending, being let down from heaven by its four corners, and it came down to me. <sup>6</sup>Looking at it closely, I observed animals and beasts of prey and reptiles and birds of the air. <sup>7</sup>And I heard a voice saying to me, &lsquo;Rise, Peter; kill and eat.&rsquo; <sup>8</sup>But I said, &lsquo;By no means, Lord; for nothing common or unclean has ever entered my mouth.&rsquo; <sup>9</sup>But the voice answered a second time from heaven, &lsquo;What God has made clean, do not call common.&rsquo; <sup>10</sup>This happened three times, and all was drawn up again into heaven. <sup>11</sup>And behold, at that very moment three men arrived at the house in which we were, sent to me from Caesarea. <sup>12</sup>And the Spirit told me to go with them, making no distinction. These six brothers also accompanied me, and we entered the man&rsquo;s house. <sup>13</sup>And he told us how he had seen the angel stand in his house and say, &lsquo;Send to Joppa and bring Simon who is called Peter; <sup>14</sup>he will declare to you a message by which you will be saved, you and all your household.&rsquo; <sup>15</sup>As I began to speak, the Holy Spirit fell on them just as on us at the beginning. <sup>16</sup>And I remembered the word of the Lord, how he said, &lsquo;John baptized with water, but you will be baptized with the Holy Spirit.&rsquo; <sup>17</sup>If then God gave the same gift to them as he gave to us when we believed in the Lord Jesus Christ, who was I that I could stand in God&rsquo;s way?&rdquo; <sup>18</sup>When they heard these things they fell silent. And they glorified God, saying, &ldquo;Then to the Gentiles also God has granted repentance that leads to life.&rdquo; <sup>19</sup>Now those who were scattered because of the persecution that arose over Stephen traveled as far as Phoenicia and Cyprus and Antioch, speaking the word to no one except Jews. <sup>20</sup>But there were some of them, men of Cyprus and Cyrene, who on coming to Antioch spoke to the Hellenists also, preaching the Lord Jesus. <sup>21</sup>And the hand of the Lord was with them, and a great number who believed turned to the Lord. <sup>22</sup>The report of this came to the ears of the church in Jerusalem, and they sent Barnabas to Antioch. <sup>23</sup>When he came and saw the grace of God, he was glad, and he exhorted them all to remain faithful to the Lord with steadfast purpose, <sup>24</sup>for he was a good man, full of the Holy Spirit and of faith. And a great many people were added to the Lord. <sup>25</sup>So Barnabas went to Tarsus to look for Saul, <sup>26</sup>and when he had found him, he brought him to Antioch. For a whole year they met with the church and taught a great many people. And in Antioch the disciples were first called Christians. <sup>27</sup>Now in these days prophets came down from Jerusalem to Antioch. <sup>28</sup>And one of them named Agabus stood up and foretold by the Spirit that there would be a great famine over all the world (this took place in the days of Claudius). <sup>29</sup>So the disciples determined, every one according to his ability, to send relief to the brothers living in Judea. <sup>30</sup>And they did so, sending it to the elders by the hand of Barnabas and Saul.",
    "overview": "<p>The Jerusalem church is disturbed. Peter has eaten with Gentiles. In the world of first-century Judaism this was not a minor breach of etiquette; it was a fundamental transgression of the boundaries that defined the covenant people. And so Peter explains &mdash; not defending himself, but laying out the sequence of God&rsquo;s action: vision, voice, Spirit, Gentiles praising God. And the argument that silences the critics is the simplest and most devastating: &ldquo;who was I that I could stand in God&rsquo;s way?&rdquo; When God moves, the only question is whether you will move with him.</p><p>Meanwhile, two hundred miles to the north, the scattered believers who fled Stephen&rsquo;s death are doing something unprecedented. Some of them &mdash; unnamed men from Cyprus and Cyrene &mdash; begin speaking to Gentiles in Antioch about the Lord Jesus. Not Peter. Not the twelve. Unknown disciples, obeying the impulse of the Spirit, doing what had never been done before. &ldquo;And the hand of the Lord was with them.&rdquo; A great many believed and turned to the Lord.</p><p>Antioch becomes the first truly multi-ethnic church, the first church not rooted in a synagogue, the birthplace of the word &ldquo;Christian&rdquo; &mdash; and the sending base from which the whole Gentile mission will be launched. The church that began in a frightened upper room in Jerusalem is now planting itself in the third largest city of the empire. God is moving with speed and surprise.</p>",
    "verseByVerse": [
      {
        "ref": "v. 17",
        "quote": "&ldquo;who was I that I could stand in God&rsquo;s way?&rdquo;",
        "commentary": "<p>This is the question that ends every human objection to what God is doing. Peter does not argue theology with the circumcision party; he simply narrates what happened. The Spirit gave the same gift to the Gentiles as to the Jews. The evidence is undeniable. And so the only possible response is submission &mdash; not grudging compliance, but the joyful recognition that God&rsquo;s purpose is larger than our categories. To stand in God&rsquo;s way when he is extending his grace is not piety; it is pride.</p>"
      },
      {
        "ref": "v. 18",
        "quote": "&ldquo;Then to the Gentiles also God has granted repentance that leads to life&rdquo;",
        "commentary": "<p>Notice what the Jerusalem church recognizes: God <em>granted</em> repentance. Repentance is not generated by human will; it is a divine gift. The Gentiles did not decide to repent; God gave them repentance. This is the consistent teaching of the New Testament &mdash; faith and repentance are graces, given by God to those he has chosen (2 Timothy 2:25, Philippians 1:29). The church falls silent and glorifies God, which is always the right response to sovereign grace.</p>"
      },
      {
        "ref": "v. 21",
        "quote": "&ldquo;the hand of the Lord was with them, and a great number who believed turned to the Lord&rdquo;",
        "commentary": "<p>&ldquo;The hand of the Lord&rdquo; is Old Testament language for divine power in action &mdash; the same hand that opened the Red Sea, that drove out the Canaanites, that brought Israel back from exile. It rests now on unnamed Cypriot and Cyrenian believers speaking to Gentiles in a Syrian city. The great movements of the Spirit in history are not always led by famous names. Often the hand of the Lord is most visible through the unnamed faithful who simply speak of Jesus wherever they go.</p>"
      },
      {
        "ref": "vv. 23&ndash;24",
        "quote": "&ldquo;he was a good man, full of the Holy Spirit and of faith&rdquo;",
        "commentary": "<p>Barnabas arrives in Antioch, sees the grace of God, and is glad. Not suspicious, not cautious, not primarily concerned with ecclesiastical oversight &mdash; <em>glad.</em> This is the mark of a man whose joy is in the kingdom, not his own place in it. He exhorts them to remain faithful and then, instead of establishing himself as the teacher, goes to Tarsus to find Saul. The man who vouched for Saul in Jerusalem now brings him to the church that will send him to the world. Barnabas is the human hinge on which the Gentile mission turns.</p>"
      },
      {
        "ref": "v. 26",
        "quote": "&ldquo;in Antioch the disciples were first called Christians&rdquo;",
        "commentary": "<p>The name was almost certainly given by outsiders &mdash; Antiochene Greeks who looked at this community of Jews and Gentiles and noticed that they were defined by one name above all others: Christ. <em>Christianoi</em> &mdash; partisans of Christ, the Christ-people. What the world meant as a label, the church received as a title of honour. To be called after Christ is the highest identity any human being can bear. Everything else &mdash; nationality, class, ethnicity, profession &mdash; is secondary to this.</p>"
      }
    ],
    "theology": "<p><strong>Repentance as Gift.</strong> Acts 11:18 contains one of the clearest biblical statements of the Reformed doctrine of monergism in conversion: &ldquo;God has granted repentance that leads to life.&rdquo; Repentance is not a human achievement that God rewards with salvation; it is itself a divine gift, granted by God to those he is drawing to himself. This does not eliminate human responsibility &mdash; the Gentiles in Cornelius&rsquo;s house genuinely repented, genuinely believed, genuinely turned to Christ. But behind their turning was God&rsquo;s giving. This is the grammar of all true conversion: God grants, the sinner turns, and God receives the glory. Antioch is not merely a sociological phenomenon &mdash; it is a theological one: God giving repentance to people who had no claim on him, because he is the God of all grace.</p>",
    "examples": "<p><strong>Then:</strong> Anonymous men from Cyprus and Cyrene, whose names are not recorded in Scripture, who crossed the ethnic boundary no one else had thought to cross, and started the church in Antioch. The hand of the Lord was with them. History turned on their obedience.</p><p><strong>Now:</strong> The church at Antioch is the model of a healthy sending church: multi-ethnic, Spirit-filled, taught by gifted teachers, responsive to need (the famine collection), and willing to send its best people out on mission. Every local church must ask whether it looks more like the fearful circumcision party in Jerusalem or the glad, generous, outward-facing church at Antioch.</p>"
