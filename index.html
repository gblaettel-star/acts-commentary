        "quote": "&ldquo;I do not account my life of any value nor as precious to myself&rdquo;",
        "commentary": "<p>This sentence is the secret of Paul&rsquo;s ministry. He is not protecting his life; he has already given it away. The man who can say &ldquo;to live is Christ and to die is gain&rdquo; is the man who cannot be stopped by the threat of death &mdash; because death holds no terror for him. He has one goal: to finish his course and complete the ministry he received from the Lord Jesus. Everything else &mdash; comfort, security, reputation, life itself &mdash; is negotiable. The ministry is not.</p>"

        "commentary": "<p>Paul&rsquo;s warning is specific and unsentimental: the wolves will come from outside and from within. The external threat is familiar &mdash; false teachers arriving from outside. But the internal threat &mdash; elders who begin to teach twisted things &mdash; is more dangerous, because they come with established credibility and relational access. Paul has seen it before; he knows how it works. The answer is not suspicion of everyone; it is alert faithfulness to the whole counsel of God. The shepherd who knows the full truth can identify the deviation.</p>"

        "commentary": "<p>Paul&rsquo;s final word to the Ephesian elders is not a strategy or a structure or a succession plan. It is a commendation to God and his Word. These are the two unshakeable foundations of the church in every age: the sovereign God who holds his people, and the Word of his grace that builds them up and secures their inheritance. The pastor who is faithful to these two things &mdash; who prays his people into God&rsquo;s hands and feeds them on the Word &mdash; has done everything. Nothing more is needed. Nothing less will do.</p>"

    "theology": "<p><strong>The Whole Counsel of God and Pastoral Faithfulness.</strong> Acts 20:27 gives the church its standard for preaching: the whole counsel of God, without shrinking. This phrase has defined the Reformed tradition&rsquo;s commitment to expository, systematic, comprehensive proclamation of Scripture &mdash; preaching through whole books, teaching the full range of doctrine, refusing to select only the comfortable and suppress the challenging. The shepherd who preaches the whole counsel will declare both the tenderness of the Father and the terror of the Judge, both the free grace of justification and the necessary fruit of sanctification, both the comfort of election and the urgency of repentance. Paul could stand before his people at Miletus and say &ldquo;I am innocent of your blood&rdquo; because he had given them everything. That is the standard every preacher must aspire to.</p>",
    "examples": "<p><strong>Then:</strong> A beach at Miletus, a group of weeping elders on their knees, a man who knew he was going to chains and possibly death &mdash; and who spent his last hours with these people not arranging his escape but commending them to God and declaring his conscience clear. The tears on the beach are the overflow of three years of tears in the houses of Ephesus. Ministry that produces this kind of grief at parting has been ministry that produced this kind of love in the doing.</p><p><strong>Now:</strong> Paul&rsquo;s farewell is the standard against which every pastoral ministry will be measured. Did we shrink? Did we select? Did we give them the comfortable Christ without the demanding Lord, the free grace without the costly discipleship, the promise without the warning? The whole counsel of God. Nothing less. The flock that has been given the whole counsel will be able to stand when the wolves come &mdash; because they will recognise the deviation when they hear it.</p>"

  "21": {
    "ref": "Chapter 21",
    "title": "Bound for Jerusalem",
    "text": "<sup>1</sup>And when we had parted from them and set sail, we came by a straight course to Cos, and the next day to Rhodes, and from there to Patara. <sup>2</sup>And having found a ship crossing to Phoenicia, we went aboard and set sail. <sup>3</sup>When we had come in sight of Cyprus, leaving it on the left we sailed to Syria and landed at Tyre, for there the ship was to unload its cargo. <sup>4</sup>And having sought out the disciples, we stayed there for seven days. And through the Spirit they were telling Paul not to go on to Jerusalem. <sup>7</sup>When we had finished the voyage from Tyre, we arrived at Ptolemais, and we greeted the brothers and stayed with one day. <sup>8</sup>On the next day we departed and came to Caesarea, and we entered the house of Philip the evangelist, who was one of the seven, and stayed with him. <sup>10</sup>While we were staying for many days, a prophet named Agabus came down from Judea. <sup>11</sup>And coming to us, he took Paul&rsquo;s belt and bound his own hands and feet and said, &ldquo;Thus says the Holy Spirit, &lsquo;This is how the Jews at Jerusalem will bind the man who owns this belt and deliver him into the hands of the Gentiles.&rsquo;&rdquo; <sup>12</sup>When we heard this, we and the people there urged him not to go up to Jerusalem. <sup>13</sup>Then Paul answered, &ldquo;What are you doing, weeping and breaking my heart? For I am ready not only to be imprisoned but even to die in Jerusalem for the name of the Lord Jesus.&rdquo; <sup>14</sup>And since he would not be persuaded, we ceased and said, &ldquo;Let the will of the Lord be done.&rdquo; <sup>15</sup>After these days we got ready and went up to Jerusalem. <sup>17</sup>When we had come to Jerusalem, the brothers received us gladly. <sup>18</sup>On the following day Paul went in with us to James, and all the elders were present. <sup>19</sup>After greeting them, he related one by one the things that God had done among the Gentiles through his ministry. <sup>20</sup>And when they heard it, they glorified God. And they said to him, &ldquo;You see, brother, how many thousands there are among the Jews who have believed. They are all zealous for the law. <sup>26</sup>Then Paul took the men, and the next day he purified himself along with them and went into the temple, giving notice when the days of purification would be fulfilled and the offering presented for each one of them. <sup>27</sup>When the seven days were almost completed, the Jews from Asia saw him in the temple and stirred up all the crowd and laid hands on him, <sup>28</sup>crying out, &ldquo;Men of Israel, help! This is the man who is teaching everyone everywhere against the people and the law and this place. Moreover, he even brought Greeks into the temple and has defiled this holy place.&rdquo; <sup>30</sup>Then all the city was stirred up, and the people ran together. They seized Paul and dragged him out of the temple, and at once the gates were shut. <sup>31</sup>And as they were seeking to kill him, word came to the tribune of the cohort that all Jerusalem was in confusion. <sup>32</sup>He at once took soldiers and centurions and ran down to them. And when they saw the tribune and the soldiers, they stopped beating Paul. <sup>33</sup>Then the tribune came up and arrested him and ordered him to be bound with two chains. He inquired who he was and what he had done. <sup>36</sup>For the mob of the people followed, crying out, &ldquo;Away with him!&rdquo;",
    "overview": "<p>The journey to Jerusalem is a journey into known suffering. At every stop, the Spirit witnesses that chains and afflictions await. At Tyre, disciples urge Paul not to go. At Caesarea, Agabus binds his own hands and feet with Paul&rsquo;s belt and delivers the Spirit&rsquo;s message with prophetic theatre: this is what Jerusalem will do to the man who owns this belt. Everyone weeps. Everyone pleads. And Paul, unmoved, asks why they are breaking his heart.</p><p>He is not reckless. He is not looking for martyrdom. He is constrained by the Spirit &mdash; the same Spirit whose warnings he hears and receives, and who nevertheless calls him forward. The will of the Lord leads into suffering. And Paul&rsquo;s companions, when they cannot dissuade him, say the only thing that remains: &ldquo;Let the will of the Lord be done.&rdquo; This is not resignation; it is the profound submission of people who have learned that God&rsquo;s purposes are not derailed by human suffering &mdash; they are often advanced through it.</p><p>Jerusalem receives Paul with joy &mdash; James and the elders glorify God over the Gentile mission. But within days the Asian Jews see Paul in the temple and the city erupts. He is dragged out, beaten, on the verge of death, and saved by Roman soldiers. As they carry him up the steps of the barracks, the crowd shouting &ldquo;away with him&rdquo; below, Paul asks the tribune for permission to speak. The prisoner wants to preach. He is not finished yet.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 11&ndash;12",
        "quote": "&ldquo;Thus says the Holy Spirit&hellip;&rdquo; &mdash; and we urged him not to go",
        "commentary": "<p>There is a paradox here that requires careful handling. The Spirit warns Paul through the disciples at Tyre (&ldquo;not to go&rdquo;) and through Agabus that chains await in Jerusalem &mdash; and yet the same Spirit has constrained Paul to go (20:22). How can the Spirit both warn and compel? The most satisfying resolution is that the Spirit&rsquo;s witness through the prophets is to the suffering, not a command to avoid it. The disciples hear the warning and add their own plea &mdash; &ldquo;don&rsquo;t go.&rdquo; Paul hears the warning and walks forward anyway, knowing exactly what lies ahead. Courage is not the absence of knowledge; it is the refusal to be governed by it.</p>"

        "ref": "v. 13",
        "quote": "&ldquo;I am ready not only to be imprisoned but even to die in Jerusalem for the name of the Lord Jesus&rdquo;",
        "commentary": "<p>Paul has reached the place Ignatius of Antioch would later describe &mdash; where the desire for martyrdom and the desire to serve are in tension, and the servant simply places both in the hands of his Lord. He is not suicidal; he is surrendered. The name of the Lord Jesus is worth everything. The ministry he received is worth his life. He will not flee suffering when his Lord did not flee the cross. If Jerusalem means chains, it means chains. If it means death, it means death. What it means is not his to determine.</p>"

      {
        "ref": "v. 14",
        "quote": "&ldquo;Let the will of the Lord be done&rdquo;",
        "commentary": "<p>This sentence, spoken by Paul&rsquo;s companions after they have failed to dissuade him, is the summit of Christian ethics. It is Gethsemane language &mdash; the prayer of Jesus in the garden (Luke 22:42), spoken now by his followers in a house in Caesarea. When the will of the Lord leads into suffering, the only appropriate response is submission &mdash; not passive resignation but active trust in the God whose will is always good, even when it is costly. This is what it looks like to follow a crucified Lord.</p>"

      {
        "ref": "vv. 19&ndash;20",
        "quote": "&ldquo;he related one by one the things that God had done among the Gentiles&hellip; they glorified God&rdquo;",
        "commentary": "<p>Paul&rsquo;s mission report to James and the elders is a catalogue of divine acts &mdash; &ldquo;what God had done&rdquo; &mdash; and the response is worship. The right response to hearing what God has done in mission is always doxology. The Jerusalem elders do not critique Paul&rsquo;s method or interrogate his theology; they hear what God has done and they glorify him. This is what the church looks like when it is gathered around the acts of the sovereign God: astonished, grateful, worshipping.</p>"

      {
        "ref": "vv. 27&ndash;28",
        "quote": "&ldquo;This is the man who is teaching everyone everywhere against the people and the law and this place&rdquo;",
        "commentary": "<p>The charges against Paul are a distortion, but they contain a truth the accusers did not intend: the gospel does relativise the temple, does fulfil and therefore transform the law, does create a new people that is not defined by ethnic Israel. Paul&rsquo;s accusers are wrong about his intent &mdash; he has not brought Greeks into the temple, and he has not taught against Moses. But they have correctly identified that his teaching, if received, changes everything. The gospel is always, in this sense, subversive &mdash; not of God&rsquo;s purposes, but of every human structure built on something less than Christ.</p>"

    "theology": "<p><strong>The Will of God and the Path of Suffering.</strong> Acts 21 presents with unusual clarity the Reformed conviction that the will of God is not always comfortable, and that knowing it does not mean avoiding what it contains. Paul knows chains await. He goes anyway. His companions know Paul knows. They submit anyway. &ldquo;Let the will of the Lord be done&rdquo; is not fatalism &mdash; it is the active, willing submission of people who have learned that God&rsquo;s purposes are worked out through suffering, not around it. This is the theology of Romans 8:28 embodied in a house in Caesarea: all things &mdash; including imprisonment, beatings, and the howling of a mob &mdash; work together for good for those who love God and are called according to his purpose. Paul&rsquo;s chains will take him to Rome. God knew this. Paul submitted to it. Rome receives the gospel.</p>",
    "examples": "<p><strong>Then:</strong> A man walking knowingly toward chains, accompanied by weeping friends who have said everything they can say and now can only pray. A church in Jerusalem that receives the Gentile mission report with joy and then watches its guest arrested in the temple court. The will of the Lord, being done &mdash; at great cost, with great grief, toward a great purpose that none of them can yet see fully.</p><p><strong>Now:</strong> The church in every age must learn the grammar of &ldquo;let the will of the Lord be done.&rdquo; It is learned most deeply in the moments when the will of the Lord leads into what we would not choose &mdash; illness, loss, rejection, persecution. Paul goes to Jerusalem not because it is easy or because he can see the outcome, but because the Spirit has said go and the Lord has said trust. This is the faith that follows a Lord who himself prayed &ldquo;not my will, but yours.&rdquo;</p>"

  "22": {
    "ref": "Chapter 22",
    "title": "Paul Before the Crowd",
    "text": "<sup>1</sup>&ldquo;Brothers and fathers, hear the defense that I now make before you.&rdquo; <sup>2</sup>And when they heard that he was addressing them in the Hebrew language, they became even more quiet. And he said: <sup>3</sup>&ldquo;I am a Jew, born in Tarsus in Cilicia, but brought up in this city, educated at the feet of Gamaliel according to the strict manner of the law of our fathers, being zealous for God as all of you are this day. <sup>4</sup>I persecuted this Way to the death, binding and delivering to prison both men and women, <sup>5</sup>as the high priest and the whole council of elders can bear witness. From them I received letters to the brothers, and I journeyed toward Damascus to take those also who were there and bring them in bonds to Jerusalem to be punished. <sup>6</sup>As I was on my way and drew near to Damascus, about noon a great light from heaven suddenly shone around me. <sup>7</sup>And I fell to the ground and heard a voice saying to me, &lsquo;Saul, Saul, why are you persecuting me?&rsquo; <sup>8</sup>And I answered, &lsquo;Who are you, Lord?&rsquo; And he said to me, &lsquo;I am Jesus of Nazareth, whom you are persecuting.&rsquo; <sup>9</sup>Now those who were with me saw the light but did not understand the voice of the one who was speaking to me. <sup>10</sup>And I said, &lsquo;What shall I do, Lord?&rsquo; And the Lord said to me, &lsquo;Rise, and go into Damascus, and there you will be told all that is appointed for you to do.&rsquo; <sup>11</sup>And since I could not see because of the brightness of that light, I was led by the hand by those who were with me, and came into Damascus. <sup>12</sup>And one Ananias, a devout man according to the law, well spoken of by all the Jews who lived there, <sup>13</sup>came to me, and standing by me said to me, &lsquo;Brother Saul, receive your sight.&rsquo; And at that very hour I received my sight and saw him. <sup>14</sup>And he said, &lsquo;The God of our fathers appointed you to know his will, to see the Righteous One and to hear a voice from his mouth; <sup>15</sup>for you will be a witness for him to everyone of what you have seen and heard. <sup>16</sup>And now why do you wait? Rise and be baptized and wash away your sins, calling on his name.&rsquo; <sup>17</sup>When I had returned to Jerusalem and was praying in the temple, I fell into a trance <sup>18</sup>and saw him saying to me, &lsquo;Make haste and get out of Jerusalem quickly, because they will not accept your testimony about me.&rsquo; <sup>19</sup>And I said, &lsquo;Lord, they themselves know that in one synagogue after another I imprisoned and beat those who believed in you. <sup>20</sup>And when the blood of Stephen your witness was being shed, I myself was standing by and approving and watching over the garments of those who killed him.&rsquo; <sup>21</sup>And he said to me, &lsquo;Go, for I will send you far away to the Gentiles.&rsquo;&rdquo; <sup>22</sup>Up to this word they listened to him. Then they raised their voices and said, &ldquo;Away with such a fellow from the earth! For he should not be allowed to live.&rdquo; <sup>23</sup>And as they were shouting and throwing off their cloaks and flinging dust into the air, <sup>24</sup>the tribune ordered him to be brought into the barracks, saying that he should be examined by flogging, to find out why they were shouting against him like this. <sup>25</sup>But when they had stretched him out for the whips, Paul said to the centurion who was standing by, &ldquo;Is it lawful for you to flog a man who is a Roman citizen and uncondemned?&rdquo; <sup>26</sup>When the centurion heard this, he went to the tribune and said to him, &ldquo;What are you about to do? For this man is a Roman citizen.&rdquo; <sup>27</sup>So the tribune came and said to him, &ldquo;Tell me, are you a Roman citizen?&rdquo; And he said, &ldquo;Yes.&rdquo; <sup>28</sup>The tribune answered, &ldquo;I bought this citizenship for a large sum.&rdquo; Paul said, &ldquo;But I am a citizen by birth.&rdquo; <sup>29</sup>So those who were about to examine him withdrew from him immediately, and the tribune also was afraid, for he realized that Paul was a Roman citizen and that he had bound him.",
    "overview": "<p>The crowd that had just been beating Paul to death falls silent the moment he speaks in Aramaic. He does not flee behind his Roman citizenship; he speaks. And what he speaks is his own story &mdash; the story of a man who was more zealous for the law than any of them, who hounded the followers of Jesus to prison and to death, and who met the risen Christ on the Damascus road and has never been the same. Paul&rsquo;s defence before the Jerusalem mob is not an argument; it is a testimony. The most powerful thing a man can say is what has been done to him by God.</p><p>They listen well &mdash; until the word &ldquo;Gentiles.&rdquo; At that word the crowd erupts. It is not the resurrection that enrages them, not the conversion narrative, not even the claim that Jesus of Nazareth is the Lord. It is the mission to the Gentiles. The idea that God has sent a Jew to the nations &mdash; that the covenant is not the exclusive property of ethnic Israel &mdash; is more than they can bear. They throw their cloaks, fling dust, call for his death.</p><p>Paul&rsquo;s Roman citizenship surfaces at precisely the right moment &mdash; not to silence his accusers but to protect the next opportunity to preach. God gave Paul a birthright that would carry him from the steps of a barracks in Jerusalem to the halls of Caesar in Rome. Providence is always more resourceful than our plans.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 3&ndash;5",
        "quote": "&ldquo;I am a Jew&hellip; educated at the feet of Gamaliel&hellip; zealous for God as all of you are this day&rdquo;",
        "commentary": "<p>Paul begins where his audience is. He is not a renegade Gentile-sympathiser; he is a Pharisee of the Pharisees, a student of the greatest rabbi of his generation, a man whose zeal for the law once exceeded theirs. He establishes common ground not to flatter but to be heard &mdash; and then to show how everything he once built his identity on was overturned in one moment of blinding light. The most effective testimony always begins with &ldquo;I was where you are.&rdquo;</p>"
      },
      {
        "ref": "vv. 7&ndash;8",
        "quote": "&ldquo;Saul, Saul, why are you persecuting me?&hellip; I am Jesus of Nazareth, whom you are persecuting&rdquo;",
        "commentary": "<p>Paul gives his conversion testimony for the second time in Acts &mdash; and the third will come in chapter 26. Luke records it three times because it is the hinge of the whole book. The risen Jesus identified himself to Paul not as &ldquo;the Lord&rdquo; or &ldquo;God&rdquo; but as &ldquo;Jesus of Nazareth&rdquo; &mdash; the specific, historical, crucified man. The resurrection is not a spiritual concept; it is a bodily fact. The one who speaks to Paul from the blinding light has a name and a history and nail-scarred hands.</p>"
      },
      {
        "ref": "vv. 14&ndash;15",
        "quote": "&ldquo;appointed you to know his will, to see the Righteous One&hellip; you will be a witness for him to everyone&rdquo;",
        "commentary": "<p>Ananias&rsquo;s summary of Paul&rsquo;s calling is precise: appointed, to know, to see, to hear &mdash; and then to witness. The entire apostolic call is grounded in prior divine appointment. Paul does not choose this mission; he is chosen for it. The sovereignty of God over Paul&rsquo;s calling is not oppressive; it is liberating. The man who knows he is sent does not need external validation. He preaches because he cannot do otherwise.</p>"
      },
      {
        "ref": "v. 21",
        "quote": "&ldquo;Go, for I will send you far away to the Gentiles&rdquo;",
        "commentary": "<p>This is the word that ends the crowd&rsquo;s patience. Not the Damascus road. Not the blindness. Not the claim to have seen the Righteous One. The Gentiles. The mission to the nations is the most offensive thing Paul can say to a Jerusalem crowd because it implies that God&rsquo;s covenant is not the exclusive birthright of ethnic Israel. And yet it is precisely the point of the whole of Acts &mdash; the gospel to the end of the earth, as the risen Christ commanded from the beginning. The offence of the gospel is not incidental; it is structural.</p>"
      },
      {
        "ref": "vv. 25&ndash;28",
        "quote": "&ldquo;I am a citizen by birth&rdquo;",
        "commentary": "<p>Paul&rsquo;s Roman citizenship is not a trump card he plays for personal safety &mdash; it is an instrument God provided for the mission. He does not invoke it to escape Jerusalem; he uses it to ensure that the legal process will carry him to Rome, where he has told Agabus and others he must go. The citizenship his parents gave him at birth becomes, decades later, the vehicle of his journey to Caesar. God&rsquo;s providence works through the most ordinary facts of a man&rsquo;s biography &mdash; place of birth, family lineage, civil status &mdash; to accomplish his extraordinary purposes.</p>"
      }
    ],
    "theology": "<p><strong>Testimony as Proclamation.</strong> Paul&rsquo;s speech in Acts 22 is a model of personal evangelism: he meets his hearers in their own language and culture, establishes genuine common ground, and then narrates what God has done to him. The personal testimony &mdash; &ldquo;I was there, I was like you, and then this happened&rdquo; &mdash; is not a lesser form of proclamation than systematic argument. It is often more penetrating, because it is harder to dismiss. Paul does not argue for the resurrection; he witnesses to an encounter with the risen Lord that changed everything. The Word of God, when it comes through a life that has been broken open by it, carries a weight that no apologetic can manufacture.</p>",
    "examples": "<p><strong>Then:</strong> A battered man on the steps of a Roman barracks, blood on his clothes, speaking Aramaic to the crowd that had just tried to kill him &mdash; and they listened. The gospel spoken in the language of the listener, in the idiom of their shared world, has always had this power to command attention before it commands decision.</p><p><strong>Now:</strong> Every Christian has a version of Paul&rsquo;s testimony. The details differ; the structure is the same: I was heading one direction, God arrested me, I have been going a different way ever since. This testimony, told simply and truly, is one of the most powerful tools the Spirit uses. The world can argue with doctrine; it cannot as easily argue with a transformed life honestly described.</p>"
  },
  "23": {
    "ref": "Chapter 23",
    "title": "The Plot and the Providence",
    "text": "<sup>1</sup>And looking intently at the council, Paul said, &ldquo;Brothers, I have lived my life before God in all good conscience up to this day.&rdquo; <sup>2</sup>And the high priest Ananias commanded those who stood by him to strike him on the mouth. <sup>3</sup>Then Paul said to him, &ldquo;God is going to strike you, you whitewashed wall! Are you sitting to judge me according to the law, and yet contrary to the law you order me to be struck?&rdquo; <sup>4</sup>Those who stood by said, &ldquo;Would you revile God&rsquo;s high priest?&rdquo; <sup>5</sup>And Paul said, &ldquo;I did not know, brothers, that he was the high priest, for it is written, &lsquo;You shall not speak evil of a ruler of your people.&rsquo;&rdquo; <sup>6</sup>Now when Paul perceived that one part were Sadducees and the other Pharisees, he cried out in the council, &ldquo;Brothers, I am a Pharisee, a son of Pharisees. It is with respect to the hope of the resurrection of the dead that I am on trial.&rdquo; <sup>7</sup>And when he had said this, a dissension arose between the Pharisees and the Sadducees, and the assembly was divided. <sup>8</sup>For the Sadducees say that there is no resurrection, nor angel, nor spirit, but the Pharisees acknowledge them all. <sup>9</sup>Then a great clamor arose, and some of the scribes of the Pharisees&rsquo; party stood up and contended sharply, &ldquo;We find nothing wrong in this man. What if a spirit or an angel spoke to him?&rdquo; <sup>10</sup>And when the dissension became violent, the tribune, afraid that Paul would be torn to pieces by them, commanded the soldiers to go down and take him away from among them by force and bring him into the barracks. <sup>11</sup>The following night the Lord stood by him and said, &ldquo;Take courage, for as you have testified to the facts about me in Jerusalem, so you must also testify in Rome.&rdquo; <sup>12</sup>When it was day, the Jews made a plot and bound themselves by an oath, saying that they would neither eat nor drink till they had killed Paul. <sup>13</sup>There were more than forty of them who made this conspiracy. <sup>14</sup>They went to the chief priests and elders and said, &ldquo;We have strictly bound ourselves by an oath to taste no food till we have killed Paul. <sup>15</sup>Now therefore you, along with the council, give notice to the tribune to bring him down to you, as though you were going to determine his case more exactly. And we will kill him before he gets near.&rdquo; <sup>16</sup>Now the son of Paul&rsquo;s sister heard of their ambush, and he went and entered the barracks and told Paul. <sup>17</sup>Paul called one of the centurions and said, &ldquo;Take this young man to the tribune, for he has something to tell him.&rdquo; <sup>23</sup>Then he called two of the centurions and said, &ldquo;Get ready two hundred soldiers, with seventy horsemen and two hundred spearmen to go as far as Caesarea at the third hour of the night. <sup>24</sup>Also provide mounts for Paul to ride and bring him safely to Felix the governor.&rdquo; <sup>31</sup>So the soldiers, according to their instructions, took Paul and brought him by night to Antipatris. <sup>32</sup>And on the next day they returned to the barracks, leaving the horsemen to go on with him. <sup>33</sup>When they came to Caesarea and delivered the letter to the governor, they presented Paul also before him. <sup>34</sup>On reading the letter, he asked what province he was from. And when he learned that he was from Cilicia, <sup>35</sup>he said, &ldquo;I will give you a hearing when your accusers arrive.&rdquo; And he commanded him to be guarded in Herod&rsquo;s praetorium.",
    "overview": "<p>Paul before the Sanhedrin lasts approximately thirty seconds before he is struck on the mouth for claiming a clear conscience. The council that is meant to dispense justice has become the instrument of injustice. And Paul &mdash; with the tactical clarity of a man who has spent years reasoning in hostile environments &mdash; identifies the fault line that runs through the council and drives a wedge: &ldquo;It is with respect to the hope of the resurrection of the dead that I am on trial.&rdquo; The Pharisees and Sadducees erupt at each other, and Paul is carried out of the council chamber for the second time in two days.</p><p>Then the Lord stands by him in the night. Not an angel, not a vision from a distance &mdash; the Lord himself, present in the cell: &ldquo;Take courage, for as you have testified to the facts about me in Jerusalem, so you must also testify in Rome.&rdquo; One sentence that changes everything. Paul will not die in Jerusalem. He will reach Rome. The mission continues. The prisoner who has been beaten and nearly torn apart by two mobs in two days is told by his Lord to take courage &mdash; and the promise underneath the command is the firmest ground in the universe: you <em>must</em> testify in Rome. Divine necessity, spoken in the dark.</p><p>The plot of forty men, sworn to eat nothing until Paul is dead, is undone by a nephew. God&rsquo;s instrument of providence is a boy who happens to overhear. Four hundred and seventy soldiers escort Paul out of Jerusalem in the night. The conspiracy of the mighty is defeated by a child and a commander who wants to avoid a diplomatic incident.</p>",
    "verseByVerse": [
      {
        "ref": "v. 1",
        "quote": "&ldquo;I have lived my life before God in all good conscience up to this day&rdquo;",
        "commentary": "<p>Paul&rsquo;s opening line before the Sanhedrin is not arrogance; it is the testimony of a man who has learned to live coram Deo &mdash; before the face of God. He does not claim sinless perfection; he claims integrity of conscience &mdash; the kind of life that can be held up to divine scrutiny without concealment. This is not the self-righteousness of the Pharisee in the temple; it is the freedom of a man who has been forgiven everything and now lives in the open light of God&rsquo;s grace.</p>"
      },
      {
        "ref": "vv. 6&ndash;9",
        "quote": "&ldquo;It is with respect to the hope of the resurrection of the dead that I am on trial&rdquo;",
        "commentary": "<p>Paul&rsquo;s tactical move is sometimes criticised as manipulation. But he is stating a truth: the resurrection of Jesus is precisely what the Sadducees cannot accept and what the Pharisees ought to affirm. He is not deceiving the council; he is forcing the theological question to the surface. The resurrection of Jesus is not a peripheral doctrine that can be set aside for the sake of procedural justice. It is the claim on which everything else hangs &mdash; and it is the claim that divides the room.</p>"
      },
      {
        "ref": "v. 11",
        "quote": "&ldquo;Take courage, for as you have testified to the facts about me in Jerusalem, so you must also testify in Rome&rdquo;",
        "commentary": "<p>This is the pivot of Acts. Everything that follows &mdash; Felix, Festus, Agrippa, the storm, the shipwreck &mdash; is the outworking of this one divine word spoken in the night. Paul <em>must</em> reach Rome. The word is <em>dei</em> &mdash; divine necessity, the same word used of Christ&rsquo;s suffering (Luke 9:22). God has spoken. No conspiracy of forty men, no storm, no shipwreck can prevent what God has decreed. The courage the Lord commands is grounded in the certainty of his purpose.</p>"
      },
      {
        "ref": "vv. 12&ndash;15",
        "quote": "&ldquo;they would neither eat nor drink till they had killed Paul&rdquo;",
        "commentary": "<p>Forty men, oath-bound, conspiring with the high priests, with a plan that seems foolproof. And God&rsquo;s counter-move is a boy &mdash; Paul&rsquo;s nephew, unnamed, unremarkable &mdash; who happened to hear what was being said and walked into a Roman barracks to tell his uncle. This is the humour of divine providence: the machinations of the powerful overturned by the overheard conversation of a child. God does not always use the dramatic. He often uses the ordinary, the unnoticed, the one nobody thought to account for.</p>"
      },
      {
        "ref": "vv. 23&ndash;24",
        "quote": "&ldquo;two hundred soldiers, with seventy horsemen and two hundred spearmen&rdquo;",
        "commentary": "<p>Four hundred and seventy soldiers to escort one prisoner thirty-seven miles to Caesarea. The tribune, terrified of a diplomatic crisis, deploys the equivalent of a small army. God uses the fear of a Roman officer and the machinery of imperial military protocol to move his apostle safely to the next stage of the journey to Rome. The empire, which will later persecute the church, is at this moment the vehicle of the gospel&rsquo;s advance. God is not confined by the loyalties of his instruments.</p>"
      }
    ],
    "theology": "<p><strong>Divine Necessity and the Security of God&rsquo;s Purposes.</strong> &ldquo;You must also testify in Rome&rdquo; (v. 11) &mdash; the word <em>dei</em> expresses not mere possibility but divine necessity. God has purposes that he will accomplish, and his servants are secured within those purposes not because they are immune to suffering but because their course is appointed. This is the theology of Romans 8:28 lived out in a dungeon: the God who works all things together for good is working even the plots of forty conspirators into the pathway that leads to Rome. Paul&rsquo;s security is not circumstantial; it is covenantal. The God who has called him to testify before kings will keep him until that testimony is complete.</p>",
    "examples": "<p><strong>Then:</strong> A man in a barracks cell, bruised from two days of beatings and mob violence, with forty men sworn to kill him outside the walls &mdash; and the Lord standing beside him in the night to say: take courage, you must reach Rome. The promise is the ground of the courage. The courage is the fruit of the promise.</p><p><strong>Now:</strong> Every servant of God in every hostile situation has access to the same ground of courage: the purposes of God cannot be frustrated. Not by conspiracies, not by governments, not by mobs, not by death. The mission the Lord assigns is the mission that will be completed &mdash; because he who assigns it also governs the outcome. Take courage.</p>"
  },
  "24": {
    "ref": "Chapter 24",
    "title": "Before Felix",
    "text": "<sup>1</sup>And after five days the high priest Ananias came down with some elders and a spokesman, one Tertullus. They laid before the governor their case against Paul. <sup>2</sup>And when he had been summoned, Tertullus began to accuse him, saying: &ldquo;Since through you we enjoy much peace, and since by your foresight, most excellent Felix, reforms are being made for this nation, <sup>3</sup>in every way and everywhere we accept this with all gratitude. <sup>4</sup>But, to detain you no further, I beg you in your kindness to hear us briefly. <sup>5</sup>For we have found this man a plague, one who stirs up riots among all the Jews throughout the world and is a ringleader of the sect of the Nazarenes. <sup>6</sup>He even tried to profane the temple, but we seized him. <sup>8</sup>By examining him yourself you will be able to find out from him about everything of which we accuse him.&rdquo; <sup>10</sup>And when the governor had nodded to him to speak, Paul replied: &ldquo;Knowing that for many years you have been a judge over this nation, I cheerfully make my defense. <sup>11</sup>You can verify that it is not more than twelve days since I went up to worship in Jerusalem. <sup>12</sup>And they did not find me disputing with anyone or stirring up a crowd, either in the temple or in the synagogues or in the city. <sup>13</sup>Neither can they prove to you what they now bring up against me. <sup>14</sup>But this I confess to you, that according to the Way, which they call a sect, I worship the God of our fathers, believing everything laid down by the Law and written in the Prophets, <sup>15</sup>having a hope in God, which these men themselves accept, that there will be a resurrection of both the just and the unjust. <sup>16</sup>So I always take pains to have a clear conscience toward both God and man. <sup>21</sup>other than this one thing that I cried out while standing among them: &lsquo;It is with respect to the resurrection of the dead that I am on trial before you this day.&rsquo;&rdquo; <sup>22</sup>But Felix, having a rather accurate knowledge of the Way, put them off, saying, &ldquo;When Lysias the tribune comes down, I will decide your case.&rdquo; <sup>23</sup>Then he gave orders to the centurion that he should be kept in custody but have some liberty, and that none of his friends should be prevented from attending to his needs. <sup>24</sup>After some days Felix came with his wife Drusilla, who was Jewish, and he sent for Paul and heard him speak about faith in Christ Jesus. <sup>25</sup>And as he reasoned about righteousness and self-control and the coming judgment, Felix was alarmed and said, &ldquo;Go away for now. When I get an opportunity I will summon you.&rdquo; <sup>26</sup>At the same time he hoped that money would be given him by Paul. So he sent for him often and conversed with him. <sup>27</sup>When two years had elapsed, Felix was succeeded by Porcius Festus. And desiring to do the Jews a favor, Felix left Paul in prison.",
    "overview": "<p>Felix is a man who knows enough to be uncomfortable and not enough to be saved. He has &ldquo;a rather accurate knowledge of the Way&rdquo; &mdash; he understands what Christians believe. He sends for Paul privately, listens to him speak about faith in Christ Jesus, and then Paul turns the conversation to righteousness, self-control, and the coming judgment &mdash; and Felix is alarmed. Not intellectually interested. Not academically curious. Alarmed. The gospel lands on his conscience with the force of truth. And he sends Paul away.</p><p>Tertullus&rsquo;s opening flattery of Felix is a masterpiece of advocacy by a professional lawyer &mdash; and almost every sentence is a distortion. Paul&rsquo;s defence is simple, factual, and unanswerable: he was not stirring up riots, he can be verified, the charges are unsubstantiated. But the legal clarity of the defence is not what Luke wants us to dwell on. He wants us to see what happens when Paul speaks privately to a powerful man about the things that actually matter: righteousness, self-control, the judgment to come. Felix is frightened, defers, hopes for a bribe, waits two years, and leaves Paul in prison as a political favour. Three opportunities, three deferrals. Some of the saddest words in Acts: &ldquo;When I get an opportunity I will summon you.&rdquo;</p>",
    "verseByVerse": [
      {
        "ref": "vv. 14&ndash;15",
        "quote": "&ldquo;I worship the God of our fathers, believing everything laid down by the Law and written in the Prophets&rdquo;",
        "commentary": "<p>Paul&rsquo;s defence before Felix is simultaneously an act of proclamation. He does not merely contest the charges; he explains what he actually believes. The Way is not a sect that has abandoned Israel&rsquo;s God; it is the fulfilment of everything the Law and the Prophets promised. He believes in the resurrection of both just and unjust &mdash; a claim that is simultaneously Jewish orthodoxy (against the Sadducees) and the ground of the Christian hope. Paul always manages to turn a courtroom into a pulpit.</p>"
      },
      {
        "ref": "v. 16",
        "quote": "&ldquo;I always take pains to have a clear conscience toward both God and man&rdquo;",

    "theology": "<p><strong>The Conscience and the Gospel.</strong> Acts 24 is the New Testament&rsquo;s sharpest illustration of what happens when the gospel lands on an unprepared but not entirely hardened conscience. Felix knows enough to be alarmed; he does not know enough, or is not willing to surrender enough, to repent. The Reformed tradition teaches that the Holy Spirit uses the preached Word to convince the world of sin, righteousness, and judgment (John 16:8) &mdash; and Felix&rsquo;s alarm is exactly this work. But the Spirit&rsquo;s conviction is not irresistible in the ordinary sense &mdash; it can be suppressed, deferred, grieved away. Felix suppresses it three times and hardens himself. The great danger of hearing the gospel clearly and not responding is not ignorance; it is the progressive hardening of a conscience that was once capable of alarm.</p>",

  "25": {
    "ref": "Chapter 25",
    "title": "Before Festus",
    "text": "<sup>1</sup>Now three days after Festus had arrived in the province, he went up to Jerusalem from Caesarea. <sup>2</sup>And the chief priests and the principal men of the Jews laid out their case against Paul, and they urged him, <sup>3</sup>asking as a favor against Paul that he summon him to Jerusalem&mdash;because they were planning an ambush to kill him on the way. <sup>4</sup>Festus replied that Paul was being kept at Caesarea and that he himself intended to go there shortly. <sup>5</sup>&ldquo;So,&rdquo; said he, &ldquo;let the men of authority among you go down with me, and if there is anything wrong about the man, let them bring charges against him.&rdquo; <sup>6</sup>After he stayed among them not more than eight or ten days, he went down to Caesarea. And the next day he took his seat on the tribunal and ordered Paul to be brought. <sup>7</sup>When he had arrived, the Jews who had come down from Jerusalem stood around him, bringing many and serious charges against him that they could not prove. <sup>8</sup>Paul argued in his defense, &ldquo;Neither against the law of the Jews, nor against the temple, nor against Caesar have I committed any offense.&rdquo; <sup>9</sup>But Festus, wishing to do the Jews a favor, said to Paul, &ldquo;Do you wish to go up to Jerusalem and there be tried on these charges before me?&rdquo; <sup>10</sup>But Paul said, &ldquo;I am standing before Caesar&rsquo;s tribunal, where I ought to be tried. To the Jews I have done no wrong, as you yourself know very well. <sup>11</sup>If then I am a wrongdoer and have committed anything for which I deserve to die, I do not seek to escape death. But if there is nothing to their charges against me, no one can give me up to them. I appeal to Caesar.&rdquo; <sup>12</sup>Then Festus, when he had conferred with his council, answered, &ldquo;To Caesar you have appealed; to Caesar you shall go.&rdquo; <sup>13</sup>Now when some days had passed, Agrippa the king and Bernice arrived at Caesarea and greeted Festus. <sup>14</sup>And as they stayed there many days, Festus laid Paul&rsquo;s case before the king, saying, &ldquo;There is a man left prisoner by Felix, <sup>15</sup>and when I was at Jerusalem, the chief priests and the elders of the Jews laid out their case against him, asking for a sentence against him. <sup>18</sup>When the accusers stood up, they brought no charge in his case of such evils as I supposed. <sup>19</sup>Rather they had certain points of dispute with him about their own religion and about a certain Jesus, who was dead, but whom Paul asserted to be alive. <sup>20</sup>Being at a loss how to investigate these questions, I asked whether he wanted to go to Jerusalem and be tried there regarding them. <sup>21</sup>But when Paul had appealed to be kept in custody for the decision of the emperor, I ordered him to be kept until I could send him to Caesar.&rdquo; <sup>22</sup>Then Agrippa said to Festus, &ldquo;I would like to hear the man myself.&rdquo; And he said, &ldquo;Tomorrow you will hear him.&rdquo;",
    "overview": "<p>Festus arrives as governor with no knowledge of Paul and finds himself immediately inheriting the problem. The Jerusalem leadership, who have been waiting two years, press him at once: bring Paul to Jerusalem. Festus, who does not know the plot, sees a reasonable request from the leading citizens of the most important city in his province. Paul, who does know how the road from Caesarea to Jerusalem ends for him, appeals to Caesar.</p><p>The appeal to Caesar is Paul&rsquo;s masterstroke &mdash; not as a legal manoeuvre for personal safety, but as the fulfilment of the word spoken in his cell: &ldquo;you must also testify in Rome.&rdquo; The Lord told him he would reach Rome; Paul uses every legitimate instrument available to him to make sure he does. A Roman citizen&rsquo;s right of appeal to the emperor is absolute. Festus cannot refuse. &ldquo;To Caesar you have appealed; to Caesar you shall go.&rdquo; The empire is now legally committed to delivering Paul to Rome.</p><p>Festus&rsquo;s summary of Paul&rsquo;s case to Agrippa is, unintentionally, one of the clearest statements of the gospel&rsquo;s central claim in Acts: the dispute is about &ldquo;a certain Jesus, who was dead, but whom Paul asserted to be alive.&rdquo; The outsider has identified the issue precisely. Everything in the Christian faith rests on whether a dead man is alive. If he is not, Paul is a madman. If he is, Festus is standing before the greatest news in human history and calling it a &ldquo;dispute about religion.&rdquo;</p>",
    "verseByVerse": [
      {
        "ref": "vv. 10&ndash;11",
        "quote": "&ldquo;I appeal to Caesar&rdquo;",
        "commentary": "<p>Paul does not appeal to Caesar because he is afraid of Jerusalem. He has already said he is ready to die for the name of Jesus (21:13). He appeals because the Lord has told him he must reach Rome, and the appeal to Caesar is the mechanism that will take him there. He uses every legitimate tool of his citizenship in the service of the mission. Christians are not required to be passive in the face of injustice; they may use the legal and civil tools available to them &mdash; as long as those tools serve the mission and not merely the self.</p>"
      },
      {
        "ref": "v. 19",
        "quote": "&ldquo;a certain Jesus, who was dead, but whom Paul asserted to be alive&rdquo;",
        "commentary": "<p>Festus has stumbled onto the thesis of the entire New Testament. He does not know it; he is describing what seems to him a peculiar religious dispute. But his words are a perfect summary: a dead man whom Paul says is alive. This is the claim. Everything else &mdash; the theology, the ethics, the community, the mission &mdash; flows from this single assertion. If Jesus is not alive, Paul is deluded. If Jesus is alive, Festus is standing in the presence of the most important fact in the universe and treating it as a procedural problem.</p>"
      },
      {
        "ref": "v. 22",
        "quote": "&ldquo;I would like to hear the man myself&rdquo;",
        "commentary": "<p>Agrippa&rsquo;s curiosity is the opening God provides for the extraordinary speech of chapter 26. The Lord told Paul he would testify before kings &mdash; and here is a king, requesting an audience. God uses the curiosity of rulers as the door through which the gospel enters their chambers. Every human impulse, including the perfectly ordinary wish to hear an interesting prisoner, is available for God to use in the advance of his purposes.</p>"
      },
      {
        "ref": "vv. 4&ndash;5",
        "quote": "&ldquo;let the men of authority among you go down with me&rdquo;",
        "commentary": "<p>Festus&rsquo;s unconscious response to the plot against Paul is providential. He refuses the request that would have delivered Paul to his assassins &mdash; not because he knows about the ambush, but because it is more convenient for him to hold the hearing in Caesarea. God does not always protect his servants through dramatic supernatural intervention. He often uses the ordinary bureaucratic preferences of governors who are thinking about their own schedules. Providence is rarely spectacular. It is always thorough.</p>"
      },
      {
        "ref": "vv. 7&ndash;8",
        "quote": "&ldquo;bringing many and serious charges against him that they could not prove&rdquo;",
        "commentary": "<p>Luke notes with quiet precision that the charges are serious and unsubstantiated. The gospel has been on trial for two and a half years in Caesarea &mdash; before Felix, before Festus &mdash; and no charge has been proven. The truth is not convicted by accusation. Every attempt to silence the Word through legal process has produced instead a series of hearings in which Paul has proclaimed the resurrection to governors, kings, and their courts. The trial that was meant to end Paul&rsquo;s ministry has become its most distinguished platform.</p>"
      }
    ],
    "theology": "<p><strong>Providence through Ordinary Means.</strong> Acts 25 is a sustained illustration of the doctrine of providence operating through the completely ordinary choices of people who have no idea they are serving God&rsquo;s purposes. Festus prefers Caesarea to Jerusalem &mdash; and saves Paul from the ambush. The Jews press their case &mdash; and Paul appeals to Caesar, securing his journey to Rome. Agrippa is curious &mdash; and the most powerful speech in the book is about to be given. None of these people are acting for the sake of the mission. All of them are serving it. The God who governs all things governs them through the natural inclinations, preferences, fears, and curiosities of his creatures &mdash; without overriding their freedom, without diminishing their responsibility, without their knowledge or consent.</p>",
    "examples": "<p><strong>Then:</strong> Paul sitting in a Caesarean prison while governors come and go, charges accumulate and dissolve, and the mission to Rome hangs on a citizen&rsquo;s right of appeal. Two years of apparent inaction &mdash; during which he has evangelised a governor, alarmed a corrupt official into genuine fear of judgment, and is about to address a king. Inaction is often God&rsquo;s most active season.</p><p><strong>Now:</strong> The church must learn to see the hand of God in the ordinary movements of history &mdash; in the preferences of politicians, the decisions of courts, the curiosity of the powerful. God is not absent from the structures of the world; he governs them. The task of the church is not to control those structures but to be faithful within them &mdash; using every legitimate opportunity the structures provide, and trusting that God is at work in the ones they do not control.</p>"

you to kick against the goads.&rsquo; <sup>15</sup>And I said, &lsquo;Who are you, Lord?&rsquo; And the Lord said, &lsquo;I am Jesus whom you are persecuting. <sup>16</sup>But rise and stand upon your feet, for I have appeared to you for this purpose, to appoint you as a servant and witness to the things in which you have seen me and to those in which I will appear to you, <sup>17</sup>delivering you from your people and from the Gentiles&mdash;to whom I am sending you <sup>18</sup>to open their eyes, so that they may turn from darkness to light and from the power of Satan to God, that they may receive forgiveness of sins and a place among those who are sanctified by faith in me.&rsquo; <sup>19</sup>Therefore, O King Agrippa, I was not disobedient to the heavenly vision, <sup>20</sup>but declared first to those in Damascus, then in Jerusalem and throughout all the region of Judea, and also to the Gentiles, that they should repent and turn to God, performing deeds in keeping with their repentance. <sup>22</sup>To this day I have had the help that comes from God, and so I stand here testifying both to small and great, saying nothing but what the prophets and Moses said would come to pass: <sup>23</sup>that the Christ must suffer and that, by being the first to rise from the dead, he would proclaim light both to our people and to the Gentiles.&rdquo; <sup>24</sup>And as he was saying these things in his defense, Festus said with a loud voice, &ldquo;Paul, you are out of your mind; your great learning is making you mad.&rdquo; <sup>25</sup>But Paul said, &ldquo;I am not out of my mind, most excellent Festus, but I am speaking true and rational words. <sup>26</sup>For the king knows about these things, and to him I speak boldly. For I am persuaded that none of these things has escaped his notice, for this has not been done in a corner. <sup>27</sup>King Agrippa, do you believe the prophets? I know that you believe.&rdquo; <sup>28</sup>And Agrippa said to Paul, &ldquo;In a short time would you persuade me to be a Christian?&rdquo; <sup>29</sup>And Paul said, &ldquo;Whether short or long, I would to God that not only you but also all who hear me this day might become such as I am&mdash;except for these chains.&rdquo; <sup>30</sup>Then the king rose, and the governor and Bernice and those who were sitting with them. <sup>31</sup>And when they had withdrawn, they said to one another, &ldquo;This man is doing nothing deserving death or imprisonment.&rdquo; <sup>32</sup>And Agrippa said to Festus, &ldquo;This man could have been set free if he had not appealed to Caesar.&rdquo;",
    "overview": "<p>The speech before Agrippa is the finest in Acts &mdash; and perhaps the finest in the New Testament. Paul addresses a king who knows the Scriptures, before a governor who finds him fascinating, in the presence of a royal court assembled to hear him. He does not waste the occasion on legal procedure. He gives them his testimony, the purpose of the gospel, and a personal appeal that puts the fate of the king&rsquo;s soul directly on the table.</p><p>The description of Paul&rsquo;s commission in verses 17&ndash;18 is one of the great summaries of what the gospel actually does: it opens eyes, turns people from darkness to light, from the power of Satan to God, granting forgiveness of sins and a place among the sanctified. This is not merely Paul&rsquo;s personal calling; it is the description of the work the Spirit does through every proclamation of the gospel. Every converted sinner has had their eyes opened, their allegiance transferred, their sins forgiven, their destiny secured. This is what happens when the word is preached and received.</p><p>Then the extraordinary exchange with Agrippa: &ldquo;Do you believe the prophets? I know that you believe.&rdquo; Paul drives the argument home with direct, personal, unembarrassed appeal. And Agrippa deflects with a half-question, half-admission: &ldquo;In a short time would you persuade me to be a Christian?&rdquo; And Paul says what every evangelist has wanted to say to every person on the edge of the kingdom: whether short or long, I want nothing more than for you and everyone here to be what I am &mdash; except for these chains.</p>",

        "commentary": "<p>Paul distils the entire argument to one question. The resurrection is not philosophically impossible for people who believe in the God of creation. The God who made all things from nothing has the power to raise what he has made from death. The incredulity of the Sadducees and the philosophers is not the rational response to the resurrection &mdash; it is the irrational response of those who have subtracted from their theology a God powerful enough to do it. If God is the Creator, the resurrection is not only possible; it is exactly the kind of thing such a God would do.</p>"

    "theology": "<p><strong>The Gospel as Transfer of Dominion.</strong> Acts 26:18 gives the most comprehensive description of salvation in the book: turning from darkness to light, from the power of Satan to God, receiving forgiveness and sanctification. This is the transfer-of-dominion theology that undergirds Paul&rsquo;s entire mission. Every person who has not come to faith in Christ remains, however morally respectable, &ldquo;under the power of Satan&rdquo; &mdash; not because they are all engaged in obvious evil, but because they are living in the darkness of a world that has rejected its Creator. Conversion is not merely a change of belief or behaviour; it is an exodus from one kingdom into another. The Reformed tradition calls this regeneration &mdash; the new birth that opens blind eyes, liberates captives, transfers allegiance, and brings a person from death into life. Paul&rsquo;s commission is the description of what the Spirit does in every genuine conversion.</p>",

  "27": {
    "ref": "Chapter 27",
    "title": "The Storm and the Sovereign",
    "text": "<sup>1</sup>And when it was decided that we should sail for Italy, they delivered Paul and some other prisoners to a centurion of the Augustan Cohort named Julius. <sup>2</sup>And embarking in a ship of Adramyttium, which was about to sail to the ports along the coast of Asia, we put out to sea, accompanied by Aristarchus, a Macedonian from Thessalonica. <sup>9</sup>Since much time had passed, and the voyage was now dangerous because even the Fast was already over, Paul advised them, <sup>10</sup>saying, &ldquo;Sirs, I perceive that the voyage will be with injury and much loss, not only of the cargo and the ship, but also of our lives.&rdquo; <sup>11</sup>But the centurion paid more attention to the pilot and to the owner of the ship than to what Paul said. <sup>14</sup>But soon a tempestuous wind, called the northeaster, struck down from the land. <sup>15</sup>And when the ship was caught in it and could not face the wind, we gave way to it and were driven along. <sup>20</sup>When neither sun nor stars appeared for many days, and no small tempest lay on us, all hope of our being saved was abandoned. <sup>21</sup>Since they had been without food for a long time, Paul stood up among them and said, &ldquo;Men, you should have listened to me and not have set sail from Crete and incurred this injury and loss. <sup>22</sup>Yet now I urge you to take heart, for there will be no loss of life among you, but only of the ship. <sup>23</sup>For this very night there stood before me an angel of the God to whom I belong and whom I worship, <sup>24</sup>and he said, &lsquo;Do not be afraid, Paul; you must stand before Caesar. And behold, God has granted you all those who sail with you.&rsquo; <sup>25</sup>So take heart, men, for I have faith in God that it will be exactly as I have been told. <sup>26</tml>Yet we must run aground on some island.&rdquo; <sup>33</sup>As day was about to dawn, Paul urged them all to take some food, saying, &ldquo;Today is the fourteenth day that you have continued in suspense and without food, having taken nothing. <sup>34</sup>Therefore I urge you to take some food. For it will give you strength, for not a hair is to perish from the head of any of you.&rdquo; <sup>35</sup>And when he had said these things, he took bread, and giving thanks to God in the presence of all he broke it and began to eat. <sup>36</sup>Then they all were encouraged and ate some food themselves. <sup>37</sup>We were in all 276 persons in the ship. <sup>39</sup>Now when it was day, they did not recognize the land, but they noticed a bay with a beach, on which they planned if possible to run the ship ashore. <sup>41</sup>But striking a reef, they ran the ship aground. The bow stuck and remained immovable, and the stern was being broken up by the surf. <sup>42</sup>The soldiers&rsquo; plan was to kill the prisoners, lest any should swim away and escape. <sup>43</sup>But the centurion, wishing to save Paul, kept them from carrying out their plan. He ordered those who could swim to jump overboard first and make for the land, <sup>44</sup>and the rest on planks or on pieces of the ship. And so it was that all were brought safely to land.",
    "overview": "<p>The great storm of Acts 27 is not an interruption of the mission &mdash; it is part of it. God has said Paul must reach Rome, and the storm, the shipwreck, the fourteen days of darkness and terror, the desperate sounding of the depths in the night &mdash; all of it is the path, not a deviation from it. The man who is most at peace in the ship is the prisoner. Paul has a word from God: &ldquo;Do not be afraid, Paul; you must stand before Caesar. And behold, God has granted you all those who sail with you.&rdquo; The prisoner who has a promise is calmer than the sailors who have the expertise.</p><p>What Paul does on the ship is what the church does in every storm: he prays, he speaks the word of God into the darkness (&ldquo;take heart, for I have faith in God that it will be exactly as I have been told&rdquo;), and he takes bread and gives thanks in the presence of all. In the middle of a Mediterranean shipwreck, surrounded by two hundred and seventy-six terrified men, Paul performs what looks like a Eucharist &mdash; taking, blessing, breaking, distributing &mdash; and they are all encouraged and eat. The community meal, the act of thanksgiving in the storm, the visible declaration that God is trustworthy &mdash; this is the church&rsquo;s witness in every crisis.</p><p>The prophecy is fulfilled exactly: not one life is lost. The ship is destroyed; every person reaches land. Paul told them it would be exactly as he was told. It was. The God whose Word can be trusted in the storm is the God whose Word can be trusted in every other circumstance.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 22&ndash;25",
        "quote": "&ldquo;I have faith in God that it will be exactly as I have been told&rdquo;",
        "commentary": "<p>Paul&rsquo;s announcement to the ship is a model of faith under pressure. He does not minimise the storm &mdash; they are in real danger. He does not pretend the ship will survive &mdash; he has been told it will not. But he anchors his confidence in the word of God, spoken through an angel, verified by the character of the God he belongs to and worships. &ldquo;I have faith in God that it will be exactly as I have been told.&rdquo; This is the substance of hope (Hebrews 11:1) in action: a confidence in things not yet seen, grounded in the reliability of the one who has spoken. The storm is real. The word is more real.</p>"

ldier who guarded him. <sup>17</sup>After three days he called together the local leaders of the Jews. And when they had gathered, he said to them, &ldquo;Brothers, though I had done nothing against our people or the customs of our fathers, yet I was delivered as a prisoner from Jerusalem into the hands of the Romans. <sup>23</sup>When they had appointed a day for him, they came to him at his lodging in greater numbers. From morning till evening he expounded to them, testifying to the kingdom of God and trying to convince them about Jesus both from the Law of Moses and from the Prophets. <sup>24</sup>And some were convinced by what he said, but others disbelieved. <sup>25</sup>And disagreeing among themselves, they departed after Paul had made one statement: &ldquo;The Holy Spirit was right in saying to your fathers through Isaiah the prophet: <sup>26</sup>&lsquo;Go to this people, and say, You will indeed hear but never understand, and you will indeed see but never perceive. <sup>27</sup>For this people&rsquo;s heart has grown dull, and with their ears they can barely hear, and their eyes they have closed; lest they should see with their eyes and hear with their ears and understand with their heart and turn, and I would heal them.&rsquo; <sup>28</sup>Therefore let it be known to you that this salvation of God has been sent to the Gentiles; they will listen.&rdquo; <sup>30</sup>He lived there two whole years at his own expense, and welcomed all who came to him, <sup>31</sup>proclaiming the kingdom of God and teaching about the Lord Jesus Christ with all boldness and without hindrance.",
    "overview": "<p>Rome at last. The word spoken in the cell in Jerusalem &mdash; &ldquo;you must also testify in Rome&rdquo; &mdash; has been kept. Through a mob, through two governors, through a king, through a storm and a shipwreck and a winter on Malta, through a viper and a healing and a journey up the Appian Way, Paul arrives. And when the brothers come out from Rome to meet him at the Forum of Appius, Paul thanks God and takes courage. The sight of the community of Christ, walking toward him on the road, is enough to steady him for what lies ahead.</p><p>He goes to the Roman synagogue first &mdash; always to the Jew first. He expounds from morning till evening, from Moses and the Prophets, about the kingdom of God and Jesus. Some believe; others do not. He quotes Isaiah 6 &mdash; the great text of judicial hardening &mdash; and announces that the salvation of God has been sent to the Gentiles. The pattern of the whole book is completed in Rome: gospel proclaimed, some receive, others reject, the mission continues.</p><p>And then the last two verses of Acts &mdash; the most carefully chosen final sentence in Luke&rsquo;s extraordinary narrative. Paul lives in Rome two full years, welcoming all who come to him, proclaiming the kingdom of God and teaching about the Lord Jesus Christ &mdash; with all boldness and without hindrance. The final word of the book is <em>unhindered</em> &mdash; <em>akōlutōs</em>. The man is chained. The Word is not. The empire has Rome; the gospel has the world. Nothing is finished. Everything is open. The story continues &mdash; and Luke&rsquo;s readers are invited to take their place in it.</p>",
